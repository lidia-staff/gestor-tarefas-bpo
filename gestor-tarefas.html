<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Tarefas — Staff Conect</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060505;
    --green: #00C48C;
    --blue:  #0D6EFD;
    --gray:  #EEEEEE;
    --green-dim: rgba(0,196,140,0.12);
    --green-mid: rgba(0,196,140,0.25);
  }
  * { font-family: 'Inter', sans-serif; }
  body { background: #F4F5F7; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #e8e8e8; }
  ::-webkit-scrollbar-thumb { background: #00C48C; border-radius: 4px; }

  /* Checkbox */
  input[type="checkbox"] { accent-color: #00C48C; width: 17px; height: 17px; cursor: pointer; }

  /* Animations */
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

  /* Step done */
  .step-done { text-decoration: line-through; color: #aaa; }

  /* Nav */
  .nav-header { background: #060505; }
  .tab-active   { border-bottom: 3px solid #00C48C; color: #00C48C; font-weight: 600; }
  .tab-inactive { border-bottom: 3px solid transparent; color: #94a3b8; }
  .tab-inactive:hover { color: #EEEEEE; }

  /* Cards */
  .card { background: #ffffff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .card-dark { background: #060505; border-radius: 12px; }

  /* Badges */
  .badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; }

  /* Buttons */
  .btn-green   { background:#00C48C; color:#fff; padding:8px 18px; border-radius:8px; font-weight:600; font-size:14px; border:none; cursor:pointer; transition:opacity .15s; }
  .btn-green:hover { opacity:.88; }
  .btn-blue    { background:#0D6EFD; color:#fff; padding:8px 18px; border-radius:8px; font-weight:600; font-size:14px; border:none; cursor:pointer; transition:opacity .15s; }
  .btn-blue:hover { opacity:.88; }
  .btn-ghost   { background:#F4F5F7; color:#475569; padding:8px 18px; border-radius:8px; font-weight:600; font-size:14px; border:none; cursor:pointer; }
  .btn-ghost:hover { background:#e2e8f0; }
  .btn-success { background:rgba(0,196,140,.15); color:#00C48C; padding:6px 14px; border-radius:8px; font-weight:600; font-size:13px; border:none; cursor:pointer; }
  .btn-danger  { background:#fee2e2; color:#dc2626; padding:6px 14px; border-radius:8px; font-weight:600; font-size:13px; border:none; cursor:pointer; }

  /* Input */
  .input-field { border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 12px; font-size:14px; width:100%; outline:none; transition:border .15s; background:#fff; }
  .input-field:focus { border-color:#00C48C; }
  textarea.input-field { resize:vertical; min-height:70px; }

  /* Progress bar */
  .progress-track { width:100%; background:#e8e8e8; border-radius:99px; height:6px; }
  .progress-fill  { background:#00C48C; height:6px; border-radius:99px; transition:width .3s; }

  /* Stat card */
  .stat-card { background:#060505; border-radius:12px; padding:20px; color:#fff; }
  .stat-green { color:#00C48C; }
  .stat-blue  { color:#0D6EFD; }

  /* Logo dot */
  .logo-dot { width:8px; height:8px; background:#00C48C; border-radius:50%; display:inline-block; margin-left:2px; }

  /* Decision box */
  .decision-box { background:rgba(0,196,140,.08); border:1.5px solid rgba(0,196,140,.3); border-radius:12px; padding:16px; margin-top:12px; }

  /* Return box */
  .return-box { background:rgba(13,110,253,.06); border:1.5px solid rgba(13,110,253,.25); border-radius:12px; padding:14px; margin-top:10px; }
</style>
</head>

// ═══════════════════════════════════════
function ClienteModal({client, onSave, onClose}) {
  const [form, setForm] = useState({...client});

    <div style={{position:'fixed',inset:0,background:'rgba(6,5,5,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:'16px'}}>
      <div className="card fade-in" style={{width:'100%',maxWidth:'480px',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 20px 16px',borderBottom:'1px solid #f1f5f9'}}>

            <div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'6px'}}>Bancos</div>

// MODAL TAREFA EXTRA
// ═══════════════════════════════════════

            <div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>Observações</div>
            <textarea className="input-field" value={form.notes} onChange={e=>upd('notes',e.target.value)} placeholder="Detalhes, contexto, passo a passo..."/>
          </div>

        <div style={{display:'flex',gap:'10px',padding:'16px 20px',borderTop:'1px solid #f1f5f9'}}>
          <button className="btn-green" style={{flex:1}} onClick={()=>{ if(!form.title.trim()) return; onSave({...form,id:Date.now(),status:'pending',createdAt:new Date().toISOString()}); }}>Criar Tarefa</button>

        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// CARD CLIENTE NA FILA
// ═══════════════════════════════════════
function ClienteFilaCard({client, task, onUpdate}) {
  const [open, setOpen]   = useState(false);
  const [openB2, setOpenB2] = useState(false);
  const b1 = task.bloco1, b2 = task.bloco2;
  const b1done = b1.steps.filter(s=>s.done).length;
  const b2done = b2.steps.filter(s=>s.done).length;

  const toggleB1 = stepId => {
    const steps = b1.steps.map(s=>s.id===stepId?{...s,done:!s.done}:s);
    const allDone = steps.every(s=>s.done);
    const anyDone = steps.some(s=>s.done);
    const status  = allDone?'done':anyDone?'active':'pending';
    const startedAt = b1.startedAt||(anyDone?nowTime():null);
    const doneAt    = allDone?nowTime():null;
    onUpdate({...task, bloco1:{...b1,steps,status,startedAt,doneAt}});
  };

  const toggleB2 = stepId => {
    const steps = b2.steps.map(s=>s.id===stepId?{...s,done:!s.done}:s);
    const allDone = steps.every(s=>s.done);
    const anyDone = steps.some(s=>s.done);
    const status  = allDone?'done':anyDone?'active':'pending';
    const startedAt = b2.startedAt||(anyDone?nowTime():null);
    const doneAt    = allDone?nowTime():null;
    const fullyDone = allDone;
    onUpdate({...task, bloco2:{...b2,steps,status,startedAt,doneAt}, fullyDone});
  };

  const setPayment = has => {
    const newB2 = has?{...b2,active:true}:b2;
    const fullyDone = !has;
    onUpdate({...task, bloco1:{...b1,hasPayment:has,doneAt:nowTime()}, bloco2:newB2, fullyDone});
    if(has) { setOpenB2(true); }
  };

  const overallStatus = () => {
    if(task.fullyDone) return 'done';
    if(b2.active && b2.status!=='done') return b2.status==='active'?'active':'waiting';
    return b1.status;
  };

  const os = overallStatus();
  const pct = Math.round((b1done/BLOCO1.length)*100);

  return (
    <div className="card fade-in" style={{marginBottom:'10px',overflow:'hidden',opacity:task.fullyDone?.7:1}}>
      {/* Header */}
      <div onClick={()=>setOpen(!open)} style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px',cursor:'pointer',transition:'background .15s'}}
        onMouseEnter={e=>e.currentTarget.style.background='#fafafa'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        {/* Priority circle */}
        <div style={{width:'34px',height:'34px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,flexShrink:0,
          background: task.fullyDone?'rgba(0,196,140,.15)':'#060505', color: task.fullyDone?'#00C48C':'#00C48C'}}>
          {task.fullyDone?'✓':client.priority}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
            <span style={{fontWeight:700,color:'#060505',fontSize:'15px'}}>{client.name}</span>
            <StatusDot status={os}/>
            {b2.active && !task.fullyDone && <span className="badge" style={{background:'rgba(13,110,253,.12)',color:'#0D6EFD'}}>Op.2 acionado</span>}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',marginTop:'4px'}}>{client.banks.map(b=><BankBadge key={b} bank={b}/>)}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0,marginRight:'8px',minWidth:'70px'}}>

// FILA DO DIA
// ═══════════════════════════════════════
function FilaDoDia({clients, dayTasks, onUpdateTask}) {
  const sorted  = [...clients].sort((a,b)=>a.priority-b.priority);
  const total   = sorted.length;
  const done    = sorted.filter(c=>dayTasks[c.id]?.fullyDone).length;
  const b2queue = sorted.filter(c=>{ const t=dayTasks[c.id]; return t?.bloco2?.active && t?.bloco2?.status!=='done'; }).length;
  const pct     = total?Math.round((done/total)*100):0;

  return (
    <div>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'24px'}}>
        <div className="stat-card">
          <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>Concluídos</div>
          <div style={{fontSize:'32px',fontWeight:700,color:'#00C48C'}}>{done}<span style={{fontSize:'18px',color:'#64748b'}}>/{total}</span></div>
          <ProgressBar value={done} max={total}/>
        </div>
        <div className="stat-card">
          <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>Pendentes</div>
          <div style={{fontSize:'32px',fontWeight:700,color:'#fff'}}>{total-done}</div>
          <div style={{fontSize:'11px',color:'#64748b',marginTop:'4px'}}>clientes</div>
        </div>
        <div className="stat-card">
          <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>Fila Op.2</div>
          <div style={{fontSize:'32px',fontWeight:700,color:'#0D6EFD'}}>{b2queue}</div>
          <div style={{fontSize:'11px',color:'#64748b',marginTop:'4px'}}>pagamentos</div>
        </div>
      </div>

      {/* Lista Op1 */}
      <div style={{fontSize:'11px',fontWeight:700,color:'#00C48C',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'10px'}}>
        ● Fila — Operador 1
      </div>
      {sorted.filter(c=>!dayTasks[c.id]?.bloco2?.active || dayTasks[c.id]?.fullyDone).map(c=>(
        <ClienteFilaCard key={c.id} client={c} task={dayTasks[c.id]||freshClientTask()} onUpdate={t=>onUpdateTask(c.id,t)}/>
      ))}

      {/* Fila Op2 */}
      {b2queue>0 && (
        <>
          <div style={{fontSize:'11px',fontWeight:700,color:'#0D6EFD',letterSpacing:'1px',textTransform:'uppercase',margin:'20px 0 10px'}}>
            ● Fila — Operador 2 · Pagamentos
          </div>
          {sorted.filter(c=>dayTasks[c.id]?.bloco2?.active && dayTasks[c.id]?.bloco2?.status!=='done').map(c=>(
            <ClienteFilaCard key={c.id} client={c} task={dayTasks[c.id]} onUpdate={t=>onUpdateTask(c.id,t)}/>
          ))}
        </>
      )}

      {done===total && total>0 && (
        <div className="card fade-in" style={{textAlign:'center',padding:'32px',marginTop:'16px'}}>
          <div style={{fontSize:'40px',marginBottom:'8px'}}>🎉</div>
          <div style={{fontSize:'18px',fontWeight:700,color:'#00C48C'}}>Rotina concluída!</div>
          <div style={{fontSize:'13px',color:'#94a3b8',marginTop:'4px'}}>Todos os {total} clientes finalizados hoje.</div>
        </div>
      )}
    </div>
  );
}

function TarefasExtras({clients, operators, tasks, onAdd, onUpdate}) {
  const [modal, setModal] = useState(false);
  const [filter, setFilter] = useState('pending');
  const priStyle = {high:{bg:'rgba(220,38,38,.1)',color:'#dc2626',label:'Alta'},normal:{bg:'rgba(13,110,253,.1)',color:'#0D6EFD',label:'Normal'},low:{bg:'rgba(148,163,184,.15)',color:'#64748b',label:'Baixa'}};
  const getClient = id => clients.find(c=>c.id===id);
  const getOp     = id => operators.find(o=>o.id===id);
  const filtered  = tasks.filter(t=>filter==='all'?true:t.status===filter);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',flexWrap:'wrap',gap:'10px'}}>
        <div style={{display:'flex',gap:'6px'}}>
          {[['pending','Pendentes'],['active','Em andamento'],['done','Concluídas'],['all','Todas']].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{padding:'6px 14px',borderRadius:'8px',fontSize:'12px',fontWeight:600,border:'none',cursor:'pointer',
              background:filter===v?'#060505':'#fff',color:filter===v?'#00C48C':'#64748b'}}>
              {l}

          ))}

      {filtered.length===0 && <div className="card" style={{padding:'32px',textAlign:'center',color:'#94a3b8',fontSize:'14px'}}>Nenhuma tarefa encontrada.</div>}
      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {filtered.map(t=>(
          <div key={t.id} className="card" style={{padding:'16px'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}}>
                  <span style={{fontWeight:700,color:'#060505',fontSize:'14px'}}>{t.title}</span>
                  <span className="badge" style={{background:priStyle[t.priority]?.bg,color:priStyle[t.priority]?.color}}>{priStyle[t.priority]?.label}</span>
                  {t.recurring && <span className="badge" style={{background:'rgba(0,196,140,.12)',color:'#00C48C'}}>↺ {t.frequency==='daily'?'Diária':t.frequency==='weekly'?'Semanal':'Mensal'}</span>}
                </div>
                <div style={{display:'flex',gap:'14px',fontSize:'11px',color:'#94a3b8',flexWrap:'wrap'}}>
                  {getClient(t.client) && <span>👤 {getClient(t.client).name}</span>}
                  {getOp(t.operator)   && <span>🧑‍💻 {getOp(t.operator).name}</span>}
                  {t.due               && <span>📅 {fmtDate(t.due)}</span>}

                {t.notes && <div style={{fontSize:'13px',color:'#64748b',marginTop:'6px'}}>{t.notes}</div>}
              </div>
              <div style={{display:'flex',gap:'8px',flexShrink:0}}>
                {t.status==='pending' && <button className="btn-ghost" style={{fontSize:'12px',padding:'6px 12px'}} onClick={()=>onUpdate({...t,status:'active'})}>Iniciar</button>}
                {t.status!=='done'    && <button className="btn-success" style={{fontSize:'12px'}} onClick={()=>onUpdate({...t,status:'done',doneAt:new Date().toISOString()})}>✓</button>}
                {t.status==='done'    && <span className="badge" style={{background:'rgba(0,196,140,.12)',color:'#00C48C'}}>✓ Feito</span>}

            </div>
          </div>
        ))}

      {modal && <TarefaModal clients={clients} operators={operators} onSave={t=>{onAdd(t);setModal(false);}} onClose={()=>setModal(false)}/>}

  );
}

function Operadores({operators, dayTasks, clients, onUpdate}) {
  const [editing, setEditing] = useState(null);
  const [newName, setNewName] = useState('');
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'14px',marginBottom:'20px'}}>
        {operators.map(op=>{
          const accentColor = op.id==='op1'?'#00C48C':'#0D6EFD';
          const active = clients.filter(c=>{ const t=dayTasks[c.id]; if(!t) return false; return op.id==='op1'?t.bloco1?.status==='active':t.bloco2?.active&&t.bloco2?.status!=='done'; }).length;
          const done   = clients.filter(c=>{ const t=dayTasks[c.id]; if(!t) return false; return op.id==='op1'?t.bloco1?.status==='done':t.bloco2?.status==='done'; }).length;
          return (
            <div key={op.id} className="card" style={{padding:'20px',borderTop:`3px solid ${accentColor}`}}>
              {editing===op.id ? (
                <div style={{display:'flex',gap:'8px'}}>
                  <input className="input-field" value={newName} onChange={e=>setNewName(e.target.value)}/>
                  <button className="btn-green" style={{padding:'8px 12px'}} onClick={()=>{onUpdate(operators.map(o=>o.id===op.id?{...o,name:newName}:o));setEditing(null);}}>✓</button>
                  <button className="btn-ghost" style={{padding:'8px 12px'}} onClick={()=>setEditing(null)}>✕</button>
                </div>
              ):(
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                  <div style={{fontWeight:700,fontSize:'16px',color:'#060505'}}>{op.name}</div>
                  <button onClick={()=>{setEditing(op.id);setNewName(op.name);}} style={{background:'none',border:'none',cursor:'pointer',color:accentColor,fontSize:'16px'}}>✎</button>
                </div>
              )}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
                <div style={{background:'#f8fafc',borderRadius:'10px',padding:'14px',textAlign:'center'}}>
                  <div style={{fontSize:'26px',fontWeight:700,color:'#374151'}}>{active}</div>
                  <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}}>Em andamento</div>
                </div>
                <div style={{background:`${accentColor}12`,borderRadius:'10px',padding:'14px',textAlign:'center'}}>
                  <div style={{fontSize:'26px',fontWeight:700,color:accentColor}}>{done}</div>
                  <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}}>Concluídos hoje</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="card" style={{padding:'16px',textAlign:'center'}}>
        <p style={{fontSize:'13px',color:'#94a3b8'}}>Login individual por operador será incluído na próxima versão.</p>
      </div>
    </div>
  );
}

// APP
// ═══════════════════════════════════════
function App() {
  const [tab, setTab]         = useState('fila');
  const [clients, setClients] = useState(()=>S.get('clients',CLIENTS_DEFAULT));
  const [operators, setOps]   = useState(()=>S.get('operators',OPERATORS_DEFAULT));
  const [dayTasks, setDayTasks] = useState(()=>{
    const saved = S.get('dayTasks_'+todayStr(), null);
    if(saved) return saved;
    const cs = S.get('clients',CLIENTS_DEFAULT);
    const t  = {};
    cs.forEach(c=>{ t[c.id]=freshClientTask(); });
    return t;
  });
  const [extraTasks, setExtra] = useState(()=>S.get('extraTasks',[]));
  const today = todayStr();

  useEffect(()=>S.set('clients',clients),[clients]);
  useEffect(()=>S.set('operators',operators),[operators]);
  useEffect(()=>S.set('dayTasks_'+today,dayTasks),[dayTasks]);
  useEffect(()=>S.set('extraTasks',extraTasks),[extraTasks]);

  const updateClient  = u => setClients(cs=>cs.map(c=>c.id===u.id?u:c));
  const updateDayTask = (cid,t) => setDayTasks(dt=>({...dt,[cid]:t}));
  const addExtra      = t => setExtra(ts=>[t,...ts]);
  const updateExtra   = t => setExtra(ts=>ts.map(x=>x.id===t.id?t:x));

  const totalDone    = Object.values(dayTasks).filter(t=>t.fullyDone).length;
  const totalClients = clients.length;
  const pct = totalClients?Math.round((totalDone/totalClients)*100):0;

  const tabs = [
    {id:'fila',     label:'📋 Fila do Dia'},
    {id:'tarefas',  label:'✅ Tarefas'},
    {id:'clientes', label:'🏢 Clientes'},
    {id:'manuais',  label:'📖 Manuais'},
    {id:'ops',      label:'👥 Operadores'},
  ];

  return (
    <div style={{minHeight:'100vh',background:'#F4F5F7'}}>
      {/* HEADER */}
      <div className="nav-header" style={{position:'sticky',top:0,zIndex:40}}>
        <div style={{maxWidth:'900px',margin:'0 auto',padding:'0 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0'}}>
            {/* Logo */}
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{width:'36px',height:'36px',borderRadius:'9px',background:'rgba(0,196,140,.15)',border:'1.5px solid rgba(0,196,140,.4)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{color:'#00C48C',fontSize:'15px',fontWeight:800}}>S</span>
              </div>
              <div>
                <div style={{fontSize:'14px',fontWeight:700,color:'#fff',lineHeight:1.2}}>
                  Staff<span style={{color:'#00C48C'}}>Conect</span>
                </div>
                <div style={{fontSize:'10px',color:'#64748b',lineHeight:1.2}}>Gestor de Tarefas · {fmtDate(today)}</div>
              </div>
            </div>
            {/* Progress circle */}
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:'10px',color:'#64748b'}}>Progresso do dia</div>
                <div style={{fontSize:'13px',fontWeight:700,color:'#00C48C'}}>{totalDone}/{totalClients} clientes</div>
              </div>
              <svg viewBox="0 0 36 36" style={{width:'44px',height:'44px',transform:'rotate(-90deg)'}}>
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="#1a1a1a" strokeWidth="3"/>
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="#00C48C" strokeWidth="3"
                  strokeDasharray={`${pct} 100`} strokeLinecap="round"/>
              </svg>
            </div>
          </div>
          {/* Tabs */}
          <div style={{display:'flex',overflowX:'auto',paddingBottom:'0'}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={tab===t.id?'tab-active':'tab-inactive'}
                style={{padding:'10px 16px',fontSize:'13px',fontWeight:500,background:'none',border:'none',cursor:'pointer',whiteSpace:'nowrap',transition:'color .15s'}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:'900px',margin:'0 auto',padding:'24px 16px 48px'}}>
        {tab==='fila'     && <FilaDoDia clients={clients} dayTasks={dayTasks} onUpdateTask={updateDayTask}/>}
        {tab==='tarefas'  && <TarefasExtras clients={clients} operators={operators} tasks={extraTasks} onAdd={addExtra} onUpdate={updateExtra}/>}
        {tab==='clientes' && <Clientes clients={clients} onUpdate={updateClient}/>}
        {tab==='manuais'  && <Manuais/>}
        {tab==='ops'      && <Operadores operators={operators} dayTasks={dayTasks} clients={clients} onUpdate={setOps}/>}
      </div>

      {/* Footer */}
      <div style={{textAlign:'center',padding:'16px',fontSize:'11px',color:'#94a3b8'}}>
        Staff Conect · Gestor de Tarefas v1.0 · Dados salvos localmente
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
