// ── CARD OUTROS (tarefas avulsas do dia) ─────────────
function OutrosFilaCard({client, clients, extraTasks, operators, currentUser, manuals, onUpdateExtra}) {
  const [open, setOpen]       = useState(false);
  const [editing, setEditing] = useState(null);
  const [modal, setModal]     = useState(false);
  const today = todayStr();
  const tasks = extraTasks.filter(t=>String(t.client_id)===String(client.id)&&t.due_date===today&&t.status!=='done');
  const priStyle = {critical:{bg:'rgba(185,28,28,.15)',color:'#b91c1c',label:'🔴 CRÍTICO'},high:{bg:'rgba(220,38,38,.1)',color:'#dc2626',label:'Alta'},normal:{bg:'rgba(13,110,253,.1)',color:'#0D6EFD',label:'Normal'},low:{bg:'rgba(148,163,184,.15)',color:'#64748b',label:'Baixa'}};
  const getClient = id=>(clients||[]).find(c=>String(c.id)===String(id));
  const getOp     = id=>operators.find(o=>String(o.id)===String(id));
  const doneCnt   = tasks.filter(t=>t.status==='done').length;
  const handleEdit = t => { setEditing(t); setModal(true); };
  const handleSave = t => { onUpdateExtra({...editing,...t}); setModal(false); setEditing(null); };
  if(tasks.length===0) return null;
  return (
    <div className="card fade-in" style={{marginBottom:'10px',overflow:'hidden'}}>
      {/* Cabeçalho colapsável */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px',cursor:'pointer',transition:'background .15s'}}
        onClick={()=>setOpen(!open)}
        onMouseEnter={e=>e.currentTarget.style.background='#fafafa'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{width:'34px',height:'34px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,flexShrink:0,background:'#f1f5f9',color:'#64748b'}}>{client.priority}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
            <span style={{fontWeight:700,color:'#060505',fontSize:'15px'}}>{client.name}</span>
            <span className="badge" style={{background:'rgba(148,163,184,.15)',color:'#64748b'}}>📋 Outras Tarefas</span>
            {doneCnt===tasks.length&&tasks.length>0&&<span className="badge" style={{background:'rgba(0,196,140,.12)',color:'#00C48C'}}>✓ Concluído</span>}
            {tasks.some(t=>t.exec_notes&&t.exec_notes.trim())&&<span className="badge" style={{background:'rgba(245,158,11,.15)',color:'#d97706'}}>⚠ Pendência</span>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0}}>
          <div style={{textAlign:'right',minWidth:'60px'}}>
            <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>{doneCnt}/{tasks.length}</div>
            <ProgressBar value={doneCnt} max={tasks.length}/>
          </div>
          <span style={{color:'#94a3b8',fontSize:'12px'}}>{open?'▲':'▼'}</span>
        </div>
      </div>
      {/* Lista de tarefas completas */}
      {open&&(
        <div style={{borderTop:'1px solid #f1f5f9',padding:'12px 12px 4px'}} className="fade-in">
          {tasks.map(t=>(
            <div key={t.id} style={{marginBottom:'8px'}}>
              <TarefaCard t={t} priStyle={priStyle} getClient={getClient} getOp={getOp} onUpdate={onUpdateExtra} onEdit={handleEdit}/>
            </div>
          ))}
        </div>
      )}
      {modal&&<TarefaModal clients={clients||[]} operators={operators} currentUser={currentUser} task={editing} manuals={manuals||[]} onSave={handleSave} onClose={()=>{setModal(false);setEditing(null);}}/>}
    </div>
  );
}

// ── SEÇÃO PENDÊNCIAS ─────────────────────────────────
function PendenciaSection({client, operatorId, today, onAddExtra}) {
  const [show,setShow]     = useState(false);
  const [form,setForm]     = useState({tipo:'',descricao:'',valor:'',acao:''});
  const [saving,setSaving] = useState(false);
  const [saved,setSaved]   = useState(false);
  const tipos = ['Receita sem identificação','Despesa sem identificação','Divergência de valor','Ausência de comprovante','Movimentação não identificada','Outro'];
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const submit = async () => {
    if(!form.tipo||!form.descricao||saving) return;
    setSaving(true);
    const notas = [`Tipo: ${form.tipo}`,`Descrição: ${form.descricao}`,form.valor?`Valor: R$ ${form.valor}`:'',form.acao?`Ação realizada: ${form.acao}`:''].filter(Boolean).join('\n');
    try {
      await onAddExtra({
        title:`[PENDÊNCIA] ${form.tipo}${client?' — '+client.name:''}`,
        notes: notas,
        client_id: client?.id||'',
        operator_id: operatorId,
        due_date: today,
        priority:'high', status:'pending', recurring:false, steps:[],
      });
      setForm({tipo:'',descricao:'',valor:'',acao:''});
      setShow(false); setSaved(true);
      setTimeout(()=>setSaved(false), 4000);
    } catch {}
    setSaving(false);
  };
  return (
    <div style={{marginTop:'10px',borderTop:'1px dashed rgba(245,158,11,.35)',paddingTop:'10px'}}>
      {saved&&<div style={{fontSize:'12px',color:'#00C48C',fontWeight:600,marginBottom:'6px'}}>✓ Pendência criada na fila do dia!</div>}
      {!show ? (
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'12px',color:'#64748b'}}>Há pendência neste bloco?</span>
          <button onClick={()=>setShow(true)} style={{fontSize:'11px',background:'rgba(245,158,11,.15)',color:'#d97706',border:'1px solid rgba(245,158,11,.35)',borderRadius:'6px',padding:'3px 12px',cursor:'pointer',fontWeight:700}}>⚠ SIM — Registrar</button>
        </div>
      ) : (
        <div style={{background:'rgba(245,158,11,.04)',border:'1px solid rgba(245,158,11,.2)',borderRadius:'8px',padding:'12px'}} className="fade-in">
          <div style={{fontSize:'12px',fontWeight:700,color:'#d97706',marginBottom:'10px'}}>⚠️ Registrar Pendência</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            <select className="input-field" style={{fontSize:'12px'}} value={form.tipo} onChange={e=>upd('tipo',e.target.value)}>
              <option value="">Tipo da pendência *</option>
              {tipos.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            <input className="input-field" style={{fontSize:'12px'}} placeholder="Descrição *" value={form.descricao} onChange={e=>upd('descricao',e.target.value)}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
              <input className="input-field" style={{fontSize:'12px'}} placeholder="Valor (R$)" value={form.valor} onChange={e=>upd('valor',e.target.value)}/>
              <input className="input-field" style={{fontSize:'12px'}} placeholder="Ação realizada" value={form.acao} onChange={e=>upd('acao',e.target.value)}/>
            </div>
            <div style={{display:'flex',gap:'8px',justifyContent:'flex-end',marginTop:'2px'}}>
              <button onClick={()=>setShow(false)} style={{fontSize:'12px',background:'#f1f5f9',border:'none',borderRadius:'6px',padding:'5px 14px',cursor:'pointer',color:'#64748b',fontWeight:600}}>Cancelar</button>
              <button onClick={submit} disabled={saving||!form.tipo||!form.descricao}
                style={{fontSize:'12px',background:saving||!form.tipo||!form.descricao?'#94a3b8':'#f59e0b',color:'#fff',border:'none',borderRadius:'6px',padding:'5px 16px',cursor:saving||!form.tipo||!form.descricao?'default':'pointer',fontWeight:700}}>
                {saving?'Salvando...':'✓ Criar Tarefa de Pendência'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CARD ROTINA OUTROS ───────────────────────────────
function OutrosRotinCard({client, task, operators, onUpdate, onAddExtra}) {
  const [open, setOpen] = useState(false);
  const [editB1,setEditB1] = useState(false);
  const [editB2,setEditB2] = useState(false);
  const [newStep1,setNewStep1] = useState('');
  const [newStep2,setNewStep2] = useState('');
  const op1 = operators.find(o=>String(o.id)===String(client.op1_id));
  const op2 = operators.find(o=>String(o.id)===String(client.op2_id));
  const op1Name = op1 ? op1.name.split(' ')[0] : 'Operador 1';
  const op2Name = op2 ? op2.name.split(' ')[0] : 'Operador 2';
  const b1 = task.bloco1; const b2 = task.bloco2;
  const b1steps = client.rotina?.bloco1?.steps||[];
  const b2steps = client.rotina?.bloco2?.steps||[];
  const b1done = b1.steps.filter(s=>s.done).length;
  const b2done = b2.steps.filter(s=>s.done).length;
  const hasB2 = b2steps.length>0;

  // Edição de passos
  const editStepText = (bloco, id, text) => {
    if(bloco==='b1') onUpdate({...task,bloco1:{...b1,steps:b1.steps.map(s=>s.id===id?{...s,text}:s)}});
    else onUpdate({...task,bloco2:{...b2,steps:b2.steps.map(s=>s.id===id?{...s,text}:s)}});
  };
  const deleteStep = (bloco, id) => {
    if(bloco==='b1') onUpdate({...task,bloco1:{...b1,steps:b1.steps.filter(s=>s.id!==id)}});
    else onUpdate({...task,bloco2:{...b2,steps:b2.steps.filter(s=>s.id!==id)}});
  };
  const addStep = (bloco, text) => {
    if(!text.trim()) return;
    const ns={id:'c_'+Date.now(),text:text.trim(),done:false};
    if(bloco==='b1'){onUpdate({...task,bloco1:{...b1,steps:[...b1.steps,ns]}});setNewStep1('');}
    else{onUpdate({...task,bloco2:{...b2,steps:[...b2.steps,ns]}});setNewStep2('');}
  };

  const toggleB1 = id => {
    const steps=b1.steps.map(s=>s.id===id?{...s,done:!s.done}:s);
    const allDone=steps.every(s=>s.done), anyDone=steps.some(s=>s.done);
    const fd=allDone&&(!hasB2||b2.status==='done');
    onUpdate({...task,bloco1:{...b1,steps,status:allDone?'done':anyDone?'active':'pending',startedAt:b1.startedAt||(anyDone?nowTime():null),doneAt:allDone?nowTime():null},fullyDone:fd});
  };
  const toggleB2 = id => {
    const steps=b2.steps.map(s=>s.id===id?{...s,done:!s.done}:s);
    const allDone=steps.every(s=>s.done), anyDone=steps.some(s=>s.done);
    onUpdate({...task,bloco2:{...b2,steps,status:allDone?'done':anyDone?'active':'pending',startedAt:b2.startedAt||(anyDone?nowTime():null),doneAt:allDone?nowTime():null},fullyDone:b1.status==='done'&&allDone});
  };
  const os = task.fullyDone?'done':b2.active&&b2.status!=='done'?b2.status==='active'?'active':'pending':b1.status;
  return (
    <div className="card fade-in" style={{marginBottom:'10px',overflow:'hidden',opacity:task.fullyDone?.7:1}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px',cursor:'pointer',transition:'background .15s'}}
        onClick={()=>setOpen(!open)}
        onMouseEnter={e=>e.currentTarget.style.background='#fafafa'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{width:'34px',height:'34px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,flexShrink:0,background:task.fullyDone?'rgba(0,196,140,.15)':'#060505',color:'#00C48C'}}>
          {task.fullyDone?'✓':client.priority}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
            <span style={{fontWeight:700,color:'#060505',fontSize:'15px'}}>{client.name}</span>
            <StatusDot status={os}/>
            {b2.active&&!task.fullyDone&&<span className="badge" style={{background:'rgba(13,110,253,.12)',color:'#0D6EFD'}}>{op2Name} acionado</span>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0}}>
          {hasB2&&!b2.active&&!task.fullyDone&&(
            <button title="Iniciar Bloco 2" style={{background:'rgba(13,110,253,.12)',color:'#0D6EFD',border:'none',cursor:'pointer',borderRadius:'7px',padding:'4px 10px',fontSize:'11px',fontWeight:600}}
              onClick={e=>{e.stopPropagation();onUpdate({...task,bloco2:{...b2,active:true}});notifyOp(client.op2_id,op2Name,'▶ '+client.name,'Bloco 2 acionado. Verifique a fila do dia.');setOpen(true);}}>▶ {op2Name}</button>
          )}
          <div style={{textAlign:'right',minWidth:'70px'}}>
            <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>{b1done}/{b1steps.length}</div>
            <ProgressBar value={b1done} max={b1steps.length}/>
          </div>
          <span style={{color:'#94a3b8',fontSize:'12px'}}>{open?'▲':'▼'}</span>
        </div>
      </div>
      {open&&(
        <div style={{borderTop:'1px solid #f1f5f9',display:'grid',gridTemplateColumns:b2.active?'1fr 1fr':'1fr'}} className="fade-in">
          <div style={{padding:'16px',borderRight:b2.active?'1px solid #f1f5f9':'none'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
              <span className="badge" style={{background:'#060505',color:'#00C48C'}}>
                {client.rotina_tipo&&client.rotina_tipo!=='padrao'?`${ROTINA_TIPOS[client.rotina_tipo]?.icon||''} ${ROTINA_TIPOS[client.rotina_tipo]?.label||'Bloco 1'}`:'Bloco 1'} — {op1Name}
              </span>
              {b1.startedAt&&<span style={{fontSize:'11px',color:'#94a3b8'}}>Início: {b1.startedAt}</span>}
              {b1.doneAt&&<span style={{fontSize:'11px',color:'#00C48C'}}>✓ {b1.doneAt}</span>}
              <div style={{marginLeft:'auto'}}>
                <button onClick={()=>setEditB1(!editB1)} style={{fontSize:'11px',background:editB1?'rgba(249,115,22,.15)':'rgba(100,116,139,.1)',color:editB1?'#ea580c':'#64748b',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>{editB1?'✓ Feito':'✎ Editar'}</button>
              </div>
            </div>
            <ProgressBar value={b1done} max={b1.steps.length}/>
            <div style={{display:'flex',flexDirection:'column',gap:'4px',marginTop:'10px'}}>
              {b1.steps.map(step=>(
                <div key={step.id} style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'6px 8px',borderRadius:'8px',transition:'background .1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#f8fafb'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  {!editB1&&<input type="checkbox" checked={step.done} onChange={()=>toggleB1(step.id)} style={{marginTop:'3px',flexShrink:0}}/>}
                  {editB1
                    ? <input className="input-field" style={{flex:1,fontSize:'13px',padding:'4px 8px'}} value={step.text} onChange={e=>editStepText('b1',step.id,e.target.value)}/>
                    : <span style={{fontSize:'13px',color:step.done?'#aaa':'#374151',flex:1,cursor:'pointer'}} className={step.done?'step-done':''}>{step.text}</span>
                  }
                  {editB1&&<button onClick={()=>deleteStep('b1',step.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'14px',flexShrink:0,padding:0}}>✕</button>}
                </div>
              ))}
            </div>
            {editB1&&(
              <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
                <input className="input-field" style={{flex:1,fontSize:'13px'}} placeholder="+ Novo passo..." value={newStep1} onChange={e=>setNewStep1(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addStep('b1',newStep1);}}/>
                <button className="btn-green" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>addStep('b1',newStep1)}>+</button>
              </div>
            )}
            <textarea className="input-field" style={{marginTop:'10px',fontSize:'13px'}} placeholder="Observações desta execução..." value={b1.notes||''} onChange={e=>onUpdate({...task,bloco1:{...b1,notes:e.target.value}})} rows="2"/>
            {onAddExtra&&<PendenciaSection client={client} operatorId={client.op1_id} today={todayStr()} onAddExtra={onAddExtra}/>}
          </div>
          {b2.active&&(
            <div style={{padding:'16px',background:'rgba(13,110,253,.03)'}} className="fade-in">
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
                <span className="badge" style={{background:'#060505',color:'#0D6EFD'}}>{client.rotina?.bloco2?.name||'Bloco 2'} — {op2Name}</span>
                {b2.startedAt&&<span style={{fontSize:'11px',color:'#94a3b8'}}>Início: {b2.startedAt}</span>}
                {b2.doneAt&&<span style={{fontSize:'11px',color:'#00C48C'}}>✓ {b2.doneAt}</span>}
                <div style={{marginLeft:'auto'}}>
                  <button onClick={()=>setEditB2(!editB2)} style={{fontSize:'11px',background:editB2?'rgba(249,115,22,.15)':'rgba(100,116,139,.1)',color:editB2?'#ea580c':'#64748b',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>{editB2?'✓ Feito':'✎ Editar'}</button>
                </div>
              </div>
              <ProgressBar value={b2done} max={b2.steps.length}/>
              <div style={{display:'flex',flexDirection:'column',gap:'4px',marginTop:'10px'}}>
                {b2.steps.map(step=>(
                  <div key={step.id} style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'6px 8px',borderRadius:'8px',transition:'background .1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(13,110,253,.05)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    {!editB2&&<input type="checkbox" checked={step.done} onChange={()=>toggleB2(step.id)} style={{marginTop:'3px',flexShrink:0}}/>}
                    {editB2
                      ? <input className="input-field" style={{flex:1,fontSize:'13px',padding:'4px 8px'}} value={step.text} onChange={e=>editStepText('b2',step.id,e.target.value)}/>
                      : <span style={{fontSize:'13px',color:step.done?'#aaa':'#374151',flex:1}} className={step.done?'step-done':''}>{step.text}</span>
                    }
                    {editB2&&<button onClick={()=>deleteStep('b2',step.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'14px',flexShrink:0,padding:0}}>✕</button>}
                  </div>
                ))}
              </div>
              {editB2&&(
                <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
                  <input className="input-field" style={{flex:1,fontSize:'13px'}} placeholder="+ Novo passo..." value={newStep2} onChange={e=>setNewStep2(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addStep('b2',newStep2);}}/>
                  <button className="btn-green" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>addStep('b2',newStep2)}>+</button>
                </div>
              )}
              <textarea className="input-field" style={{marginTop:'10px',fontSize:'13px'}} placeholder="Observações..." value={b2.notes||''} onChange={e=>onUpdate({...task,bloco2:{...b2,notes:e.target.value}})} rows="2"/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── CARD CLIENTE NA FILA ─────────────────────────────
function ClienteFilaCard({client, task, operators, currentUser, manuals, onUpdate, onAddExtra}) {
  const [open,setOpen]           = useState(false);
  const [transfer,setTransfer]   = useState(false);
  const [editB1,setEditB1]       = useState(false);
  const [editB1b,setEditB1b]     = useState(false);
  const [editB2,setEditB2]         = useState(false);
  const [showModelPicker,setShowModelPicker] = useState(false);
  const [newStep1,setNewStep1]   = useState('');
  const [newStep1b,setNewStep1b] = useState('');
  const [newStep2,setNewStep2]   = useState('');
  // Tipos que NÃO têm fluxo de pagamento/retorno
  const hasPaymentFlow = !client.rotina_tipo || client.rotina_tipo==='padrao' || client.rotina_tipo==='com_cap';
  const b1=task.bloco1, b2=task.bloco2;
  const b1b = task.bloco1b || {steps:[],active:false,status:'pending',notes:'',startedAt:null,doneAt:null};
  const bTarde = task.bloco_tarde || null;
  const b1done=b1.steps.filter(s=>s.done).length;
  const b1bdone=b1b.steps.filter(s=>s.done).length;
  const b2done=b2.steps.filter(s=>s.done).length;
  const bTardeDone = bTarde ? bTarde.steps.filter(s=>s.done).length : 0;
  const assignedOp = task.assignedTo ? operators.find(o=>String(o.id)===String(task.assignedTo)) : null;
  const op1 = operators.find(o=>String(o.id)===String(client.op1_id));
  const op2 = operators.find(o=>String(o.id)===String(client.op2_id));
  const op3 = operators.find(o=>String(o.id)===String(client.op3_id));
  const op1Name = op1 ? op1.name.split(' ')[0] : 'Operador 1';
  const op2Name = op2 ? op2.name.split(' ')[0] : 'Operador 2';
  const op3Name = op3 ? op3.name.split(' ')[0] : '1b';

  // Helpers b1b
  const toggleB1b = id => {
    const steps=b1b.steps.map(s=>s.id===id?{...s,done:!s.done}:s);
    const allDone=steps.every(s=>s.done), anyDone=steps.some(s=>s.done);
    onUpdate({...task,bloco1b:{...b1b,steps,status:allDone?'done':anyDone?'active':'pending',startedAt:b1b.startedAt||(anyDone?nowTime():null),doneAt:allDone?nowTime():null}});
  };
  const editStepTextB1b = (id,text) => onUpdate({...task,bloco1b:{...b1b,steps:b1b.steps.map(s=>s.id===id?{...s,text}:s)}});
  const deleteStepB1b   = id => onUpdate({...task,bloco1b:{...b1b,steps:b1b.steps.filter(s=>s.id!==id)}});
  const addStepB1b      = text => { if(!text.trim())return; onUpdate({...task,bloco1b:{...b1b,steps:[...b1b.steps,{id:'b1b_'+Date.now(),text:text.trim(),done:false}]}}); setNewStep1b(''); };

  // Edição de passos
  const reloadBloco = (bloco) => {
    const id = bloco==='b1' ? 'default_b1' : 'default_b2';
    const manual = (manuals||[]).find(m=>String(m.id)===id);
    if(!manual) return alert('Manual não encontrado');
    const steps = (manual.steps||[]).map((s,i)=>({id:'m_'+(s.n||i)+'_'+Date.now(),text:s.action||s.text||String(s),done:false}));
    if(bloco==='b1') onUpdate({...task,bloco1:{...b1,steps,status:'pending',startedAt:null,doneAt:null,hasPayment:null}});
    else onUpdate({...task,bloco2:{...b2,steps,status:'pending',startedAt:null,doneAt:null}});
  };
  const editStepText = (bloco, id, text) => {
    if(bloco==='b1') onUpdate({...task,bloco1:{...b1,steps:b1.steps.map(s=>s.id===id?{...s,text}:s)}});
    else onUpdate({...task,bloco2:{...b2,steps:b2.steps.map(s=>s.id===id?{...s,text}:s)}});
  };
  const deleteStep = (bloco, id) => {
    if(bloco==='b1') onUpdate({...task,bloco1:{...b1,steps:b1.steps.filter(s=>s.id!==id)}});
    else onUpdate({...task,bloco2:{...b2,steps:b2.steps.filter(s=>s.id!==id)}});
  };
  const addStep = (bloco, text) => {
    if(!text.trim()) return;
    const newS = {id:'custom_'+Date.now(),text:text.trim(),done:false};
    if(bloco==='b1'){onUpdate({...task,bloco1:{...b1,steps:[...b1.steps,newS]}});setNewStep1('');}
    else{onUpdate({...task,bloco2:{...b2,steps:[...b2.steps,newS]}});setNewStep2('');}
  };

  const toggleB1 = id => {
    const steps=b1.steps.map(s=>s.id===id?{...s,done:!s.done}:s);
    const allDone=steps.every(s=>s.done), anyDone=steps.some(s=>s.done);
    onUpdate({...task,bloco1:{...b1,steps,status:allDone?'done':anyDone?'active':'pending',startedAt:b1.startedAt||(anyDone?nowTime():null),doneAt:allDone?nowTime():null}});
  };
  const toggleB2 = id => {
    const steps=b2.steps.map(s=>s.id===id?{...s,done:!s.done}:s);
    const allDone=steps.every(s=>s.done), anyDone=steps.some(s=>s.done);
    const b1bOk = !b1b.active || b1b.status==='done';
    const fd = (b1.opDone||false) && b1bOk && allDone;
    onUpdate({...task,bloco2:{...b2,steps,status:allDone?'done':anyDone?'active':'pending',startedAt:b2.startedAt||(anyDone?nowTime():null),doneAt:allDone?nowTime():null},fullyDone:fd});
  };
  const setPayment = has => {
    if(has) {
      const b2Upd = b2.active ? b2 : {...b2,active:true};
      // Op1 concluiu a parte dele (passou para Op2); fullyDone aguarda Op2
      onUpdate({...task,bloco1:{...b1,hasPayment:true,opDone:true,doneAt:b1.doneAt||nowTime()},bloco2:b2Upd,fullyDone:false});
      if(!b2.active){ notifyOp(client.op2_id,op2Name,'⚑ Pagamento — '+client.name,'Bloco 2 acionado. Verifique a fila do dia.'); if(!open)setOpen(true); }
    } else {
      // Sem pagamento — mostra campo de retorno, não conclui ainda
      onUpdate({...task,bloco1:{...b1,hasPayment:false,doneAt:b1.doneAt||nowTime()}});
    }
  };
  const finalizarRotina = () => {
    // Sem pagamento: Op1 concluiu, fullyDone depende de b1b também
    const b1bOk = !b1b.active || b1b.status==='done';
    onUpdate({...task,fullyDone:b1bOk,bloco1:{...b1,opDone:true,doneAt:b1.doneAt||nowTime()}});
  };
  const handleTransfer = opId => {
    const tOp = operators.find(o=>String(o.id)===String(opId));
    onUpdate({...task, assignedTo: opId});
    if(tOp) notifyOp(tOp.id, tOp.name.split(' ')[0], '↗ Tarefa transferida', `Tarefa de ${client.name} transferida para você.`);
    setTransfer(false);
  };
  // Borda do card: vermelho se travado, verde se tudo concluído, azul se ativo, cinza se pendente
  const os = task.fullyDone?'done':(b1.status==='active'||b2.status==='active')?'active':b1.status;
  const isWaitingCard = !!task.waiting;

  return (
    <div className="card fade-in" style={{marginBottom:'10px',overflow:'hidden',opacity:task.fullyDone?.7:1,borderLeft:isWaitingCard?'3px solid #dc2626':'none'}}>
      {/* ── Cabeçalho ── */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px',cursor:'pointer',transition:'background .15s'}}
        onClick={()=>setOpen(!open)}
        onMouseEnter={e=>e.currentTarget.style.background='#fafafa'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{width:'34px',height:'34px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,flexShrink:0,background:task.fullyDone?'rgba(0,196,140,.15)':'#060505',color:'#00C48C'}}>
          {task.fullyDone?'✓':client.priority}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
            <span style={{fontWeight:700,color:'#060505',fontSize:'15px'}}>{client.name}</span>
            {/* Status independente Op1 */}
            <span style={{fontSize:'11px',fontWeight:700,padding:'2px 9px',borderRadius:'20px',
              background:b1.opDone?'rgba(0,196,140,.12)':b1.status==='active'?'rgba(13,110,253,.1)':'rgba(148,163,184,.12)',
              color:b1.opDone?'#00C48C':b1.status==='active'?'#0D6EFD':'#94a3b8'}}>
              {op1Name} {b1.opDone?'✓':b1.status==='active'?'●':'○'}
            </span>
            {/* Status independente Op1b — só quando ativo */}
            {b1b.active&&(
              <span style={{fontSize:'11px',fontWeight:700,padding:'2px 9px',borderRadius:'20px',
                background:b1b.status==='done'?'rgba(0,196,140,.12)':b1b.status==='active'?'rgba(124,58,237,.1)':'rgba(148,163,184,.12)',
                color:b1b.status==='done'?'#00C48C':b1b.status==='active'?'#7c3aed':'#94a3b8'}}>
                {op3Name} {b1b.status==='done'?'✓':b1b.status==='active'?'●':'○'}
              </span>
            )}
            {/* Status independente Op2 — só quando ativo */}
            {b2.active&&(
              <span style={{fontSize:'11px',fontWeight:700,padding:'2px 9px',borderRadius:'20px',
                background:b2.status==='done'?'rgba(0,196,140,.12)':b2.status==='active'?'rgba(13,110,253,.1)':'rgba(148,163,184,.12)',
                color:b2.status==='done'?'#00C48C':b2.status==='active'?'#0D6EFD':'#94a3b8'}}>
                {op2Name} {b2.status==='done'?'✓':b2.status==='active'?'●':'○'}
              </span>
            )}
            {bTarde&&<span className="badge" style={{background:'rgba(245,158,11,.15)',color:'#d97706',fontSize:'10px'}}>{ROTINA_TIPOS[bTarde.tipo]?.icon||'🌆'} {bTarde.status==='done'?'Tarde ✓':'Tarde'} {bTardeDone}/{bTarde.steps.length}</span>}
            {assignedOp&&<span className="badge" style={{background:'rgba(249,115,22,.12)',color:'#ea580c'}}>→ {assignedOp.name}</span>}
            {isWaitingCard&&<span className="badge" style={{background:'rgba(220,38,38,.12)',color:'#dc2626'}}>🚫 Travado {task.waiting_since&&`às ${task.waiting_since}`}</span>}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',marginTop:'4px'}}>{(client.banks||[]).map(b=><BankBadge key={b} bank={b}/>)}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0}}>
          {isWaitingCard ? (
            <button className="btn-success" style={{padding:'4px 12px',fontSize:'11px'}} onClick={e=>{e.stopPropagation();onUpdate({...task,waiting:false,waiting_since:null});}}>▶ Continuar</button>
          ) : (
            <>
          {String(currentUser?.id)===String(client.op2_id)&&!task.fullyDone&&(
            <button title="Definir rotina para hoje" onClick={e=>{e.stopPropagation();setShowModelPicker(s=>!s);if(!open)setOpen(true);}}
              style={{background:showModelPicker?'rgba(124,58,237,.2)':'rgba(124,58,237,.1)',color:'#7c3aed',border:'none',cursor:'pointer',borderRadius:'7px',padding:'4px 10px',fontSize:'11px',fontWeight:600}}>
              ⇄ Modelo
            </button>
          )}
          {hasPaymentFlow&&!b2.active&&!task.fullyDone&&String(currentUser?.id)!==String(client.op2_id)&&(
            <button title="Iniciar em paralelo" style={{background:'rgba(13,110,253,.12)',color:'#0D6EFD',border:'none',cursor:'pointer',borderRadius:'7px',padding:'4px 10px',fontSize:'11px',fontWeight:600}}
              onClick={e=>{e.stopPropagation();onUpdate({...task,bloco2:{...b2,active:true}});notifyOp(client.op2_id,op2Name,'⚑ '+client.name,'Bloco 2 acionado. Verifique a fila do dia.');setOpen(true);}}>▶ {op2Name}</button>
          )}
          {!task.fullyDone && b1.status!=='pending' && (
            <button className="btn-orange" style={{padding:'4px 10px',fontSize:'11px'}} onClick={e=>{e.stopPropagation();setTransfer(true);}}>↗ Transferir</button>
          )}
          {!task.fullyDone&&(
            <button title="Marcar como travado" style={{background:'rgba(220,38,38,.08)',color:'#dc2626',border:'none',cursor:'pointer',borderRadius:'7px',padding:'4px 10px',fontSize:'11px',fontWeight:600}}
              onClick={e=>{e.stopPropagation();onUpdate({...task,waiting:true,waiting_since:nowTime()});}}>🚫 Travou</button>
          )}
            </>
          )}
          <div style={{textAlign:'right',minWidth:'70px'}}>
            <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>{b1done}/{b1.steps.length}</div>
            <ProgressBar value={b1done} max={b1.steps.length}/>
          </div>
          <span style={{color:'#94a3b8',fontSize:'12px'}}>{open?'▲':'▼'}</span>
        </div>
      </div>

      {/* ── Picker de modelo Op2 — apenas bloco2, nunca toca bloco1/bloco1b ── */}
      {showModelPicker&&String(currentUser?.id)===String(client.op2_id)&&(
        <div style={{borderTop:'1px solid #e9e4f8',padding:'12px 16px',background:'rgba(124,58,237,.04)'}} className="fade-in">
          <div style={{fontSize:'11px',fontWeight:700,color:'#7c3aed',marginBottom:'8px'}}>⇄ Definir modelo do seu bloco para hoje:</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
            {Object.entries(ROTINA_TIPOS).filter(([k])=>k!=='auditoria').map(([k,v])=>{
              const isCurrent=(b2.tipo||client.rotina_tipo||'padrao')===k;
              return (
                <button key={k} onClick={()=>{
                  const steps=k==='padrao'?BLOCO1.map(s=>({...s,done:false})):(v.steps||[]).map(s=>({...s,done:false}));
                  // ⚠️ só atualiza bloco2 — bloco1 e bloco1b ficam intocados
                  onUpdate({...task, bloco2:{...b2, steps, tipo:k, active:true}});
                  setShowModelPicker(false);
                }} style={{display:'flex',alignItems:'center',gap:'6px',padding:'6px 12px',borderRadius:'8px',border:`1.5px solid ${isCurrent?'#7c3aed':'#e2e8f0'}`,cursor:'pointer',background:isCurrent?'rgba(124,58,237,.1)':'#fff',color:isCurrent?'#7c3aed':'#374151',fontSize:'12px',fontWeight:isCurrent?700:400}}>
                  <span>{v.icon}</span>
                  <span>{v.label}</span>
                  <span style={{fontSize:'10px',color:'#94a3b8',marginLeft:'2px'}}>{v.steps?.length||BLOCO1.length}p</span>
                  {isCurrent&&<span style={{fontSize:'10px',color:'#7c3aed'}}>✓</span>}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Corpo expandido ── */}
      {open && (
        <div style={{borderTop:'1px solid #f1f5f9',display:'grid',gridTemplateColumns:(b1b.active&&b2.active)?'1fr 1fr 1fr':((b1b.active||b2.active)?'1fr 1fr':'1fr')}} className="fade-in">
          {/* Bloco 1 */}
          <div style={{padding:'16px',borderRight:(b1b.active||b2.active)?'1px solid #f1f5f9':'none'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
              <span className="badge" style={{background:'#060505',color:'#00C48C'}}>
                {client.rotina_tipo&&client.rotina_tipo!=='padrao'?`${ROTINA_TIPOS[client.rotina_tipo]?.icon||''} ${ROTINA_TIPOS[client.rotina_tipo]?.label}`:'Bloco 1'} — {op1Name}
              </span>
              {b1.startedAt&&<span style={{fontSize:'11px',color:'#94a3b8'}}>Início: {b1.startedAt}</span>}
              {b1.doneAt&&<span style={{fontSize:'11px',color:'#00C48C'}}>✓ {b1.doneAt}</span>}
              <div style={{marginLeft:'auto',display:'flex',gap:'6px'}}>
                {b1.status==='pending'&&<button onClick={()=>reloadBloco('b1')} title="Recarregar passos do manual" style={{fontSize:'11px',background:'rgba(0,196,140,.1)',color:'#00C48C',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>↺ Manual</button>}
                <button onClick={()=>setEditB1(!editB1)} title="Editar passos" style={{fontSize:'11px',background:editB1?'rgba(249,115,22,.15)':'rgba(100,116,139,.1)',color:editB1?'#ea580c':'#64748b',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>{editB1?'✓ Feito':'✎ Editar'}</button>
              </div>
            </div>
            <ProgressBar value={b1done} max={b1.steps.length}/>
            <div style={{display:'flex',flexDirection:'column',gap:'4px',marginTop:'10px'}}>
              {b1.steps.map(step=>(
                <div key={step.id} style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'6px 8px',borderRadius:'8px',transition:'background .1s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#f8fafb'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  {!editB1 && <input type="checkbox" checked={step.done} onChange={()=>toggleB1(step.id)} style={{marginTop:'3px',flexShrink:0}}/>}
                  {editB1
                    ? <input className="input-field" style={{flex:1,fontSize:'13px',padding:'4px 8px'}} value={step.text} onChange={e=>editStepText('b1',step.id,e.target.value)}/>
                    : <span style={{fontSize:'13px',color:step.done?'#aaa':'#374151',flex:1,cursor:'pointer'}} className={step.done?'step-done':''}>{step.text}</span>
                  }
                  {editB1&&<button onClick={()=>deleteStep('b1',step.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'14px',flexShrink:0,padding:0}}>✕</button>}
                </div>
              ))}
            </div>
            {editB1&&(
              <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
                <input className="input-field" style={{flex:1,fontSize:'13px'}} placeholder="+ Novo passo..." value={newStep1} onChange={e=>setNewStep1(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addStep('b1',newStep1);}}/>
                <button className="btn-green" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>addStep('b1',newStep1)}>+</button>
              </div>
            )}
            <textarea className="input-field" style={{marginTop:'10px',fontSize:'13px'}} placeholder="Observações desta execução..." value={b1.notes||''} onChange={e=>onUpdate({...task,bloco1:{...b1,notes:e.target.value}})} rows="2"/>
            {onAddExtra&&<PendenciaSection client={client} operatorId={currentUser?.id||client.op1_id} today={todayStr()} onAddExtra={onAddExtra}/>}
            {/* Fluxo de conclusão — COM pagamento (padrão / com_cap) */}
            {hasPaymentFlow&&b1.status==='done'&&b1.hasPayment===null&&(
              <div className="decision-box fade-in">
                <p style={{fontSize:'13px',fontWeight:700,color:'#00C48C',marginBottom:'10px'}}>⚑ Tem pagamento para hoje?</p>
                {b2.status==='done' ? (
                  <div>
                    <div style={{fontSize:'12px',color:'#00C48C',marginBottom:'10px',padding:'6px 10px',background:'rgba(0,196,140,.08)',borderRadius:'8px'}}>✓ {op2Name} já finalizou os pagamentos</div>
                    <button className="btn-success" style={{width:'100%'}}
                      onClick={()=>onUpdate({...task,bloco1:{...b1,hasPayment:true,opDone:true,doneAt:b1.doneAt||nowTime()},fullyDone:true})}>✓ Confirmar e Concluir</button>
                  </div>
                ) : b2.active ? (
                  <div>
                    <div style={{fontSize:'12px',color:'#0D6EFD',marginBottom:'10px',padding:'6px 10px',background:'rgba(13,110,253,.06)',borderRadius:'8px'}}>ℹ {op2Name} já foi acionado — aguardando conclusão</div>
                    <div style={{display:'flex',gap:'10px'}}>
                      <button className="btn-blue" style={{flex:1}} onClick={()=>onUpdate({...task,bloco1:{...b1,hasPayment:true,opDone:true,doneAt:b1.doneAt||nowTime()},fullyDone:false})}>✓ Sim — aguardando {op2Name}</button>
                      <button className="btn-success" style={{flex:1}} onClick={()=>setPayment(false)}>✗ Não tinha pagamento</button>
                    </div>
                  </div>
                ) : (
                  <div style={{display:'flex',gap:'10px'}}>
                    <button className="btn-blue" style={{flex:1}} onClick={()=>setPayment(true)}>✓ Sim — acionar {op2Name}</button>
                    <button className="btn-success" style={{flex:1}} onClick={()=>setPayment(false)}>✗ Não — rotina enviada</button>
                  </div>
                )}
              </div>
            )}
            {hasPaymentFlow&&b1.hasPayment===false&&(
              <div className="return-box fade-in">
                <p style={{fontSize:'11px',fontWeight:700,color:'#0D6EFD',marginBottom:'6px'}}>📱 Mensagem de retorno ao cliente:</p>
                <textarea className="input-field" placeholder="Texto para enviar via WhatsApp..." value={b1.returnMsg||''} onChange={e=>onUpdate({...task,bloco1:{...b1,returnMsg:e.target.value}})} rows="3" style={{fontSize:'13px'}}/>
                {!task.fullyDone&&(
                  <button className="btn-success" style={{width:'100%',marginTop:'10px',fontSize:'13px',padding:'9px'}}
                    onClick={finalizarRotina}>✓ Rotina Enviada — Concluir</button>
                )}
              </div>
            )}
            {/* Fluxo de conclusão — SEM pagamento (conciliação, bancos, sem_cap, etc.) */}
            {!hasPaymentFlow&&b1.status==='done'&&!task.fullyDone&&(
              <div style={{marginTop:'12px'}} className="fade-in">
                <button className="btn-success" style={{width:'100%',fontSize:'13px',padding:'10px',fontWeight:700}}
                  onClick={finalizarRotina}>✓ Concluir Rotina</button>
              </div>
            )}
          </div>
          {/* Bloco 1b — Co-rotina Op3, ativo desde o início do dia */}
          {b1b.active&&(
            <div style={{padding:'16px',borderRight:b2.active?'1px solid #f1f5f9':'none',background:'rgba(124,58,237,.02)'}} className="fade-in">
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
                <span className="badge" style={{background:'#060505',color:'#7c3aed'}}>{client.bloco1b_name||'Bloco 1b'} — {op3Name}</span>
                {b1b.startedAt&&<span style={{fontSize:'11px',color:'#94a3b8'}}>Início: {b1b.startedAt}</span>}
                {b1b.doneAt&&<span style={{fontSize:'11px',color:'#00C48C'}}>✓ {b1b.doneAt}</span>}
                <div style={{marginLeft:'auto'}}>
                  <button onClick={()=>setEditB1b(!editB1b)} style={{fontSize:'11px',background:editB1b?'rgba(249,115,22,.15)':'rgba(100,116,139,.1)',color:editB1b?'#ea580c':'#64748b',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>{editB1b?'✓ Feito':'✎ Editar'}</button>
                </div>
              </div>
              <ProgressBar value={b1bdone} max={b1b.steps.length}/>
              <div style={{display:'flex',flexDirection:'column',gap:'4px',marginTop:'10px'}}>
                {b1b.steps.map(step=>(
                  <div key={step.id} style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'6px 8px',borderRadius:'8px',transition:'background .1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(124,58,237,.05)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    {!editB1b&&<input type="checkbox" checked={step.done} onChange={()=>toggleB1b(step.id)} style={{marginTop:'3px',flexShrink:0}}/>}
                    {editB1b
                      ? <input className="input-field" style={{flex:1,fontSize:'13px',padding:'4px 8px'}} value={step.text} onChange={e=>editStepTextB1b(step.id,e.target.value)}/>
                      : <span style={{fontSize:'13px',color:step.done?'#aaa':'#374151',flex:1}} className={step.done?'step-done':''}>{step.text}</span>
                    }
                    {editB1b&&<button onClick={()=>deleteStepB1b(step.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'14px',flexShrink:0,padding:0}}>✕</button>}
                  </div>
                ))}
                {b1b.steps.length===0&&<div style={{fontSize:'12px',color:'#94a3b8',fontStyle:'italic',padding:'8px'}}>Nenhum passo configurado — use ✎ Editar para adicionar</div>}
              </div>
              {editB1b&&(
                <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
                  <input className="input-field" style={{flex:1,fontSize:'13px'}} placeholder="+ Novo passo..." value={newStep1b} onChange={e=>setNewStep1b(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addStepB1b(newStep1b);}}/>
                  <button className="btn-green" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>addStepB1b(newStep1b)}>+</button>
                </div>
              )}
              <textarea className="input-field" style={{marginTop:'10px',fontSize:'13px'}} placeholder="Observações..." value={b1b.notes||''} onChange={e=>onUpdate({...task,bloco1b:{...b1b,notes:e.target.value}})} rows="2"/>
            </div>
          )}
          {/* Bloco 2 — aparece lado a lado quando ativo */}
          {b2.active&&(
            <div style={{padding:'16px',background:'rgba(13,110,253,.03)'}} className="fade-in">
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}}>
                <span className="badge" style={{background:'#060505',color:'#0D6EFD'}}>Bloco 2 — {op2Name}</span>
                {b2.startedAt&&<span style={{fontSize:'11px',color:'#94a3b8'}}>Início: {b2.startedAt}</span>}
                {b2.doneAt&&<span style={{fontSize:'11px',color:'#00C48C'}}>✓ {b2.doneAt}</span>}
                <div style={{marginLeft:'auto',display:'flex',gap:'6px'}}>
                  {b2.status==='pending'&&<button onClick={()=>reloadBloco('b2')} title="Recarregar passos do manual" style={{fontSize:'11px',background:'rgba(13,110,253,.1)',color:'#0D6EFD',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>↺ Manual</button>}
                  <button onClick={()=>setEditB2(!editB2)} style={{fontSize:'11px',background:editB2?'rgba(249,115,22,.15)':'rgba(100,116,139,.1)',color:editB2?'#ea580c':'#64748b',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>{editB2?'✓ Feito':'✎ Editar'}</button>
                </div>
              </div>
              <ProgressBar value={b2done} max={b2.steps.length}/>
              <div style={{display:'flex',flexDirection:'column',gap:'4px',marginTop:'10px'}}>
                {b2.steps.map(step=>(
                  <div key={step.id} style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'6px 8px',borderRadius:'8px',transition:'background .1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(13,110,253,.05)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    {!editB2&&<input type="checkbox" checked={step.done} onChange={()=>toggleB2(step.id)} style={{marginTop:'3px',flexShrink:0}}/>}
                    {editB2
                      ? <input className="input-field" style={{flex:1,fontSize:'13px',padding:'4px 8px'}} value={step.text} onChange={e=>editStepText('b2',step.id,e.target.value)}/>
                      : <span style={{fontSize:'13px',color:step.done?'#aaa':'#374151',flex:1}} className={step.done?'step-done':''}>{step.text}</span>
                    }
                    {editB2&&<button onClick={()=>deleteStep('b2',step.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'14px',flexShrink:0,padding:0}}>✕</button>}
                  </div>
                ))}
              </div>
              {editB2&&(
                <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
                  <input className="input-field" style={{flex:1,fontSize:'13px'}} placeholder="+ Novo passo..." value={newStep2} onChange={e=>setNewStep2(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addStep('b2',newStep2);}}/>
                  <button className="btn-green" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>addStep('b2',newStep2)}>+</button>
                </div>
              )}
              <textarea className="input-field" style={{marginTop:'10px',fontSize:'13px'}} placeholder="Observações dos pagamentos..." value={b2.notes||''} onChange={e=>onUpdate({...task,bloco2:{...b2,notes:e.target.value}})} rows="2"/>
              {b2.status==='done'&&(
                <div className="return-box fade-in">
                  <p style={{fontSize:'11px',fontWeight:700,color:'#0D6EFD',marginBottom:'6px'}}>📱 Mensagem de retorno ao cliente:</p>
                  <textarea className="input-field" placeholder="Retorno ao cliente via WhatsApp..." value={b2.returnMsg||''} onChange={e=>onUpdate({...task,bloco2:{...b2,returnMsg:e.target.value}})} rows="3" style={{fontSize:'13px'}}/>
                </div>
              )}
            </div>
          )}
        </div>
      )}
      {transfer&&<TransferModal clientName={client.name} operators={operators} currentUser={currentUser} onTransfer={handleTransfer} onClose={()=>setTransfer(false)}/>}
    </div>
  );
}

// ── CARD TARDE ───────────────────────────────────────
function BlocoTardeCard({client, task, operators, onUpdate, onAddExtra}) {
  const [open,setOpen]       = useState(false);
  const [editMode,setEditMode] = useState(false);
  const [newStep,setNewStep]  = useState('');
  const bTarde = task?.bloco_tarde;
  if(!bTarde) return null;
  const op1 = operators.find(o=>String(o.id)===String(client.op1_id));
  const op1Name = op1 ? op1.name.split(' ')[0] : 'Operador';
  const done = bTarde.steps.filter(s=>s.done).length;
  const total = bTarde.steps.length;
  const modelo = ROTINA_TIPOS[bTarde.tipo]||{icon:'🌆',label:'Tarde'};

  const toggle = id => {
    const steps = bTarde.steps.map(s=>s.id===id?{...s,done:!s.done}:s);
    const allDone=steps.every(s=>s.done), anyDone=steps.some(s=>s.done);
    onUpdate({...task,bloco_tarde:{...bTarde,steps,status:allDone?'done':anyDone?'active':'pending',startedAt:bTarde.startedAt||(anyDone?nowTime():null),doneAt:allDone?nowTime():null}});
  };
  const editText = (id,text) => onUpdate({...task,bloco_tarde:{...bTarde,steps:bTarde.steps.map(s=>s.id===id?{...s,text}:s)}});
  const delStep  = id => onUpdate({...task,bloco_tarde:{...bTarde,steps:bTarde.steps.filter(s=>s.id!==id)}});
  const addStep  = txt => { if(!txt.trim())return; onUpdate({...task,bloco_tarde:{...bTarde,steps:[...bTarde.steps,{id:'bt_'+Date.now(),text:txt.trim(),done:false}]}}); setNewStep(''); };

  const isDone = bTarde.status==='done';
  const isActive = bTarde.status==='active';
  const borderColor = isDone?'#00C48C':isActive?'#f59e0b':'#e2e8f0';

  return (
    <div className="card fade-in" style={{marginBottom:'10px',overflow:'hidden',opacity:isDone?.75:1,borderLeft:`3px solid ${borderColor}`}}>
      {/* Cabeçalho */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 16px',cursor:'pointer',transition:'background .15s'}}
        onClick={()=>setOpen(!open)}
        onMouseEnter={e=>e.currentTarget.style.background='#fdfcf5'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <div style={{width:'32px',height:'32px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:0,
          background:isDone?'rgba(0,196,140,.15)':'rgba(245,158,11,.12)',color:isDone?'#00C48C':'#d97706',fontWeight:700}}>
          {isDone?'✓':modelo.icon}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
            <span style={{fontWeight:700,color:'#060505',fontSize:'15px'}}>{client.name}</span>
            <span className="badge" style={{background:isDone?'rgba(0,196,140,.12)':isActive?'rgba(245,158,11,.15)':'rgba(148,163,184,.12)',color:isDone?'#00C48C':isActive?'#d97706':'#94a3b8',fontSize:'10px'}}>
              {isDone?'✓ Concluído':isActive?'● Em andamento':'○ Pendente'}
            </span>
          </div>
          <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}}>{modelo.label} · {op1Name}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0}}>
          <div style={{textAlign:'right',minWidth:'60px'}}>
            <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'3px'}}>{done}/{total}</div>
            <ProgressBar value={done} max={total}/>
          </div>
          <span style={{color:'#94a3b8',fontSize:'12px'}}>{open?'▲':'▼'}</span>
        </div>
      </div>

      {/* Corpo expandido */}
      {open&&(
        <div style={{borderTop:'1px solid #fef3c7',padding:'16px',background:'rgba(254,243,199,.25)'}} className="fade-in">
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}}>
            {bTarde.startedAt&&<span style={{fontSize:'11px',color:'#94a3b8'}}>Início: {bTarde.startedAt}</span>}
            {bTarde.doneAt&&<span style={{fontSize:'11px',color:'#00C48C'}}>✓ {bTarde.doneAt}</span>}
            <div style={{marginLeft:'auto'}}>
              <button onClick={()=>setEditMode(!editMode)} style={{fontSize:'11px',background:editMode?'rgba(249,115,22,.15)':'rgba(100,116,139,.1)',color:editMode?'#ea580c':'#64748b',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>{editMode?'✓ Feito':'✎ Editar'}</button>
            </div>
          </div>
          <ProgressBar value={done} max={total}/>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',marginTop:'10px'}}>
            {bTarde.steps.map(step=>(
              <div key={step.id} style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'6px 8px',borderRadius:'8px',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(245,158,11,.07)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                {!editMode&&<input type="checkbox" checked={step.done} onChange={()=>toggle(step.id)} style={{marginTop:'3px',flexShrink:0}}/>}
                {editMode
                  ? <input className="input-field" style={{flex:1,fontSize:'13px',padding:'4px 8px'}} value={step.text} onChange={e=>editText(step.id,e.target.value)}/>
                  : <span style={{fontSize:'13px',color:step.done?'#aaa':'#374151',flex:1,cursor:'pointer'}} className={step.done?'step-done':''}>{step.text}</span>
                }
                {editMode&&<button onClick={()=>delStep(step.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'14px',flexShrink:0,padding:0}}>✕</button>}
              </div>
            ))}
          </div>
          {editMode&&(
            <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
              <input className="input-field" style={{flex:1,fontSize:'13px'}} placeholder="+ Novo passo..." value={newStep} onChange={e=>setNewStep(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addStep(newStep);}}/>
              <button className="btn-green" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>addStep(newStep)}>+</button>
            </div>
          )}
          <textarea className="input-field" style={{marginTop:'10px',fontSize:'13px'}} placeholder="Observações..." value={bTarde.notes||''} onChange={e=>onUpdate({...task,bloco_tarde:{...bTarde,notes:e.target.value}})} rows="2"/>
          {onAddExtra&&<PendenciaSection client={client} operatorId={client.op1_id} today={todayStr()} onAddExtra={onAddExtra}/>}
        </div>
      )}
    </div>
  );
}

// ── FILA DO DIA ──────────────────────────────────────
function FilaDoDia({clients, dayTasks, operators, currentUser, onUpdateTask, extraTasks, onUpdateExtra, onDeleteExtra, onAddExtra, manuals}) {
  const today = todayStr();
  const bizDay = isBusinessDay(today);
  const isAdmin = currentUser?.role === 'admin';
  const [viewAs, setViewAs]       = useState(String(currentUser?.id||''));
  const [showHistory, setShowHistory] = useState(false);
  const [history, setHistory]         = useState([]);
  const [loadingHist, setLoadingHist] = useState(false);

  const loadHistory = async () => {
    if(history.length>0){setShowHistory(s=>!s);return;}
    setLoadingHist(true);
    try { const h=await API.get('/api/day-tasks/history?days=14'); setHistory(h||[]); setShowHistory(true); } catch{}
    setLoadingHist(false);
  };

  const sorted = [...clients].sort((a,b)=>a.priority-b.priority);
  const priStyle = {critical:{bg:'rgba(185,28,28,.15)',color:'#b91c1c',label:'🔴 CRÍTICO'},high:{bg:'rgba(220,38,38,.1)',color:'#dc2626',label:'Alta'},normal:{bg:'rgba(13,110,253,.1)',color:'#0D6EFD',label:'Normal'},low:{bg:'rgba(148,163,184,.15)',color:'#64748b',label:'Baixa'}};
  const getClient = id=>clients.find(c=>String(c.id)===String(id));
  const getOp     = id=>operators.find(o=>String(o.id)===String(id));

  const santosSorted    = sorted.filter(c=>(c.tipo||'santos')==='santos');
  const outrosSorted    = sorted.filter(c=>c.tipo==='outros');
  const outrosComRotina = outrosSorted.filter(c=>c.rotina?.bloco1?.steps?.length>0);
  const outrosSemRotina = outrosSorted.filter(c=>!c.rotina?.bloco1?.steps?.length);
  const outrosClientIds = new Set(outrosSorted.map(c=>String(c.id)));

  // Tarefas atrasadas — filtradas pelo operador selecionado
  const tarefasAtrasadas = (extraTasks||[]).filter(t=>
    t.due_date && t.due_date<today && t.status!=='done' && t.status!=='waiting' &&
    (viewAs==='all' || String(t.operator_id||'')===String(viewAs))
  );

  // Stats globais
  const filterOp = id => viewAs==='all' || String(id||'')===String(viewAs);
  const totalSantos = santosSorted.filter(c=>filterOp(c.op1_id)).length;
  const doneSantos  = santosSorted.filter(c=>filterOp(c.op1_id)&&dayTasks[c.id]?.fullyDone).length;
  const pendingFila = (extraTasks||[]).filter(t=>t.due_date===today&&t.status!=='done'&&t.status!=='waiting'&&filterOp(t.operator_id)).length;
  const waitingCount = (extraTasks||[]).filter(t=>t.status==='waiting'&&filterOp(t.operator_id)).length
    + santosSorted.filter(c=>dayTasks[c.id]?.waiting&&(filterOp(c.op1_id)||filterOp(c.op2_id))).length
    + outrosComRotina.filter(c=>dayTasks[c.id]?.waiting&&(filterOp(c.op1_id)||filterOp(c.op2_id))).length;

  // --- Helpers por operador ---
  const getRotinaForOp = (opId) => {
    const sId = String(opId);
    const isOwnView = viewAs !== 'all';

    // Universo completo por op (para stats)
    const allOp1 = santosSorted.filter(c=>String(c.op1_id||'')===sId);
    const allOp2 = santosSorted.filter(c=>String(c.op2_id||'')===sId && String(c.op1_id||'')!==sId);

    // O que APARECE na fila — cada op vê apenas o que AINDA lhe falta fazer
    const asOp1 = isOwnView
      ? allOp1.filter(c=>dayTasks[c.id]?.bloco1?.status!=='done')   // Op1: some quando bloco1 concluído
      : allOp1.filter(c=>!dayTasks[c.id]?.fullyDone);               // Admin "Todos": some só quando tudo done

    const asOp2 = isOwnView
      ? allOp2.filter(c=>dayTasks[c.id]?.bloco2?.status!=='done')   // Op2: some quando bloco2 concluído
      : allOp2.filter(c=>dayTasks[c.id]?.bloco2?.active && dayTasks[c.id]?.bloco2?.status!=='done');

    const outros = outrosComRotina.filter(c=>String(c.op1_id||'')===sId || String(c.op2_id||'')===sId);

    // Stats: feitos vs total (refletem o trabalho do próprio operador)
    const totalStats = allOp1.length + allOp2.length + outros.length;
    const doneStats  = isOwnView
      ? allOp1.filter(c=>dayTasks[c.id]?.bloco1?.status==='done').length
        + allOp2.filter(c=>dayTasks[c.id]?.bloco2?.status==='done').length
        + outros.filter(c=>dayTasks[c.id]?.fullyDone).length
      : allOp1.filter(c=>dayTasks[c.id]?.fullyDone).length
        + outros.filter(c=>dayTasks[c.id]?.fullyDone).length;

    return { asOp1, asOp2, outros, totalStats, doneStats };
  };
  const getFilaForOp = (opId) => {
    const sId = String(opId);
    // Rotinas gerais: recorrentes, cliente=Geral, atribuídas ao op, vencendo hoje, não concluídas
    const geralTasks = (extraTasks||[]).filter(t=>
      t.due_date===today && t.status!=='done' && t.status!=='waiting' &&
      String(t.operator_id||'')===sId && !t.client_id && t.recurring
    ).sort((a,b)=>{const po={high:0,normal:1,low:2};return (po[a.priority]??1)-(po[b.priority]??1);});
    // Outros clients (sem rotina) com tarefas de HOJE atribuídas a este operador
    // — usa o operator_id da tarefa, não do cliente, para cobrir clientes sem op definido (ex: RBJ)
    const outrosCli = outrosSemRotina.filter(c=>
      (extraTasks||[]).some(t=>
        String(t.client_id)===String(c.id) &&
        t.due_date===today &&
        t.status!=='done' &&
        t.status!=='waiting' &&
        String(t.operator_id||'')===sId
      )
    );
    // Unassigned or Santos-client tasks (no outrosClientIds) for this op — exclui as rotinas gerais já separadas
    const standaloneForOp = (extraTasks||[]).filter(t=>
      t.due_date===today && t.status!=='done' && t.status!=='waiting' &&
      String(t.operator_id||'')===sId && !outrosClientIds.has(String(t.client_id||'')) &&
      !(t.recurring && !t.client_id)
    ).sort((a,b)=>{const po={high:0,normal:1,low:2};return (po[a.priority]??1)-(po[b.priority]??1);});
    return { geralTasks, myTasks: standaloneForOp, outrosCli };
  };
  const getAguardandoForOp = (opId) => {
    const sId = String(opId);
    const waitingExtras = (extraTasks||[]).filter(t=>t.status==='waiting' && String(t.operator_id||'')===sId);
    // Clientes travados: aparece apenas na seção do Op1 para evitar duplicata no admin
    const waitingSantos  = santosSorted.filter(c=>dayTasks[c.id]?.waiting && String(c.op1_id||'')===sId);
    const waitingOutros  = outrosComRotina.filter(c=>dayTasks[c.id]?.waiting && String(c.op1_id||'')===sId);
    return { waitingExtras, waitingSantos, waitingOutros };
  };

  // Tarefas sem operador (só admin vê)
  const semOpFila = (extraTasks||[]).filter(t=>
    t.due_date===today && t.status!=='done' && t.status!=='waiting' &&
    !operators.some(o=>String(o.id)===String(t.operator_id||''))
  );

  // Operadores a exibir
  const allOpIds = [...new Set([
    ...santosSorted.flatMap(c=>[c.op1_id,c.op2_id,c.op3_id]),
    ...outrosComRotina.flatMap(c=>[c.op1_id,c.op2_id]),
    ...(extraTasks||[]).filter(t=>t.due_date===today).map(t=>t.operator_id),
  ].filter(Boolean).map(String))];
  const opsToShow = viewAs==='all'
    ? operators.filter(o=>!o.noLogin && allOpIds.includes(String(o.id)))
    : operators.filter(o=>String(o.id)===String(viewAs));

  const SectionHeader = ({color, label, count, sub}) => (
    <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
      <span style={{width:'9px',height:'9px',borderRadius:'50%',background:color,display:'inline-block',flexShrink:0}}/>
      <span style={{fontSize:'11px',fontWeight:700,color,letterSpacing:'1px',textTransform:'uppercase'}}>{label}</span>
      {sub&&<span style={{fontSize:'11px',color:'#94a3b8'}}>{sub}</span>}
    </div>
  );

  return (
    <div>
      {/* Banner dia não útil */}
      {!bizDay&&(
        <div className="card fade-in" style={{padding:'14px 18px',marginBottom:'16px',borderLeft:'3px solid #f59e0b',background:'rgba(245,158,11,.06)',display:'flex',alignItems:'center',gap:'12px'}}>
          <span style={{fontSize:'22px'}}>🏖️</span>
          <div>
            <div style={{fontWeight:700,color:'#d97706',fontSize:'14px'}}>Rotinas diárias suspensas</div>
            <div style={{fontSize:'12px',color:'#92400e',marginTop:'2px'}}>Hoje é feriado ou fim de semana — as rotinas não são geradas. Tarefas extras e atrasadas continuam visíveis abaixo.</div>
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginBottom:'20px'}}>
        <div className="stat-card">
          <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>🔵 Rotinas</div>
          <div style={{fontSize:'32px',fontWeight:700,color:'#00C48C'}}>{doneSantos}<span style={{fontSize:'18px',color:'#64748b'}}>/{totalSantos}</span></div>
          <ProgressBar value={doneSantos} max={totalSantos}/>
        </div>
        <div className="stat-card">
          <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>🟡 Fila do Dia</div>
          <div style={{fontSize:'32px',fontWeight:700,color:'#fff'}}>{pendingFila}</div>
          <div style={{fontSize:'11px',color:'#64748b',marginTop:'4px'}}>tarefa{pendingFila!==1?'s':''} pendente{pendingFila!==1?'s':''}</div>
        </div>
        <div className="stat-card">
          <div style={{fontSize:'11px',color:'#dc2626',marginBottom:'4px'}}>🔴 Aguardando</div>
          <div style={{fontSize:'32px',fontWeight:700,color:waitingCount>0?'#dc2626':'#fff'}}>{waitingCount}</div>
          <div style={{fontSize:'11px',color:'#64748b',marginTop:'4px'}}>{waitingCount===0?'nenhum bloqueio':'bloqueada'+(waitingCount!==1?'s':'')}</div>
        </div>
        <div className="stat-card">
          <div style={{fontSize:'11px',color:'#f59e0b',marginBottom:'4px'}}>⚠️ Em Atraso</div>
          <div style={{fontSize:'32px',fontWeight:700,color:tarefasAtrasadas.length>0?'#f59e0b':'#fff'}}>{tarefasAtrasadas.length}</div>
          <div style={{fontSize:'11px',color:'#64748b',marginTop:'4px'}}>{tarefasAtrasadas.length===0?'em dia':'tarefa'+(tarefasAtrasadas.length!==1?'s':'')}</div>
        </div>
      </div>

      {/* Banner de horário */}
      {(()=>{
        const h = new Date().getHours(), m = new Date().getMinutes();
        const mins = h*60+m;
        let bloco=null, cor='', bg='';
        if(mins>=480&&mins<750)  { bloco='🔵 Bloco da Manhã — Conciliação Financeira (8h–12h30)'; cor='#0D6EFD'; bg='rgba(13,110,253,.06)'; }
        else if(mins>=750&&mins<900) { bloco='🟡 Bloco da Tarde — Tratamento de Pendências (12h30–15h)'; cor='#d97706'; bg='rgba(245,158,11,.06)'; }
        else if(mins>=900&&mins<990) { bloco='🟠 Bloco 15h–16h30 — Resolução de Pendências'; cor='#ea580c'; bg='rgba(249,115,22,.06)'; }
        else if(mins>=990&&mins<1050){ bloco='🔍 Bloco Auditoria — Organização e Revisão (16h30–17h30)'; cor='#7c3aed'; bg='rgba(124,58,237,.06)'; }
        else if(mins>=1050&&mins<1080){ bloco='📋 Fechamento do Dia (17h30–18h) — enviar resumo ao gestor'; cor='#475569'; bg='rgba(71,85,105,.06)'; }
        if(!bloco) return null;
        return (
          <div style={{padding:'10px 16px',marginBottom:'16px',borderRadius:'10px',background:bg,border:`1px solid ${cor}33`,display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'13px',fontWeight:700,color:cor}}>{bloco}</span>
          </div>
        );
      })()}

      {/* Filtro de operador (admin) */}
      {isAdmin&&(
        <div style={{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap',alignItems:'center',padding:'12px 16px',background:'#fff',borderRadius:'10px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
          <span style={{fontSize:'12px',color:'#64748b',fontWeight:600,marginRight:'4px'}}>👁 Ver como:</span>
          <button onClick={()=>setViewAs('all')}
            style={{fontSize:'12px',padding:'5px 14px',borderRadius:'8px',border:'none',cursor:'pointer',fontWeight:600,background:viewAs==='all'?'#060505':'#F4F5F7',color:viewAs==='all'?'#00C48C':'#475569'}}>
            Todos
          </button>
          {operators.filter(o=>!o.noLogin).map(o=>(
            <button key={o.id} onClick={()=>setViewAs(String(o.id))}
              style={{fontSize:'12px',padding:'5px 14px',borderRadius:'8px',border:'none',cursor:'pointer',fontWeight:600,background:viewAs===String(o.id)?'#0D6EFD':'#F4F5F7',color:viewAs===String(o.id)?'#fff':'#475569'}}>
              👤 {o.name.split(' ')[0]}
            </button>
          ))}
        </div>
      )}

      {/* Seções por operador */}
      {opsToShow.map(op=>{
        const opId = String(op.id);
        const { asOp1, asOp2, outros, totalStats, doneStats } = getRotinaForOp(opId);
        const { geralTasks, myTasks, outrosCli } = getFilaForOp(opId);
        const { waitingExtras, waitingSantos, waitingOutros } = getAguardandoForOp(opId);

        // Clientes com bloco da tarde — só aparece na seção do Op1
        const tardeClients = santosSorted.filter(c=>
          c.rotina_tipo_tarde &&
          String(c.op1_id||'')===opId &&
          dayTasks[c.id]?.bloco_tarde
        );
        const tardeDone = tardeClients.filter(c=>dayTasks[c.id]?.bloco_tarde?.status==='done').length;

        const rotinaCount = totalStats;
        const rotinaDone  = doneStats;
        const filaCount     = geralTasks.length + myTasks.length + outrosCli.length;
        const aguardCount   = waitingExtras.length + waitingSantos.length + waitingOutros.length;

        const hasAnything = geralTasks.length>0 || (bizDay&&rotinaCount>0) || tardeClients.length>0 || filaCount>0 || aguardCount>0;
        if(!hasAnything && opsToShow.length>1) return null;

        // Skip operators not matching viewAs (when filtered)
        if(viewAs!=='all' && opId!==String(viewAs)) return null;

        return (
          <div key={opId} style={{marginBottom:'36px'}}>
            {/* Cabeçalho do operador */}
            {(viewAs==='all')&&(
              <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px',padding:'10px 16px',background:'#fff',borderRadius:'10px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',borderLeft:'3px solid #00C48C'}}>
                <div style={{width:'36px',height:'36px',borderRadius:'50%',background:'#060505',color:'#00C48C',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:0}}>
                  {op.name[0].toUpperCase()}
                </div>
                <div>
                  <div style={{fontWeight:700,fontSize:'15px',color:'#060505'}}>👤 {op.name.split(' ')[0].toUpperCase()}</div>
                  <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'1px'}}>
                    {bizDay&&rotinaCount>0&&<span>{rotinaDone}/{rotinaCount} manhã · </span>}
                    {tardeClients.length>0&&<span style={{color:'#d97706'}}>{tardeDone}/{tardeClients.length} tarde · </span>}
                    {filaCount>0&&<span>{filaCount} na fila · </span>}
                    {aguardCount>0&&<span style={{color:'#dc2626'}}>{aguardCount} aguardando · </span>}
                    {!bizDay&&rotinaCount===0&&tardeClients.length===0&&filaCount===0&&aguardCount===0&&<span>sem tarefas hoje</span>}
                  </div>
                </div>
              </div>
            )}

            {/* 1️⃣ 🌅 ROTINA DA MANHÃ */}
            {bizDay&&(rotinaCount>0||geralTasks.length>0)&&(
              <div style={{marginBottom:'18px'}}>
                <SectionHeader color="#0D6EFD" label="🌅 Rotina da Manhã" sub={`${rotinaDone}/${rotinaCount} concluído${rotinaCount!==1?'s':''}`}/>
                {geralTasks.length>0&&(
                  <div style={{marginBottom:'8px'}}>
                    <div style={{fontSize:'11px',color:'#00C48C',fontWeight:600,marginBottom:'6px',paddingLeft:'4px'}}>📋 Rotina Geral</div>
                    {geralTasks.map(t=>(
                      <TarefaCard key={t.id} t={t} priStyle={priStyle} getClient={getClient} getOp={getOp} onUpdate={onUpdateExtra} onEdit={null} onDelete={onDeleteExtra} isAdmin={isAdmin}/>
                    ))}
                  </div>
                )}
                {asOp1.map(c=>(
                  <ClienteFilaCard key={c.id} client={c} task={dayTasks[c.id]||freshTaskForClient(c)} operators={operators} currentUser={currentUser} manuals={manuals||[]} onUpdate={t=>onUpdateTask(c.id,t)} onAddExtra={onAddExtra}/>
                ))}
                {asOp2.length>0&&(
                  <div style={{marginTop:'8px'}}>
                    <div style={{fontSize:'11px',color:'#7c3aed',fontWeight:600,marginBottom:'6px',paddingLeft:'4px'}}>{viewAs==='all'?'· Bloco 2 ativo':'· Clientes Santos'}</div>
                    {asOp2.map(c=>(
                      <ClienteFilaCard key={'op2-'+c.id} client={c} task={dayTasks[c.id]} operators={operators} currentUser={currentUser} manuals={manuals||[]} onUpdate={t=>onUpdateTask(c.id,t)} onAddExtra={onAddExtra}/>
                    ))}
                  </div>
                )}
                {outros.map(c=>(
                  <OutrosRotinCard key={c.id} client={c} task={dayTasks[c.id]||freshTaskOutros(c)} operators={operators} onUpdate={t=>onUpdateTask(c.id,t)} onAddExtra={onAddExtra}/>
                ))}
              </div>
            )}

            {/* 2️⃣ 🌆 ROTINA DA TARDE */}
            {bizDay&&tardeClients.length>0&&(
              <div style={{marginBottom:'18px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px',padding:'10px 14px',borderRadius:'10px',background:'rgba(245,158,11,.07)',border:'1px solid rgba(245,158,11,.2)'}}>
                  <span style={{width:'9px',height:'9px',borderRadius:'50%',background:'#f59e0b',display:'inline-block',flexShrink:0}}/>
                  <span style={{fontSize:'11px',fontWeight:700,color:'#d97706',letterSpacing:'1px',textTransform:'uppercase'}}>🌆 Rotina da Tarde</span>
                  <span style={{fontSize:'11px',color:'#92400e'}}>{tardeDone}/{tardeClients.length} concluído{tardeClients.length!==1?'s':''}</span>
                  <span style={{marginLeft:'auto',fontSize:'11px',color:'#b45309',fontWeight:500}}>A partir das 16h30</span>
                </div>
                {tardeClients.map(c=>(
                  <BlocoTardeCard key={'tarde-'+c.id} client={c} task={dayTasks[c.id]} operators={operators} onUpdate={t=>onUpdateTask(c.id,t)} onAddExtra={onAddExtra}/>
                ))}
              </div>
            )}

            {/* 3️⃣ ⏰ TAREFAS ATRASADAS — cards completos, operador pode iniciar e concluir */}
            {(()=>{
              const atrasadasOp = (extraTasks||[]).filter(t=>
                t.due_date && t.due_date<today && t.status!=='done' && t.status!=='waiting' &&
                String(t.operator_id||'')===opId
              );
              if(!atrasadasOp.length) return null;
              return (
                <div style={{marginBottom:'18px'}}>
                  <SectionHeader color="#dc2626" label="⏰ Tarefas Atrasadas" sub={`${atrasadasOp.length} não concluída${atrasadasOp.length!==1?'s':''}`}/>
                  <div style={{display:'flex',flexDirection:'column',gap:'0'}}>
                    {atrasadasOp.map(t=>(
                      <div key={t.id}>
                        <div style={{fontSize:'11px',color:'#dc2626',fontWeight:600,padding:'4px 4px 2px',display:'flex',alignItems:'center',gap:'6px'}}>
                          <span>⏰ Execução em atraso — venceu {fmtDate(t.due_date)}</span>
                        </div>
                        <TarefaCard t={t} priStyle={priStyle} getClient={getClient} getOp={getOp} onUpdate={onUpdateExtra} onEdit={null} onDelete={onDeleteExtra} isAdmin={isAdmin}/>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* 4️⃣ 🟡 TAREFAS DO DIA */}
            {filaCount>0&&(
              <div style={{marginBottom:'18px'}}>
                <SectionHeader color="#d97706" label="🟡 Tarefas do Dia" sub={`${filaCount} tarefa${filaCount!==1?'s':''}`}/>
                {myTasks.map(t=>(
                  <TarefaCard key={t.id} t={t} priStyle={priStyle} getClient={getClient} getOp={getOp} onUpdate={onUpdateExtra} onEdit={null} onDelete={onDeleteExtra} isAdmin={isAdmin}/>
                ))}
                {outrosCli.map(c=>(
                  <OutrosFilaCard key={c.id} client={c} clients={clients} extraTasks={extraTasks||[]} operators={operators} currentUser={currentUser} manuals={manuals||[]} onUpdateExtra={onUpdateExtra}/>
                ))}
              </div>
            )}

            {/* 5️⃣ 🔴 TAREFAS TRAVADAS */}
            {aguardCount>0&&(
              <div style={{marginBottom:'18px'}}>
                <SectionHeader color="#dc2626" label="🔴 Aguardando Resposta" sub={`${aguardCount} em espera`}/>
                {waitingExtras.map(t=>(
                  <TarefaCard key={t.id} t={t} priStyle={priStyle} getClient={getClient} getOp={getOp} onUpdate={onUpdateExtra} onEdit={null} onDelete={onDeleteExtra} isAdmin={isAdmin}/>
                ))}
                {[...waitingSantos,...waitingOutros].map(c=>{
                  const tk = dayTasks[c.id];
                  return (
                    <div key={'w-'+c.id} className="card fade-in" style={{padding:'12px 16px',borderLeft:'3px solid #dc2626',marginBottom:'8px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:'14px',color:'#060505'}}>{c.name}</div>
                        {tk?.waiting_since&&<div style={{fontSize:'11px',color:'#dc2626',marginTop:'2px'}}>🚫 Travou às {tk.waiting_since}</div>}
                        {c.banks&&<div style={{display:'flex',flexWrap:'wrap',marginTop:'4px'}}>{(c.banks||[]).map(b=><BankBadge key={b} bank={b}/>)}</div>}
                      </div>
                      <button className="btn-success" style={{fontSize:'12px',padding:'6px 14px',flexShrink:0}}
                        onClick={()=>onUpdateTask(c.id,{...tk,waiting:false,waiting_since:null})}>▶ Continuar</button>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Sem tarefas */}
            {!hasAnything&&(
              <div className="card" style={{padding:'18px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>
                ✓ Nenhuma tarefa pendente para {op.name.split(' ')[0]} hoje.
              </div>
            )}
          </div>
        );
      })}

      {/* Sem operador atribuído (só admin) */}
      {isAdmin&&semOpFila.length>0&&(
        <div style={{marginBottom:'28px'}}>
          <SectionHeader color="#94a3b8" label="Sem Operador" sub={`${semOpFila.length} tarefa${semOpFila.length!==1?'s':''}`}/>
          {semOpFila.map(t=>(
            <TarefaCard key={t.id} t={t} priStyle={priStyle} getClient={getClient} getOp={getOp} onUpdate={onUpdateExtra} onEdit={null} onDelete={onDeleteExtra} isAdmin={isAdmin}/>
          ))}
        </div>
      )}

      {/* Tudo concluído */}
      {doneSantos===totalSantos&&totalSantos>0&&pendingFila===0&&waitingCount===0&&tarefasAtrasadas.length===0&&(
        <div className="card fade-in" style={{textAlign:'center',padding:'32px',marginTop:'16px'}}>
          <div style={{fontSize:'40px',marginBottom:'8px'}}>🎉</div>
          <div style={{fontSize:'18px',fontWeight:700,color:'#00C48C'}}>Rotina concluída!</div>
          <div style={{fontSize:'13px',color:'#94a3b8',marginTop:'4px'}}>Todos os {totalSantos} clientes finalizados hoje.</div>
        </div>
      )}

      {/* ── Histórico ── */}
      <div style={{marginTop:'32px',borderTop:'1px solid #e2e8f0',paddingTop:'20px'}}>
        <button onClick={loadHistory} style={{display:'flex',alignItems:'center',gap:'8px',background:'none',border:'none',cursor:'pointer',color:'#64748b',fontSize:'13px',fontWeight:600,padding:'4px 0'}}>
          <span style={{fontSize:'16px'}}>📅</span> {showHistory?'Ocultar':'Ver'} Histórico dos últimos 14 dias {loadingHist?'…':''}
        </button>
        {showHistory&&(
          <div style={{marginTop:'14px',display:'flex',flexDirection:'column',gap:'8px'}} className="fade-in">
            {history.length===0&&<div style={{fontSize:'13px',color:'#94a3b8'}}>Nenhum registro encontrado.</div>}
            {history.map(day=>(
              <div key={day.date} className="card" style={{padding:'12px 16px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'8px'}}>
                  <span style={{fontWeight:700,fontSize:'14px',color:'#060505'}}>{fmtDate(day.date)}</span>
                  <span style={{fontSize:'12px',color:day.done===day.total?'#00C48C':'#f59e0b',fontWeight:600}}>{day.done}/{day.total} concluídos</span>
                  <ProgressBar value={day.done} max={day.total}/>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                  {day.entries.map(e=>(
                    <span key={e.clientId} style={{fontSize:'11px',padding:'3px 10px',borderRadius:'20px',background:e.fullyDone?'rgba(0,196,140,.12)':'rgba(220,38,38,.08)',color:e.fullyDone?'#00C48C':'#dc2626',fontWeight:600}}>
                      {e.fullyDone?'✓':'✗'} {e.clientName}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

        </div>
