function MensagensSection({mensagens, onAdd, onEdit, onDelete, onReorder, isAdmin}) {
  const [modal, setModal]     = useState(false);
  const [editing, setEditing] = useState(null);
  const [copied, setCopied]   = useState(null);

  const copy = (id, text) => {
    if(navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{});
    else { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
    setCopied(id); setTimeout(()=>setCopied(null),2200);
  };

  const sorted = [...mensagens].sort((a,b)=>{
    const na=parseFloat(String(a.num||'').replace(',','.'));
    const nb=parseFloat(String(b.num||'').replace(',','.'));
    if(!isNaN(na)&&!isNaN(nb)) return na-nb;
    if(!isNaN(na)) return -1;
    if(!isNaN(nb)) return 1;
    return 0;
  });

  const move = (idx, dir) => {
    const arr = [...sorted];
    const newIdx = idx + dir;
    if(newIdx < 0 || newIdx >= arr.length) return;
    [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
    onReorder(arr);
  };

  return (
    <div>
      {isAdmin&&<div style={{display:'flex',justifyContent:'flex-end',marginBottom:'16px'}}>
        <button className="btn-green" onClick={()=>{setEditing(null);setModal(true);}}>+ Nova Mensagem</button>
      </div>}
      {mensagens.length===0&&<div className="card" style={{padding:'40px',textAlign:'center',color:'#94a3b8',fontSize:'14px'}}>Nenhuma mensagem cadastrada.{isAdmin&&<div style={{marginTop:'8px',fontSize:'12px'}}>Clique em "+ Nova Mensagem" para adicionar.</div>}</div>}
      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {sorted.map((m,idx)=>(
          <div key={m.id} className="card" style={{padding:'16px 18px',display:'flex',gap:'12px',alignItems:'flex-start'}}>
            {/* Número + setas */}
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',flexShrink:0,minWidth:'36px'}}>
              <div style={{minWidth:'28px',height:'28px',borderRadius:'14px',background:'#060505',color:'#00C48C',fontWeight:700,fontSize:'11px',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 6px'}}>{m.num||idx+1}</div>
              {isAdmin&&<>
                <button onClick={()=>move(idx,-1)} disabled={idx===0} title="Mover para cima"
                  style={{background:'none',border:'none',cursor:idx===0?'default':'pointer',color:idx===0?'#e2e8f0':'#94a3b8',fontSize:'14px',padding:'0',lineHeight:1}}>▲</button>
                <button onClick={()=>move(idx,1)} disabled={idx===mensagens.length-1} title="Mover para baixo"
                  style={{background:'none',border:'none',cursor:idx===mensagens.length-1?'default':'pointer',color:idx===mensagens.length-1?'#e2e8f0':'#94a3b8',fontSize:'14px',padding:'0',lineHeight:1}}>▼</button>
              </>}
            </div>
            {/* Conteúdo */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px',gap:'10px'}}>
                <div style={{fontWeight:700,fontSize:'14px',color:'#060505'}}>{m.title}</div>
                <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                  {isAdmin&&<>
                    <button className="btn-ghost" style={{fontSize:'12px',padding:'4px 10px'}} onClick={()=>{setEditing(m);setModal(true);}}>✎</button>
                    <button className="btn-danger" style={{fontSize:'12px',padding:'4px 10px'}} onClick={()=>{if(confirm('Excluir esta mensagem?'))onDelete(m.id);}}>✕</button>
                  </>}
                  <button onClick={()=>copy(m.id,m.text)}
                    style={{padding:'5px 14px',borderRadius:'8px',fontSize:'12px',fontWeight:700,border:'none',cursor:'pointer',background:copied===m.id?'rgba(0,196,140,.15)':'#f1f5f9',color:copied===m.id?'#00C48C':'#374151',transition:'all .2s',minWidth:'80px'}}>
                    {copied===m.id?'✓ Copiado!':'📋 Copiar'}
                  </button>
                </div>
              </div>
              <div style={{fontSize:'13px',color:'#475569',lineHeight:1.7,whiteSpace:'pre-wrap',background:'#f8fafc',padding:'12px 14px',borderRadius:'8px',borderLeft:'3px solid #e2e8f0'}}>{m.text}</div>
            </div>
          </div>
        ))}
      </div>
      {modal&&<MensagemModal msg={editing} onSave={async m=>{editing?await onEdit(m):await onAdd(m);setModal(false);}} onClose={()=>setModal(false)}/>}
    </div>
  );
}

function ManualModal({manual, operators, onSave, onClose}) {
  const [form,setForm]       = useState(manual || {num:'',title:'',category:'Geral',steps:[],assignedOperators:[]});
  const [newStep,setNewStep] = useState({action:'',detail:''});
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleOp = id => setForm(f=>({...f,assignedOperators: (f.assignedOperators||[]).includes(id) ? (f.assignedOperators||[]).filter(x=>x!==id) : [...(f.assignedOperators||[]),id]}));
  const addStep = () => {
    if(!newStep.action.trim()) return;
    setForm(f=>({...f,steps:[...f.steps,{n:f.steps.length+1,...newStep}]}));
    setNewStep({action:'',detail:''});
  };
  const removeStep = idx => setForm(f=>({...f,steps:f.steps.filter((_,i)=>i!==idx).map((s,i)=>({...s,n:i+1}))}));
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(6,5,5,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:'16px'}}>
      <div className="card fade-in" style={{width:'100%',maxWidth:'560px',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 20px 16px',borderBottom:'1px solid #f1f5f9'}}>
          <h2 style={{fontWeight:700,fontSize:'16px',color:'#060505'}}>{manual?'Editar Manual':'Novo Manual'}</h2>
          <button onClick={onClose} style={{fontSize:'22px',color:'#94a3b8',background:'none',border:'none',cursor:'pointer'}}>&times;</button>
        </div>
        <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:'14px'}}>
          {/* Número + Título + Categoria */}
          <div style={{display:'grid',gridTemplateColumns:'80px 1fr 120px',gap:'10px'}}>
            <div><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>Número</div><input className="input-field" value={form.num||''} onChange={e=>upd('num',e.target.value)} placeholder="1, 1.1…"/></div>
            <div><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>Título *</div><input className="input-field" value={form.title} onChange={e=>upd('title',e.target.value)} placeholder="Nome do manual"/></div>
            <div><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>Categoria</div><input className="input-field" value={form.category} onChange={e=>upd('category',e.target.value)} placeholder="Geral"/></div>
          </div>
          {/* Operadores */}
          {operators&&operators.length>0&&(
            <div>
              <div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'8px'}}>Visível para <span style={{color:'#94a3b8',fontWeight:400}}>(vazio = todos)</span></div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:'6px'}}>
                {operators.map(op=>{
                  const sel=(form.assignedOperators||[]).includes(op.id)||( form.assignedOperators||[]).includes(String(op.id));
                  return <label key={op.id} style={{display:'flex',alignItems:'center',gap:'7px',padding:'7px 10px',borderRadius:'8px',cursor:'pointer',border:`1.5px solid ${sel?'#00C48C':'#e2e8f0'}`,background:sel?'rgba(0,196,140,.06)':'#fff',fontSize:'13px'}}>
                    <input type="checkbox" checked={sel} onChange={()=>toggleOp(op.id)}/>{op.name.split(' ')[0]}
                  </label>;
                })}
              </div>
            </div>
          )}
          {/* Passos */}
          <div>
            <div style={{fontSize:'11px',fontWeight:600,color:'#00C48C',marginBottom:'10px'}}>Passos ({form.steps.length})</div>
            {form.steps.map((s,i)=>(
              <div key={i} style={{display:'flex',gap:'10px',alignItems:'flex-start',marginBottom:'8px',padding:'10px',background:'#f8fafc',borderRadius:'8px'}}>
                <div style={{width:'24px',height:'24px',borderRadius:'50%',background:'#060505',color:'#00C48C',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'12px'}}>{s.n}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:'13px',fontWeight:600,color:'#374151'}}>{s.action}</div>
                  {s.detail&&<div style={{fontSize:'12px',color:'#64748b',marginTop:'2px'}}>{s.detail}</div>}
                </div>
                <button onClick={()=>removeStep(i)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'14px',flexShrink:0}}>✕</button>
              </div>
            ))}
            <div style={{border:'1.5px dashed #e2e8f0',borderRadius:'10px',padding:'12px',marginTop:'8px'}}>
              <div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'8px'}}>Adicionar passo</div>
              <input className="input-field" placeholder="Ação (ex: Acessar banco)" value={newStep.action} onChange={e=>setNewStep(s=>({...s,action:e.target.value}))} style={{marginBottom:'8px'}}/>
              <input className="input-field" placeholder="Detalhe (opcional)" value={newStep.detail} onChange={e=>setNewStep(s=>({...s,detail:e.target.value}))} style={{marginBottom:'8px'}}/>
              <button className="btn-ghost" style={{fontSize:'12px',padding:'6px 14px'}} onClick={addStep}>+ Adicionar passo</button>
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:'10px',padding:'16px 20px',borderTop:'1px solid #f1f5f9'}}>
          <button className="btn-green" style={{flex:1}} onClick={()=>{if(!form.title.trim())return;onSave(form);}}>Salvar Manual</button>
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

function Conhecimento({manuals, onAdd, onEdit, onDelete, onReorderManuals, mensagens, onAddMsg, onEditMsg, onDeleteMsg, onReorderMsgs, isAdmin, operators, currentUser}) {
  const [subTab, setSubTab] = useState('manuais');
  const [sel,setSel]        = useState(null);
  const [modal,setModal]    = useState(false);
  const [editing,setEditing]= useState(null);

  // Filtra manuais visíveis ao operador atual
  const visibleManuals = manuals.filter(m => {
    if(isAdmin) return true;
    const ao = m.assignedOperators||[];
    return ao.length===0 || ao.includes(currentUser?.id) || ao.includes(String(currentUser?.id));
  });

  // Ordena pelo campo num
  const sortedManuals = [...visibleManuals].sort((a,b)=>{
    const na=parseFloat(String(a.num||'').replace(',','.')), nb=parseFloat(String(b.num||'').replace(',','.'));
    if(!isNaN(na)&&!isNaN(nb)) return na-nb;
    if(!isNaN(na)) return -1; if(!isNaN(nb)) return 1;
    return 0;
  });

  const all = [...sortedManuals];
  const selected = sel ? all.find(m=>String(m.id)===String(sel)) : all[0];
  useEffect(()=>{ if(all.length>0&&!sel) setSel(String(all[0].id)); },[]);

  const moveManual = (idx, dir) => {
    const arr = [...sortedManuals];
    const newIdx = idx + dir;
    if(newIdx < 0 || newIdx >= arr.length) return;
    [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
    onReorderManuals(arr);
  };

  return (
    <div>
      {/* Sub-abas */}
      <div style={{display:'flex',gap:'4px',marginBottom:'20px',background:'#f1f5f9',borderRadius:'10px',padding:'4px',width:'fit-content'}}>
        {[['manuais','📖 Manuais'],['mensagens','💬 Mensagens Padrão']].map(([v,l])=>(
          <button key={v} onClick={()=>setSubTab(v)} style={{padding:'7px 18px',borderRadius:'7px',fontSize:'13px',fontWeight:600,border:'none',cursor:'pointer',background:subTab===v?'#060505':'transparent',color:subTab===v?'#00C48C':'#64748b',transition:'all .15s'}}>{l}</button>
        ))}
      </div>

      {subTab==='mensagens'?(
        <MensagensSection mensagens={mensagens} onAdd={onAddMsg} onEdit={onEditMsg} onDelete={onDeleteMsg} onReorder={onReorderMsgs} isAdmin={isAdmin}/>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:'16px',alignItems:'start'}}>
          <div className="card" style={{padding:'16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
              <span style={{fontSize:'12px',fontWeight:700,color:'#64748b',letterSpacing:'1px',textTransform:'uppercase'}}>Manuais</span>
              <button className="btn-green" style={{padding:'4px 10px',fontSize:'11px'}} onClick={()=>{setEditing(null);setModal(true);}}>+ Novo</button>
            </div>
            {/* Manuais (todos unificados, reordenáveis, ordenados por num) */}
            {sortedManuals.map((m,idx)=>{
              const isSelected = String(sel)===String(m.id);
              const assignedOps = (m.assignedOperators||[]).map(id=>operators?.find(o=>o.id===id||String(o.id)===String(id))).filter(Boolean);
              return (
                <div key={m.id} style={{display:'flex',alignItems:'center',gap:'4px',marginBottom:'4px'}}>
                  {isAdmin&&<div style={{display:'flex',flexDirection:'column',gap:'1px',flexShrink:0}}>
                    <button onClick={e=>{e.stopPropagation();moveManual(idx,-1);}} disabled={idx===0} title="Mover acima"
                      style={{background:'none',border:'none',cursor:idx===0?'default':'pointer',color:idx===0?'#e2e8f0':'#94a3b8',fontSize:'11px',padding:'0',lineHeight:1}}>▲</button>
                    <button onClick={e=>{e.stopPropagation();moveManual(idx,1);}} disabled={idx===sortedManuals.length-1} title="Mover abaixo"
                      style={{background:'none',border:'none',cursor:idx===sortedManuals.length-1?'default':'pointer',color:idx===sortedManuals.length-1?'#e2e8f0':'#94a3b8',fontSize:'11px',padding:'0',lineHeight:1}}>▼</button>
                  </div>}
                  <div onClick={()=>setSel(String(m.id))} style={{flex:1,display:'flex',alignItems:'center',gap:'6px',padding:'8px 10px',borderRadius:'8px',cursor:'pointer',background:isSelected?'#060505':'transparent',transition:'background .15s'}}
                    onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.background='#f8fafc';}} onMouseLeave={e=>{if(!isSelected)e.currentTarget.style.background='transparent';}}>
                    <span style={{minWidth:'20px',height:'20px',borderRadius:'10px',background:isSelected?'#1a1a1a':'#f1f5f9',color:isSelected?'#00C48C':'#94a3b8',fontWeight:700,fontSize:'10px',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px',flexShrink:0}}>{m.num||'—'}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'13px',fontWeight:600,color:isSelected?'#00C48C':'#374151',wordBreak:'break-word',lineHeight:'1.35'}}>{m.title}</div>
                      <div style={{display:'flex',alignItems:'center',gap:'4px',marginTop:'2px',flexWrap:'wrap'}}>
                        <span style={{fontSize:'10px',color:isSelected?'#64748b':'#94a3b8'}}>{m.category}</span>
                        {assignedOps.map(op=><span key={op.id} title={op.name} style={{borderRadius:'20px',background:'#0D6EFD',color:'#fff',fontSize:'9px',fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'1px 6px'}}>{op.name.split(' ')[0]}</span>)}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="card" style={{padding:'24px'}}>
            {selected?(
              <>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'20px'}}>
                  <div>
                    <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>{selected.category}</div>
                    <h2 style={{fontWeight:700,fontSize:'18px',color:'#060505'}}>{selected.title}</h2>
                  </div>
                  <div style={{display:'flex',gap:'8px',alignItems:'flex-start',flexDirection:'column'}}>
                    {(selected.assignedOperators||[]).length>0&&(
                      <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                        {(selected.assignedOperators||[]).map(id=>{const op=operators?.find(o=>o.id===id||String(o.id)===String(id));return op?<span key={id} className="badge" style={{background:'rgba(13,110,253,.1)',color:'#0D6EFD'}}>{op.name.split(' ')[0]}</span>:null;})}
                      </div>
                    )}
                    <div style={{display:'flex',gap:'8px'}}>
                      {isAdmin&&<button className="btn-ghost" style={{fontSize:'12px',padding:'6px 12px'}} onClick={()=>{setEditing(selected);setModal(true);}}>✎ Editar</button>}
                      {isAdmin&&<button className="btn-danger" style={{fontSize:'12px'}} onClick={()=>{if(confirm('Excluir este manual?'))onDelete(selected.id);}}>Excluir</button>}
                    </div>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                  {selected.steps.map(s=>(
                    <div key={s.n} style={{display:'flex',gap:'14px'}}>
                      <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'#060505',color:'#00C48C',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'13px'}}>{s.n}</div>
                      <div><div style={{fontWeight:600,color:'#060505',fontSize:'14px'}}>{s.action}</div>{s.detail&&<div style={{fontSize:'13px',color:'#64748b',marginTop:'2px'}}>{s.detail}</div>}</div>
                    </div>
                  ))}
                </div>
              </>
            ):<div style={{textAlign:'center',color:'#94a3b8',padding:'40px'}}>Selecione um manual</div>}
          </div>
          {modal&&<ManualModal manual={editing} operators={operators} onSave={async m=>{editing?await onEdit(m):await onAdd(m);setModal(false);}} onClose={()=>setModal(false)}/>}
        </div>
      )}
    </div>
  );
}

// ── CARD TAREFA EXTRA ────────────────────────────────
function TarefaCard({t, priStyle, getClient, getOp, onUpdate, onEdit, onDelete, isAdmin, onAprovar, onRejeitar}) {
  const [expanded, setExpanded]   = useState(false);
  const [openSteps, setOpenSteps] = useState(false);
  const [showPend, setShowPend]   = useState(false);
  const [showHist, setShowHist]   = useState(false);
  const [showReject, setShowReject] = useState(false);
  const [rejectReason, setRejectReason] = useState('');
  const [pendText, setPendText]   = useState(t.exec_notes||'');
  const history = t.exec_notes_history||[];
  const LIMIT = 120;
  const longNotes = t.notes && t.notes.length > LIMIT;
  const steps = t.steps||[];
  const stepsDone = steps.filter(s=>s.done).length;
  const allStepsDone = steps.length>0 && stepsDone===steps.length;
  const hasPend = !!(t.exec_notes && t.exec_notes.trim());
  const isWaiting = t.status === 'waiting';
  const isPendingApproval = t.status === 'pending_approval';
  const priDot = t.priority==='critical' ? '🚨' : t.priority==='high' ? '🔴' : t.priority==='low' ? '⚪' : '🟡';

  const toggleStep = id => {
    const updated = steps.map(s=>s.id===id?{...s,done:!s.done}:s);
    const allDone = updated.every(s=>s.done);
    onUpdate({...t, steps:updated, status:allDone?'done':t.status==='done'||t.status==='waiting'?'active':t.status, done_at:allDone?new Date().toISOString():null});
  };
  const savePend = () => { if(pendText !== (t.exec_notes||'')) onUpdate({...t, exec_notes: pendText}); };

  const isCritical = t.priority === 'critical';
  const borderColor = t.status==='done'?'#00C48C':isPendingApproval?'#f59e0b':isWaiting?'#dc2626':isCritical?'#b91c1c':t.status==='active'?'#0D6EFD':hasPend?'#f59e0b':'#e2e8f0';

  return (
    <div className="card" style={{borderLeft:`3px solid ${borderColor}`,overflow:'hidden',marginBottom:'8px',background:isCritical&&t.status!=='done'?'rgba(185,28,28,.03)':'',}}>
      <div style={{padding:'14px 16px'}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}}>
              <span style={{fontSize:'14px'}}>{priDot}</span>
              <span style={{fontWeight:700,color:t.status==='done'?'#94a3b8':isWaiting?'#dc2626':'#060505',fontSize:'14px',textDecoration:t.status==='done'?'line-through':'none'}}>{t.title}</span>
              {isWaiting && <span className="badge" style={{background:'rgba(220,38,38,.12)',color:'#dc2626'}}>🚫 Travado</span>}
              {!isWaiting && <span className="badge" style={{background:priStyle[t.priority]?.bg,color:priStyle[t.priority]?.color}}>{priStyle[t.priority]?.label}</span>}
              {t.recurring&&<span className="badge" style={{background:'rgba(0,196,140,.12)',color:'#00C48C'}}>↺ {t.frequency==='daily'?'Diária':t.frequency==='weekly'?'Semanal':'Mensal'}</span>}
              {steps.length>0&&<span className="badge" style={{background:'rgba(99,102,241,.1)',color:'#6366f1',cursor:'pointer'}} onClick={()=>setOpenSteps(o=>!o)}>☑ {stepsDone}/{steps.length} {openSteps?'▲':'▼'}</span>}
              {hasPend&&<span className="badge" style={{background:'rgba(245,158,11,.15)',color:'#d97706'}}>⚠ Pendência</span>}
              {history.length>0&&<span className="badge" style={{background:'rgba(100,116,139,.1)',color:'#64748b',cursor:'pointer'}} onClick={e=>{e.stopPropagation();setShowHist(h=>!h);}}>📋 {history.length} {history.length===1?'registro':'registros'} {showHist?'▲':'▼'}</span>}
            </div>
            <div style={{display:'flex',gap:'14px',fontSize:'11px',color:'#94a3b8',flexWrap:'wrap'}}>
              {getClient(t.client_id)&&<span>👤 {getClient(t.client_id).name}</span>}
              {getOp(t.operator_id)&&<span>🧑‍💻 {getOp(t.operator_id).name}</span>}
              {t.due_date&&<span>📅 {fmtDate(t.due_date)}</span>}
              {isWaiting && t.waiting_since && <span style={{color:'#dc2626'}}>🚫 Travou às {t.waiting_since}</span>}
            </div>
            {steps.length>0&&<ProgressBar value={stepsDone} max={steps.length}/>}
            {t.notes&&(
              <div style={{marginTop:'6px'}}>
                <div style={{fontSize:'13px',color:'#64748b',lineHeight:1.6,whiteSpace:'pre-wrap'}}>
                  {expanded||!longNotes ? t.notes : t.notes.slice(0,LIMIT)+'…'}
                </div>
                {longNotes&&<button onClick={()=>setExpanded(e=>!e)} style={{background:'none',border:'none',cursor:'pointer',color:'#0D6EFD',fontSize:'12px',fontWeight:600,padding:'4px 0',marginTop:'2px'}}>{expanded?'▲ Ver menos':'▼ Ver mais'}</button>}
              </div>
            )}
            {hasPend&&!showPend&&(
              <div style={{marginTop:'8px',padding:'8px 12px',borderRadius:'8px',background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',cursor:'pointer'}} onClick={()=>setShowPend(true)}>
                <div style={{fontSize:'11px',fontWeight:700,color:'#d97706',marginBottom:'3px'}}>⚠ Pendência registrada</div>
                <div style={{fontSize:'13px',color:'#92400e',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{t.exec_notes}</div>
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:'6px',flexShrink:0,alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
            {isWaiting ? (
              <button className="btn-success" style={{fontSize:'12px',padding:'6px 14px'}}
                onClick={()=>onUpdate({...t,status:'pending',waiting_since:null})}>▶ Continuar</button>
            ) : isPendingApproval ? (
              <>
                <span style={{fontSize:'12px',color:'#d97706',fontWeight:600}}>⏳ Aguardando aprovação</span>
                {isAdmin && onAprovar && <>
                  <button className="btn-success" style={{fontSize:'12px',padding:'6px 12px'}} onClick={()=>onAprovar(t)}>✓ Aprovar</button>
                  <button className="btn-danger"  style={{fontSize:'12px',padding:'6px 12px'}} onClick={()=>setShowReject(r=>!r)}>✕ Rejeitar</button>
                </>}
              </>
            ) : (
              <>
                {isAdmin&&onDelete&&(
                  <div style={{position:'relative',display:'inline-block'}}>
                    <button title="Excluir" onClick={e=>{e.stopPropagation();
                      if(t.recurring){
                        const choice=window.confirm(`Excluir apenas esta ocorrência?\n\nOK = só esta\nCancelar = abre opção de excluir todas`);
                        if(choice) onDelete(t,'single');
                        else if(window.confirm(`Excluir TODAS as ocorrências de "${t.title}"?`)) onDelete(t,'all');
                      } else { onDelete(t,'single'); }
                    }} style={{background:'rgba(220,38,38,.08)',color:'#dc2626',border:'none',cursor:'pointer',borderRadius:'7px',padding:'5px 10px',fontSize:'13px',fontWeight:600}}>🗑</button>
                  </div>
                )}
                {onEdit&&<button title="Editar" onClick={e=>{e.stopPropagation();onEdit(t);}} style={{background:'#f1f5f9',border:'none',cursor:'pointer',color:'#475569',borderRadius:'7px',padding:'5px 10px',fontSize:'13px',fontWeight:600}}>✎</button>}
                {t.status!=='done'&&<button title="Anotar pendência" onClick={()=>{setPendText(t.exec_notes||'');setShowPend(p=>!p);}} style={{background:hasPend?'rgba(245,158,11,.15)':'rgba(100,116,139,.1)',color:hasPend?'#d97706':'#64748b',border:'none',cursor:'pointer',borderRadius:'7px',padding:'5px 10px',fontSize:'13px',fontWeight:600}}>📝</button>}
                {t.status!=='done'&&<button title="Marcar como travado" onClick={()=>onUpdate({...t,status:'waiting',waiting_since:nowTime()})}
                  style={{background:'rgba(220,38,38,.08)',color:'#dc2626',border:'none',cursor:'pointer',borderRadius:'7px',padding:'5px 10px',fontSize:'12px',fontWeight:600}}>🚫 Travou</button>}
                {t.status==='pending'&&!allStepsDone&&<button className="btn-ghost" style={{fontSize:'12px',padding:'6px 12px'}} onClick={()=>onUpdate({...t,status:'active'})}>Iniciar</button>}
                {t.status!=='done'&&<button className="btn-success" style={{fontSize:'12px',padding:'6px 12px'}} onClick={()=>onUpdate({...t,status:'done',done_at:new Date().toISOString(),steps:steps.map(s=>({...s,done:true}))})}>✓ Concluir</button>}
                {t.status==='done'&&<button style={{background:'rgba(249,115,22,.12)',color:'#ea580c',border:'none',cursor:'pointer',borderRadius:'7px',padding:'5px 12px',fontSize:'12px',fontWeight:600}} onClick={()=>onUpdate({...t,status:'pending',done_at:null,steps:steps.map(s=>({...s,done:false}))})}>↩ Reabrir</button>}
              </>
            )}
          </div>
        </div>
      </div>
      {showPend&&(
        <div style={{borderTop:'1px solid rgba(245,158,11,.2)',padding:'12px 16px',background:'rgba(245,158,11,.04)'}} className="fade-in">
          <div style={{fontSize:'12px',fontWeight:700,color:'#d97706',marginBottom:'6px'}}>📝 Pendências / O que ficou para concluir</div>
          <textarea className="input-field" style={{fontSize:'13px',minHeight:'80px',borderColor:'rgba(245,158,11,.4)'}}
            placeholder="Descreva o que ficou pendente, o que foi feito até aqui e o próximo passo..."
            value={pendText}
            onChange={e=>setPendText(e.target.value)}
            onBlur={savePend}
          />
          <div style={{display:'flex',gap:'8px',marginTop:'8px',justifyContent:'flex-end'}}>
            {hasPend&&<button style={{fontSize:'12px',background:'rgba(220,38,38,.1)',color:'#dc2626',border:'none',borderRadius:'7px',padding:'5px 12px',cursor:'pointer',fontWeight:600}}
              onClick={()=>{setPendText('');onUpdate({...t,exec_notes:''});setShowPend(false);}}>✕ Limpar</button>}
            <button className="btn-success" style={{fontSize:'12px',padding:'5px 14px'}}
              onClick={()=>{savePend();setShowPend(false);}}>✓ Salvar</button>
          </div>
        </div>
      )}
      {openSteps&&steps.length>0&&(
        <div style={{borderTop:'1px solid #f1f5f9',padding:'8px 16px 12px'}} className="fade-in">
          {steps.map(s=>(
            <label key={s.id} style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'7px 8px',borderRadius:'8px',cursor:'pointer',transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#f8fafb'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <input type="checkbox" checked={s.done} onChange={()=>toggleStep(s.id)} style={{marginTop:'2px',flexShrink:0}}/>
              <span style={{fontSize:'13px',color:s.done?'#aaa':'#374151'}} className={s.done?'step-done':''}>{s.text}</span>
            </label>
          ))}
        </div>
      )}
      {/* Painel de rejeição */}
      {showReject&&(
        <div style={{borderTop:'1px solid rgba(220,38,38,.2)',padding:'12px 16px',background:'rgba(220,38,38,.03)'}} className="fade-in">
          <div style={{fontSize:'12px',fontWeight:700,color:'#dc2626',marginBottom:'6px'}}>✕ Motivo da rejeição</div>
          <textarea className="input-field" style={{fontSize:'13px',minHeight:'60px',borderColor:'rgba(220,38,38,.3)'}}
            placeholder="Explique o que precisa ser corrigido..."
            value={rejectReason} onChange={e=>setRejectReason(e.target.value)}/>
          <div style={{display:'flex',gap:'8px',marginTop:'8px',justifyContent:'flex-end'}}>
            <button className="btn-ghost" style={{fontSize:'12px'}} onClick={()=>{setShowReject(false);setRejectReason('');}}>Cancelar</button>
            <button className="btn-danger" style={{fontSize:'12px'}} onClick={()=>{onRejeitar(t, rejectReason);setShowReject(false);setRejectReason('');}}>Confirmar rejeição</button>
          </div>
        </div>
      )}
      {/* Feedback de rejeição anterior (visível ao operador) */}
      {t.rejected_reason&&t.status==='pending'&&(
        <div style={{borderTop:'1px solid rgba(220,38,38,.2)',padding:'10px 16px',background:'rgba(220,38,38,.04)'}} className="fade-in">
          <div style={{fontSize:'11px',fontWeight:700,color:'#dc2626',marginBottom:'3px'}}>⚠ Devolvida por {t.rejected_by||'admin'}</div>
          <div style={{fontSize:'13px',color:'#92400e',lineHeight:1.5}}>{t.rejected_reason}</div>
        </div>
      )}
      {/* Histórico de pendências */}
      {showHist&&history.length>0&&(
        <div style={{borderTop:'1px solid #e2e8f0',padding:'12px 16px',background:'#fafafa'}} className="fade-in">
          <div style={{fontSize:'12px',fontWeight:700,color:'#64748b',marginBottom:'10px'}}>📋 Histórico de execução</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {[...history].reverse().map((h,i)=>(
              <div key={i} style={{display:'flex',gap:'12px',padding:'8px 12px',borderRadius:'8px',background:'#fff',border:'1px solid #e2e8f0'}}>
                <div style={{fontSize:'11px',fontWeight:700,color:'#94a3b8',whiteSpace:'nowrap',minWidth:'70px'}}>📅 {fmtDate(h.date)}</div>
                <div style={{fontSize:'13px',color:'#374151',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{h.note}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── TAREFAS EXTRAS ───────────────────────────────────
function TarefasExtras({clients, operators, extraTasks, currentUser, onAdd, onUpdate, onDelete, manuals}) {
  const [modal,setModal]       = useState(false);
  const [editing,setEditing]   = useState(null);
  const [view,setView]         = useState('lista');   // 'lista' | 'recorrentes'
  const [filter,setFilter]     = useState('pending');
  const [filterOp,setFilterOp] = useState('');
  const [filterCli,setFilterCli] = useState('');
  const [sortDate,setSortDate] = useState('asc');
  const today = todayStr();
  const isAdmin = currentUser?.role === 'admin' || currentUser?.role === 'master';
  const priStyle = {critical:{bg:'rgba(185,28,28,.15)',color:'#b91c1c',label:'🔴 CRÍTICO'},high:{bg:'rgba(220,38,38,.1)',color:'#dc2626',label:'Alta'},normal:{bg:'rgba(13,110,253,.1)',color:'#0D6EFD',label:'Normal'},low:{bg:'rgba(148,163,184,.15)',color:'#64748b',label:'Baixa'}};
  const getClient = id => clients.find(c=>String(c.id)===String(id));
  const getOp     = id => operators.find(o=>String(o.id)===String(id));

  const pendingApproval = extraTasks.filter(t => t.status === 'pending_approval');

  const handleAprovar = async t => {
    try {
      await API.post(`/api/extra-tasks/${t.id}/aprovar`, {});
      onUpdate({...t, status:'done', done_at: new Date().toISOString(), approved_by: currentUser?.name});
    } catch(e) { alert(e.error||'Erro ao aprovar'); }
  };

  const handleRejeitar = async (t, reason) => {
    try {
      await API.post(`/api/extra-tasks/${t.id}/rejeitar`, { reason });
      onUpdate({...t, status:'pending', done_at: null, rejected_reason: reason, rejected_by: currentUser?.name});
    } catch(e) { alert(e.error||'Erro ao rejeitar'); }
  };

  const handleSave = t => {
    if(editing) { onUpdate({...editing,...t}); }
    else        { onAdd(t); }
    setModal(false); setEditing(null);
  };

  // ── Vista LISTA ──────────────────────────────────────
  const filtered = extraTasks
    .filter(t => filter==='all' ? t.status!=='pending_approval' : t.status===filter)
    .filter(t => filterOp  ? String(t.operator_id)===String(filterOp)  : true)
    .filter(t => filterCli ? String(t.client_id||'')===String(filterCli) : true)
    .sort((a,b) => {
      if(sortDate==='none') return 0;
      if(!a.due_date && !b.due_date) return 0;
      if(!a.due_date) return 1;
      if(!b.due_date) return -1;
      return sortDate==='asc' ? a.due_date.localeCompare(b.due_date) : b.due_date.localeCompare(a.due_date);
    });

  // ── Vista RECORRENTES ────────────────────────────────
  // Pega o template mais recente de cada grupo recorrente
  // Um template é identificado por recurring=true; agrupamos por title+client_id+operator_id
  const recurringTemplates = (() => {
    const all = extraTasks.filter(t=>t.recurring);
    // Para cada tarefa recorrente, queremos o "template" (mais recente por due_date)
    const groups = {};
    all.forEach(t => {
      const key = `${t.title}__${t.client_id||''}__${t.operator_id||''}`;
      if(!groups[key] || (t.due_date||'') > (groups[key].due_date||'')) groups[key] = t;
    });
    return Object.values(groups).sort((a,b)=>{
      // ordena por: cliente → título
      const ca = getClient(a.client_id)?.name||'';
      const cb = getClient(b.client_id)?.name||'';
      return ca.localeCompare(cb) || a.title.localeCompare(b.title);
    });
  })();

  // Calcula próxima data de execução de uma tarefa recorrente
  const calcNextDate = (t) => {
    if(!t.due_date) return null;
    if(t.status !== 'done') return t.due_date; // ainda não foi feita, next = própria due_date
    const freq = t.frequency || 'daily';
    const d = new Date(t.due_date + 'T12:00:00Z');
    if(freq==='daily')   d.setUTCDate(d.getUTCDate()+1);
    if(freq==='weekly')  d.setUTCDate(d.getUTCDate()+7);
    if(freq==='monthly') d.setUTCMonth(d.getUTCMonth()+1);
    return d.toISOString().slice(0,10);
  };

  const freqLabel = f => f==='daily'?'Diária':f==='weekly'?'Semanal':f==='monthly'?'Mensal':'?';
  const freqColor = f => f==='daily'?{bg:'rgba(0,196,140,.12)',c:'#00C48C'}:f==='weekly'?{bg:'rgba(13,110,253,.1)',c:'#0D6EFD'}:{bg:'rgba(124,58,237,.1)',c:'#7c3aed'};

  const waitingCount   = extraTasks.filter(t=>t.status==='waiting'&&(filterOp?String(t.operator_id)===String(filterOp):true)).length;
  const approvalCount  = pendingApproval.length;
  const activeFilers   = (filterOp?1:0)+(filterCli?1:0)+(sortDate!=='none'?1:0);

  return (
    <div>
      {/* Cabeçalho: abas + botão */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',flexWrap:'wrap',gap:'10px'}}>
        <div style={{display:'flex',gap:'6px'}}>
          <button onClick={()=>setView('lista')}
            style={{padding:'7px 18px',borderRadius:'8px',fontSize:'13px',fontWeight:600,border:'none',cursor:'pointer',background:view==='lista'?'#060505':'#fff',color:view==='lista'?'#00C48C':'#64748b'}}>
            📋 Lista
          </button>
          <button onClick={()=>setView('recorrentes')}

                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {group.map(t=>{
                    const nextDate = calcNextDate(t);

                    const isLate   = nextDate && nextDate<today;
                    const op  = getOp(t.operator_id);
                    const cli = getClient(t.client_id);
                    return (

                              color:isLate?'#dc2626':isToday?'#00C48C':'#64748b'}}>
                              {isLate?'⚠️ Atrasada':isToday?'✓ Hoje':nextDate?`📅 ${fmtDate(nextDate)}`:'—'}
                            </span>
                          </div>
                          <div style={{display:'flex',gap:'14px',fontSize:'11px',color:'#94a3b8',flexWrap:'wrap'}}>
                            {cli&&<span>👤 {cli.name}</span>}

                            {t.priority&&<span style={{color:priStyle[t.priority]?.color}}>{t.priority==='high'?'🔴':t.priority==='low'?'⚪':'🟡'} {priStyle[t.priority]?.label}</span>}
                          </div>

                        </div>
                        <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                          <button onClick={()=>{setEditing(t);setModal(true);}}
                            style={{background:'#f1f5f9',border:'none',cursor:'pointer',color:'#475569',borderRadius:'7px',padding:'6px 12px',fontSize:'13px',fontWeight:600}}>

                          </button>
                          {currentUser?.role==='admin'&&onDelete&&(
