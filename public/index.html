                              if(choice) onDelete(t,'single');
                              else if(window.confirm(`Excluir TODAS as ocorrências de "${t.title}"? Esta ação não pode ser desfeita.`)) onDelete(t,'all');
                            }} style={{background:'rgba(220,38,38,.08)',color:'#dc2626',border:'none',cursor:'pointer',borderRadius:'7px',padding:'6px 12px',fontSize:'13px',fontWeight:600}}>
                              🗑 Excluir
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </>
      )}

      {modal&&<TarefaModal clients={clients} operators={operators} currentUser={currentUser} task={editing} manuals={manuals||[]} onSave={handleSave} onClose={()=>{setModal(false);setEditing(null);}}/>}
    </div>
  );
}

// ── OPERADORES ───────────────────────────────────────
function Operadores({operators, clients, currentUser, onOperatorsChange}) {
  const [addModal,setAddModal] = useState(false);
  const [editId,setEditId]     = useState(null);
  const [editClients,setEditClients] = useState([]);
  const isAdmin = currentUser?.role==='admin';

  const saveAssignment = async (opId) => {
    try { await API.put('/api/operators/'+opId,{assignedClients:editClients}); const ops=await API.get('/api/operators'); onOperatorsChange(ops); setEditId(null); } catch(e){ alert(e.error||'Erro'); }
  };
  const remove = async id => {
    if(!confirm('Remover este operador?')) return;
    try { await API.del('/api/operators/'+id); onOperatorsChange(operators.filter(o=>o.id!==id)); } catch(e){ alert(e.error||'Erro'); }
  };

  return (
    <div>
      {isAdmin&&<div style={{display:'flex',justifyContent:'flex-end',marginBottom:'16px'}}><button className="btn-green" onClick={()=>setAddModal(true)}>+ Adicionar Operador</button></div>}
      <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
        {operators.map(op=>{
          const isMe=String(op.id)===String(currentUser?.id);
          const ac=op.role==='admin'?'#00C48C':'#0D6EFD';
          const assigned=(op.assignedClients||[]).map(id=>clients.find(c=>c.id===id)).filter(Boolean);
          return (
            <div key={op.id} className="card" style={{padding:'20px',borderLeft:`4px solid ${ac}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                    <span style={{fontWeight:700,fontSize:'16px',color:'#060505'}}>{op.name}</span>
                    {isMe&&<span style={{fontSize:'11px',color:'#94a3b8'}}>(você)</span>}
                    {op.noLogin&&<span className="badge" style={{background:'rgba(245,158,11,.12)',color:'#d97706'}}>Sem login</span>}
                  </div>
                  <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'2px'}}>{op.email||<span style={{fontStyle:'italic'}}>sem e-mail</span>}</div>
                </div>
                <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  <span className="badge" style={{background:op.role==='admin'?'rgba(0,196,140,.12)':'rgba(13,110,253,.12)',color:ac}}>{op.role==='admin'?'Admin':'Operador'}</span>
                  {isAdmin&&<button onClick={()=>{setEditId(String(op.id));setEditClients(op.assignedClients||[]);}} style={{background:'none',border:'none',cursor:'pointer',color:'#0D6EFD',fontSize:'13px',fontWeight:600}}>Editar clientes</button>}
                  {isAdmin&&!isMe&&<button onClick={()=>remove(op.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'16px'}}>✕</button>}
                </div>
              </div>
              {editId===String(op.id)?(
                <div style={{background:'#f8fafc',borderRadius:'10px',padding:'14px'}}>
                  <div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'10px'}}>Clientes atribuídos:</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:'6px',marginBottom:'12px'}}>
                    {clients.map(c=>(
                      <label key={c.id} style={{display:'flex',alignItems:'center',gap:'6px',padding:'6px 8px',borderRadius:'6px',cursor:'pointer',border:`1.5px solid ${editClients.includes(c.id)?'#00C48C':'#e2e8f0'}`,background:editClients.includes(c.id)?'rgba(0,196,140,.06)':'#fff',fontSize:'13px'}}>
                        <input type="checkbox" checked={editClients.includes(c.id)} onChange={()=>setEditClients(a=>a.includes(c.id)?a.filter(x=>x!==c.id):[...a,c.id])}/>
                        {c.name}
                      </label>
                    ))}
                  </div>
                  <div style={{display:'flex',gap:'8px'}}>
                    <button className="btn-green" style={{fontSize:'12px',padding:'6px 14px'}} onClick={()=>saveAssignment(op.id)}>Salvar</button>
                    <button className="btn-ghost" style={{fontSize:'12px',padding:'6px 14px'}} onClick={()=>setEditId(null)}>Cancelar</button>
                  </div>
                </div>
              ):(
                assigned.length>0?(
                  <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                    {assigned.map(c=><span key={c.id} className="badge" style={{background:'#f1f5f9',color:'#475569'}}>{c.name}</span>)}
                  </div>
                ):<div style={{fontSize:'12px',color:'#94a3b8'}}>Sem clientes específicos atribuídos — vê todos.</div>
              )}
            </div>
          );
        })}
      </div>
      {addModal&&<AddOperatorModal clients={clients} onSave={ops=>{onOperatorsChange(ops);setAddModal(false);}} onClose={()=>setAddModal(false)}/>}
    </div>
  );
}

// ── CHAT ─────────────────────────────────────────────
// ── FILA DE LANÇAMENTOS (INTAKE) ─────────────────────
function IntakeLancamentos({currentUser}) {
  const [lancamentos, setLancamentos] = useState([]);
  const [loading, setLoading]         = useState(true);
  const [filtroStatus, setFiltroStatus] = useState('');
  const [filtroCliente, setFiltroCliente] = useState('');
  const [retentandoCA, setRetentandoCA]   = useState(null);
  const [rejeitandoId, setRejeitandoId]   = useState(null);
  const [aprovandoId, setAprovandoId]     = useState(null);

  // ── Config de IDs CA por cliente (persiste no localStorage) ──────────────
  const CA_CONFIG_KEY = 'intake_ca_config';
  const getCaConfig = () => { try { return JSON.parse(localStorage.getItem(CA_CONFIG_KEY) || '{}'); } catch { return {}; } };
  const saveCaConfig = (cfg) => { try { localStorage.setItem(CA_CONFIG_KEY, JSON.stringify(cfg)); } catch {} };
  const getClienteCfg = (clienteId) => getCaConfig()[clienteId] || {};
  const saveClienteCfg = (clienteId, patch) => {
    const cfg = getCaConfig();
    cfg[clienteId] = { ...(cfg[clienteId] || {}), ...patch };
    saveCaConfig(cfg);
  };

  const load = async () => {
    try { const d = await API.get('/api/intake-lancamentos'); if(d) setLancamentos(d); } catch {}
    setLoading(false);
  };
  useEffect(()=>{ load(); const t=setInterval(load,30000); return ()=>clearInterval(t); },[]);

  // ── Coleta campos para lançamento CA ─────────────────────────────────────
  // Retorna objeto com os campos, ou null se o usuário cancelou.
  // Pre-preenche com: sugestão IA → config salva por cliente → vazio
  const _coletarCamposCA = (l, incluirDescricao = true) => {
    const sia  = l.sugestao_ia || {};
    const lf   = l.lancamento_final || {};
    const cfg  = getClienteCfg(l.cliente_id || l.cliente);

    const val  = prompt(
      `Valor (R$) — ${l.fornecedor || l.cliente}:`,
      String(lf.valor ?? sia.valor ?? '')
    );
    if (val === null) return null;

    const venc = prompt(
      'Vencimento (DD/MM/AAAA):',
      lf.vencimento || sia.vencimento || ''
    );
    if (venc === null) return null;

    let desc = null;
    if (incluirDescricao) {
      desc = prompt(
        'Descrição:',
        lf.descricao || sia.descricao || `${l.fornecedor} — ${(l.data_recebido||'').slice(0,7)}`
      );
      if (desc === null) return null;
    }

    const catSalva = cfg.categoria_id || sia.categoria_id || '';
    const catId = prompt(
      `Categoria Financeira — UUID${catSalva ? ' (salvo: já preenchido)' : ''}:\n` +
      'Será salvo automaticamente para próximos lançamentos deste cliente.\n' +
      'Encontre em: Conta Azul → Configurações → Categorias Financeiras',
      catSalva
    );
    if (catId === null) return null;

    const contaSalva = cfg.conta_financeira_id || sia.conta_bancaria_id || '';
    const contaId = prompt(
      `Conta Financeira (banco) — UUID opcional${contaSalva ? ' (salvo: já preenchido)' : ''}:`,
      contaSalva
    );
    if (contaId === null) return null;

    // Salva UUIDs para este cliente
    const patch = {};
    if (catId.trim())   patch.categoria_id       = catId.trim();
    if (contaId.trim()) patch.conta_financeira_id = contaId.trim();
    if (Object.keys(patch).length) saveClienteCfg(l.cliente_id || l.cliente, patch);

    // Normaliza vencimento: aceita DDMMYYYY ou DDMMAA → DD/MM/YYYY
    let vencFmt = venc.trim();
    const soDigitos = vencFmt.replace(/\D/g,'');
    if (soDigitos.length === 8) vencFmt = `${soDigitos.slice(0,2)}/${soDigitos.slice(2,4)}/${soDigitos.slice(4)}`;
    else if (soDigitos.length === 6) vencFmt = `${soDigitos.slice(0,2)}/${soDigitos.slice(2,4)}/20${soDigitos.slice(4)}`;

    const body = {};
    if (val)            body.valor               = parseFloat(val.replace(',','.'));
    if (vencFmt)        body.vencimento          = vencFmt;
    if (desc)           body.descricao           = desc.trim();
    if (catId.trim())   body.categoria_id        = catId.trim();
    if (contaId.trim()) body.conta_financeira_id = contaId.trim();
    return body;
  };

  const aprovar = async (l) => {
    const body = _coletarCamposCA(l, true);
    if (body === null) return;

    setAprovandoId(l.id);
    try {
      const d = await API.post(`/api/intake/aprovar/${l.id}`, body);
      if (d.ca_id) {
        alert(`✅ Lançado no Conta Azul! ID: ${d.ca_id}`);
      } else if (d.ca_erro) {
        alert(`⚠️ Aprovado, mas falhou no CA:\n${d.ca_erro}\n\nUse "Retentar CA" para tentar novamente.`);
      } else {
        alert('✅ Aprovado! Sem lançamento automático no CA (categoria não informada).');
      }
      load();
    } catch(e) { alert('Erro: ' + (e.message || JSON.stringify(e))); }
    setAprovandoId(null);
  };

  const rejeitar = async (id) => {
    const motivo = prompt('Motivo da rejeição (opcional):');
    if (motivo === null) return;
    setRejeitandoId(id);
    try { await API.post(`/api/intake/rejeitar/${id}`, {motivo}); load(); } catch(e) { alert('Erro: ' + e.message); }
    setRejeitandoId(null);
  };

  const retentar = async (l) => {
    const body = _coletarCamposCA(l, false);
    if (body === null) return;
    setRetentandoCA(l.id);
    try {
      const d = await API.post(`/api/intake/retentar-ca/${l.id}`, body);
      if (d.ca_id) { alert(`✅ CA criado! ID: ${d.ca_id}`); load(); }
      else alert(`❌ Ainda falhou:\n${d.ca_erro || 'Erro desconhecido'}`);
    } catch(e) { alert('Erro: ' + e.message); }
    setRetentandoCA(null);
  };

  // Mapeamento cliente_id → company_id (para link de reautorização CA)
  const CLIENT_COMPANY_ID = {
    'body': 2, 'kimberly': 3, 'guimoo': 13, 'agro': 15,
    'jsa': 16, 'galiza': 17, 'up': 18, 'matsu': 19, 'ecofi': 20, 'makinsthall': 21
  };

  const [excluindoId, setExcluindoId] = useState(null);
  const excluir = async (l) => {
    if (l.ca_id) return alert('Lançamento já registrado no CA — não pode excluir.');
    if (!confirm(`Excluir lançamento "${l.nome_arquivo || l.id}" da fila?\nEsta ação não pode ser desfeita.`)) return;
    setExcluindoId(l.id);
    try {
      await API.del(`/api/intake/lancamento/${l.id}`);
      load();
    } catch(e) { alert('Erro ao excluir: ' + e.message); }
    setExcluindoId(null);
  };

  const clientes = [...new Set(lancamentos.map(l=>l.cliente).filter(Boolean))].sort();

  const filtrados = lancamentos.filter(l => {
    const matchCli = !filtroCliente || l.cliente === filtroCliente;
    const matchSt  = !filtroStatus ? true :
      filtroStatus === 'ca_pendente' ? (l.status === 'aprovado' && !l.ca_id) :
      l.status === filtroStatus;
    return matchCli && matchSt;
  });

  const pendentes = lancamentos.filter(l=>l.status==='pendente').length;

  const fmtVal = v => v != null ? `R$ ${Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '–';
  const ICON_TIPO = {nf:'🧾', boleto:'📄', fatura:'💳', outros:'📁'};

  if (loading) return React.createElement('div',{className:'p-6 text-center text-gray-400'},'Carregando...');

  return React.createElement('div',{className:'p-4 max-w-3xl mx-auto'},
    React.createElement('div',{className:'flex items-center justify-between mb-4'},
      React.createElement('h2',{className:'text-lg font-bold text-gray-800'},
        '💰 Fila de Lançamentos',
        pendentes > 0 && React.createElement('span',{className:'ml-2 text-xs bg-amber-500 text-white px-2 py-0.5 rounded-full'},`${pendentes} pendente${pendentes>1?'s':''}`)
      ),
      React.createElement('button',{onClick:load,className:'text-xs text-gray-500 hover:text-gray-700'},'↺ Atualizar')
    ),

    // Filtros
    React.createElement('div',{className:'flex gap-2 mb-4 flex-wrap'},
      React.createElement('select',{
        value:filtroStatus, onChange:e=>setFiltroStatus(e.target.value),
        className:'text-sm border border-gray-300 rounded px-2 py-1 bg-white'
      },
        React.createElement('option',{value:''},'Todos os status'),
        React.createElement('option',{value:'pendente'},'⏳ Pendente'),
        React.createElement('option',{value:'aprovado'},'✅ Aprovado'),
        React.createElement('option',{value:'rejeitado'},'❌ Rejeitado'),
        React.createElement('option',{value:'ca_pendente'},'⚠ CA pendente')
      ),
      React.createElement('select',{
        value:filtroCliente, onChange:e=>setFiltroCliente(e.target.value),
        className:'text-sm border border-gray-300 rounded px-2 py-1 bg-white'
      },
        React.createElement('option',{value:''},'Todos os clientes'),
        ...clientes.map(c=>React.createElement('option',{key:c,value:c},c))
      )
    ),

    filtrados.length === 0
      ? React.createElement('div',{className:'text-center text-gray-400 py-12'},'Nenhum lançamento encontrado')
      : React.createElement('div',{className:'space-y-3'},
          filtrados.map(l => {
            const sia    = l.sugestao_ia || {};
            const lf     = l.lancamento_final;
            const isPend = l.status === 'pendente';
            const isAprov= l.status === 'aprovado';
            const isRej  = l.status === 'rejeitado';
            const caFalhou = isAprov && !l.ca_id;

            return React.createElement('div',{
              key:l.id,
              className:`bg-white rounded-xl border shadow-sm p-4 ${isPend?'border-amber-300':'border-gray-200'}`
            },
              // Header
              React.createElement('div',{className:'flex items-start justify-between gap-2'},
                React.createElement('div',{className:'flex items-center gap-2 flex-wrap'},
                  React.createElement('span',{className:'text-base'},(ICON_TIPO[l.classificacao]||'📎')),
                  React.createElement('span',{className:'font-semibold text-gray-800'},l.fornecedor || '(fornecedor)'),
                  React.createElement('span',{className:'text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded'},l.cliente),
                ),
                // Badge status + botão excluir
                React.createElement('div',{className:'flex items-center gap-2'},
                  React.createElement('span',{className:`text-xs font-semibold px-2 py-0.5 rounded-full whitespace-nowrap ${
                    isPend ? 'bg-amber-100 text-amber-800' :
                    isAprov && l.ca_id ? 'bg-green-100 text-green-800' :
                    isAprov && !l.ca_id ? 'bg-orange-100 text-orange-800' :
                    'bg-red-100 text-red-800'
                  }`},
                    isPend ? '⏳ Pendente' :
                    isAprov && l.ca_id ? '✅ Lançado' :
                    isAprov && !l.ca_id ? '⚠ CA pendente' :
                    '❌ Rejeitado'
                  ),
                  !l.ca_id && React.createElement('button',{
                    onClick: () => excluir(l),
                    disabled: excluindoId === l.id,
                    title: 'Excluir da fila',
                    className:'text-gray-300 hover:text-red-500 transition-colors disabled:opacity-40 text-base leading-none'
                  }, excluindoId === l.id ? '…' : '🗑️')
                )
              ),

              // Detalhes
              React.createElement('div',{className:'mt-2 grid grid-cols-2 gap-x-4 gap-y-1 text-sm text-gray-600'},
                React.createElement('span',null,'💵 ',React.createElement('strong',null,fmtVal(lf?.valor ?? sia?.valor))),
                React.createElement('span',null,'📅 Venc: ',React.createElement('strong',null,lf?.vencimento || sia?.vencimento || '–')),
                React.createElement('span',null,'🏷 ',(l.classificacao||'').toUpperCase()),
                React.createElement('span',null,'📊 Confiança: ',l.confianca || '–'),
                React.createElement('span',{className:'col-span-2 text-xs text-gray-400'},'Recebido: ',l.data_recebido,' · ',l.origem)
              ),

              // Link Drive
              l.drive_url && React.createElement('a',{
                href:l.drive_url, target:'_blank', rel:'noreferrer',
                className:'inline-block mt-2 text-xs text-blue-600 underline'
              },'📎 ',l.nome_arquivo || 'Ver arquivo'),

              // Link original quando download falhou
              l.link_original && !l.drive_url && React.createElement('a',{
                href:l.link_original, target:'_blank', rel:'noreferrer',
                className:'inline-block mt-2 text-xs text-orange-600 underline'
              },'🔗 Abrir link original (arquivo não baixado)'),

              // Erro CA
              caFalhou && l.ca_erro && React.createElement('div',{className:'mt-2 text-xs text-orange-700 bg-orange-50 border border-orange-200 rounded p-2'},
                React.createElement('strong',null,'Erro CA: '),l.ca_erro.slice(0,140),
                React.createElement('button',{
                  onClick:()=>retentar(l),
                  disabled:retentandoCA===l.id,
                  className:'ml-3 text-xs bg-orange-500 text-white px-2 py-0.5 rounded hover:bg-orange-600 disabled:opacity-50'
                }, retentandoCA===l.id ? 'Retentando...' : '🔄 Retentar CA')
              ),
              caFalhou && !l.ca_erro && React.createElement('div',{className:'mt-2 text-xs text-orange-600'},
                'Token CA possivelmente expirado. ',
                React.createElement('a',{
                  href: `https://app.staffconsult.com.br/api/contaazul/start?company_id=${CLIENT_COMPANY_ID[l.cliente?.toLowerCase()] || ''}`,
                  target:'_blank', rel:'noreferrer', className:'underline font-medium'
                },'Reautorizar'),
                ' · ',
                React.createElement('button',{onClick:()=>retentar(l),disabled:retentandoCA===l.id,className:'underline disabled:opacity-50'},
                  retentandoCA===l.id ? 'Retentando...' : 'Retentar')
              ),

              // Motivo rejeição
              isRej && l.rejeicao_motivo && React.createElement('div',{className:'mt-2 text-xs text-red-600'},
                'Motivo: ',l.rejeicao_motivo
              ),

              // Resolvido por
              (isAprov||isRej) && React.createElement('div',{className:'mt-1 text-xs text-gray-400'},
                (isAprov?'Aprovado':'Rejeitado'),' por ',l.resolvedBy,' — ',l.resolvedAt ? new Date(l.resolvedAt).toLocaleString('pt-BR') : ''
              ),

              // Botões de ação
              isPend && React.createElement('div',{className:'mt-3 flex gap-2'},
                React.createElement('button',{
                  onClick:()=>aprovar(l),
                  disabled:aprovandoId===l.id,
                  className:'text-sm bg-green-600 text-white px-4 py-1.5 rounded-lg hover:bg-green-700 disabled:opacity-50'
                }, aprovandoId===l.id ? 'Aprovando...' : '✅ Aprovar'),
                React.createElement('button',{
                  onClick:()=>rejeitar(l.id),
                  disabled:rejeitandoId===l.id,
                  className:'text-sm bg-red-100 text-red-700 px-4 py-1.5 rounded-lg hover:bg-red-200 disabled:opacity-50'
                }, rejeitandoId===l.id ? 'Rejeitando...' : '❌ Rejeitar')
              )
            );
          })
        )
  );
}

// ── E-MAILS / NOTIFICAÇÕES ───────────────────────────
function EmailNotificacoes({currentUser}) {
  const [notifs, setNotifs]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm]         = useState({from:'',subject:'',summary:''});
  const [filtro, setFiltro]     = useState('todos');
  const isAdmin = currentUser?.role === 'admin';
  const uid = String(currentUser?.id);

  const load = async () => {
    try { const d = await API.get('/api/email-notifs'); if(d) setNotifs(d); } catch {}
    setLoading(false);
  };
  useEffect(()=>{ load(); const t=setInterval(load,30000); return ()=>clearInterval(t); },[]);

  const markRead = async (id) => {
    try {
      await API.patch(`/api/email-notifs/${id}/read`);
      setNotifs(prev=>prev.map(n=>n.id===id?{...n,readBy:[...new Set([...(n.readBy||[]),uid])]}:n));
    } catch {}
  };

  const add = async () => {
    if(!form.subject.trim()) return;
    try {
      const novo = await API.post('/api/email-notifs', form);
      setNotifs(prev=>[novo,...prev]);
      setForm({from:'',subject:'',summary:''});
      setShowForm(false);
    } catch {}
  };

  const del = async (id) => {
    if(!confirm('Remover esta notificação?')) return;
    try { await API.del(`/api/email-notifs/${id}`); setNotifs(prev=>prev.filter(n=>n.id!==id)); } catch {}
  };

  const unread = notifs.filter(n=>!(n.readBy||[]).includes(uid));

  const filtrados = notifs.filter(n => {
    if (filtro === 'criticos')    return n.critico;
    if (filtro === 'erros')       return !!n.motivo_falha;
    if (filtro === 'operacional') return n.tipo === 'operacional' || n.classificacao === 'operacional';
    if (filtro === 'documentos')  return n.tipo !== 'operacional' && n.classificacao !== 'operacional' && !n.motivo_falha;
    return true;
  });
  const cnt = {
    criticos:    notifs.filter(n=>n.critico).length,
    erros:       notifs.filter(n=>!!n.motivo_falha).length,
    operacional: notifs.filter(n=>n.tipo==='operacional'||n.classificacao==='operacional').length,
    documentos:  notifs.filter(n=>n.tipo!=='operacional'&&n.classificacao!=='operacional'&&!n.motivo_falha).length,
  };
  const MOTIVO_LABEL = {
    sem_anexo:    'E-mail sem anexo PDF — nenhum arquivo para baixar',
    link_quebrado:'Link encontrado no e-mail, mas download falhou',
    protegido:    'Arquivo protegido ou acesso negado — baixar manualmente',
  };
  const ICON_CLASSIF = {nf:'🧾',boleto:'📋',fatura:'💵',extrato:'🏦',operacional:'📋',outros:'📎'};
  const borderColorFn = (n, lido) => {
    if (lido) return '#e2e8f0';
    if (n.critico) return '#b91c1c';
    if (n.motivo_falha) return '#f59e0b';
    if (n.tipo === 'operacional' || n.classificacao === 'operacional') return '#d97706';
    return '#3b82f6';
  };
  const FilterBtn = ({id, label, count}) =>
    React.createElement('button',{
      onClick:()=>setFiltro(id),
      style:{fontSize:'12px',padding:'4px 12px',borderRadius:'20px',border:'none',cursor:'pointer',
        fontWeight:filtro===id?700:400, background:filtro===id?'#060505':'#f1f5f9', color:filtro===id?'#fff':'#64748b'}
    }, label+(count>0?` (${count})`:''));

  return (
    <div style={{maxWidth:'700px',margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px',gap:'12px',flexWrap:'wrap'}}>
        <div>
          <h2 style={{fontSize:'18px',fontWeight:700,color:'#060505',margin:0}}>📧 Notificações de E-mail</h2>
          <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'3px'}}>
            {unread.length>0 ? <span style={{color:'#dc2626',fontWeight:600}}>{unread.length} não lida{unread.length!==1?'s':''}</span> : <span>Tudo lido ✓</span>}
          </div>
        </div>
        {isAdmin&&(
          <button className="btn-green" style={{fontSize:'13px',padding:'7px 16px'}} onClick={()=>setShowForm(s=>!s)}>
            {showForm?'✕ Cancelar':'+ Nova Notificação'}
          </button>
        )}
      </div>

      {/* Formulário de nova notificação (admin) */}
      {showForm&&isAdmin&&(
        <div className="card fade-in" style={{padding:'18px',marginBottom:'20px',border:'1px solid rgba(0,196,140,.25)'}}>
          <div style={{fontSize:'13px',fontWeight:700,color:'#00C48C',marginBottom:'14px'}}>📧 Registrar notificação de e-mail</div>
          <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            <input className="input-field" placeholder="De (remetente)" value={form.from} onChange={e=>setForm(f=>({...f,from:e.target.value}))}/>
            <input className="input-field" placeholder="Assunto *" value={form.subject} onChange={e=>setForm(f=>({...f,subject:e.target.value}))}/>
            <textarea className="input-field" placeholder="Resumo / instrução (opcional)" rows="3" value={form.summary} onChange={e=>setForm(f=>({...f,summary:e.target.value}))} style={{fontSize:'13px'}}/>
          </div>
          <div style={{display:'flex',gap:'8px',marginTop:'12px',justifyContent:'flex-end'}}>
            <button className="btn-ghost" style={{fontSize:'12px'}} onClick={()=>setShowForm(false)}>Cancelar</button>
            <button className="btn-green" style={{fontSize:'12px'}} onClick={add}>✓ Salvar</button>
          </div>
        </div>
      )}

      {loading&&<div style={{textAlign:'center',padding:'40px',color:'#94a3b8'}}>Carregando…</div>}

      {!loading&&notifs.length===0&&(
        <div className="card" style={{padding:'32px',textAlign:'center',color:'#94a3b8'}}>
          <div style={{fontSize:'32px',marginBottom:'8px'}}>📭</div>
          <div>Nenhuma notificação de e-mail registrada</div>
        </div>
      )}

      {notifs.length > 0 && (
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'14px'}}>
          {React.createElement(FilterBtn,{id:'todos',label:'Todos',count:notifs.length})}
          {cnt.criticos>0&&React.createElement(FilterBtn,{id:'criticos',label:'🔴 Críticos',count:cnt.criticos})}
          {cnt.erros>0&&React.createElement(FilterBtn,{id:'erros',label:'⚠ Erros',count:cnt.erros})}
          {cnt.operacional>0&&React.createElement(FilterBtn,{id:'operacional',label:'📋 Operacionais',count:cnt.operacional})}
          {cnt.documentos>0&&React.createElement(FilterBtn,{id:'documentos',label:'📄 Documentos',count:cnt.documentos})}
        </div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {filtrados.map(n=>{
          const lido = (n.readBy||[]).includes(uid);
          const dt = n.createdAt ? new Date(n.createdAt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
          const isOp = n.tipo==='operacional' || n.classificacao==='operacional';
          const iconClassif = ICON_CLASSIF[n.classificacao] || '📎';
          const border = borderColorFn(n, lido);
          const confColor = n.confianca==='alta'?'#00C48C':n.confianca==='baixa'?'#dc2626':'#f59e0b';
          return (
            <div key={n.id} className="card fade-in" style={{padding:'14px 16px',borderLeft:`3px solid ${border}`,opacity:lido?0.75:1,transition:'opacity .2s',background:n.critico&&!lido?'rgba(185,28,28,.03)':''}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'3px'}}>
                    <span style={{fontSize:'16px'}}>{lido?'📬':'📩'}</span>
                    <span style={{fontWeight:700,fontSize:'14px',color:lido?'#94a3b8':'#060505'}}>{n.assunto||n.subject||'(sem assunto)'}</span>
                    {n.critico&&<span style={{fontSize:'10px',background:'rgba(185,28,28,.12)',color:'#b91c1c',borderRadius:'6px',padding:'2px 8px',fontWeight:700}}>🔴 CRÍTICO</span>}
                    {!lido&&<span style={{fontSize:'10px',background:'rgba(220,38,38,.12)',color:'#dc2626',borderRadius:'6px',padding:'2px 8px',fontWeight:700}}>NÃO LIDO</span>}
                    {lido&&<span style={{fontSize:'10px',background:'rgba(0,196,140,.1)',color:'#00C48C',borderRadius:'6px',padding:'2px 8px',fontWeight:600}}>✓ Lido</span>}
                  </div>
                  <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'2px'}}>
                    {(n.remetente||n.from)&&<span>De: {n.remetente||n.from}</span>}
                    {n.cliente&&<span style={{marginLeft:'8px',color:'#64748b'}}>· <strong>{n.cliente}</strong>{n.fornecedor&&n.fornecedor!==n.cliente?' · '+n.fornecedor:''}</span>}
                  </div>
                  {(n.classificacao||n.confianca)&&(
                    <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'4px',alignItems:'center'}}>
                      {n.classificacao&&<span style={{background:'#f1f5f9',borderRadius:'4px',padding:'1px 7px',fontWeight:600,textTransform:'uppercase',fontSize:'10px',color:'#374151'}}>{iconClassif} {n.classificacao}</span>}
                      {n.confianca&&<span style={{fontSize:'10px',color:confColor,fontWeight:600}}>{n.confianca}</span>}
                      {n.motivo_falha&&<span style={{fontSize:'10px',background:'rgba(245,158,11,.1)',color:'#b45309',borderRadius:'4px',padding:'1px 7px',fontWeight:600}}>⚠ Não baixado</span>}
                    </div>
                  )}
                  {isOp&&n.descricao&&(
                    <div style={{fontSize:'12px',color:'#374151',background:'rgba(217,119,6,.06)',border:'1px solid rgba(217,119,6,.15)',borderRadius:'6px',padding:'8px 10px',marginBottom:'6px',lineHeight:1.5}}>
                      {n.descricao}
                    </div>
                  )}
                  {n.motivo_falha&&(
                    <div style={{fontSize:'11px',background:'rgba(245,158,11,.07)',border:'1px solid rgba(245,158,11,.2)',borderRadius:'6px',padding:'8px 10px',marginBottom:'6px'}}>
                      <div style={{color:'#b45309',fontWeight:600,marginBottom:'4px'}}>⚠️ {MOTIVO_LABEL[n.motivo_falha]||n.motivo_falha}</div>
                      <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                        {n.link_original&&(
                          <a href={n.link_original} target="_blank" rel="noreferrer"
                             style={{fontSize:'11px',background:'#f59e0b',color:'#fff',borderRadius:'5px',padding:'3px 10px',textDecoration:'none',fontWeight:600}}>
                            🔗 Abrir link original
                          </a>
                        )}
                        {n.drive_url&&(
                          <a href={n.drive_url} target="_blank" rel="noreferrer"
                             style={{fontSize:'11px',background:'#3b82f6',color:'#fff',borderRadius:'5px',padding:'3px 10px',textDecoration:'none',fontWeight:600}}>
                            📄 Rastro no Drive
                          </a>
                        )}
                      </div>
                      {n.nome_arquivo&&<div style={{color:'#94a3b8',marginTop:'3px',fontSize:'10px'}}>{n.nome_arquivo}</div>}
                    </div>
                  )}
                  {n.drive_url&&!n.motivo_falha&&(
                    <a href={n.drive_url} target="_blank" rel="noreferrer"
                       style={{fontSize:'11px',color:'#3b82f6',textDecoration:'underline',marginBottom:'4px',display:'inline-block'}}>
                      📎 {n.nome_arquivo||'Ver arquivo'}
                    </a>
                  )}
                  <div style={{fontSize:'11px',color:'#b0b8c4',marginTop:'4px'}}>{dt} · {(n.readBy||[]).length} leu{(n.readBy||[]).length!==1?'ram':''}</div>
                </div>
                <div style={{display:'flex',gap:'6px',flexShrink:0,alignItems:'center'}}>
                  {!lido&&(
                    <button className="btn-success" style={{fontSize:'12px',padding:'5px 14px'}} onClick={()=>markRead(n.id)}>✓ E-mail lido</button>
                  )}
                  {isAdmin&&(
                    <button onClick={()=>del(n.id)} style={{background:'rgba(220,38,38,.08)',color:'#dc2626',border:'none',cursor:'pointer',borderRadius:'7px',padding:'5px 10px',fontSize:'13px'}}>🗑</button>
                  )}
                </div>
              </div>
            </div>
          );
        })}
        {filtrados.length===0&&notifs.length>0&&(
          <div className="card" style={{padding:'24px',textAlign:'center',color:'#94a3b8',fontSize:'13px'}}>Nenhuma notificação neste filtro</div>
        )}
      </div>
    </div>
  );
}

function Chat({currentUser}) {
  const [messages,setMessages]     = useState([]);
  const [text,setText]             = useState('');
  const [sending,setSending]       = useState(false);
  const [uploadingImg,setUploadingImg] = useState(false);
  const [lightbox,setLightbox]     = useState(null);
  const [replyTo,setReplyTo]       = useState(null);   // {id, userName, text, imageUrl}
  const [unreadAt,setUnreadAt]     = useState(null);   // createdAt da 1ª msg não lida
  const bottomRef = useRef(null);
  const lastIdRef = useRef(null);
  const fileRef   = useRef(null);
  const inputRef  = useRef(null);
  const LAST_READ_KEY = `chat_lastread_${currentUser.id}`;

  // Fecha lightbox/reply com ESC
  useEffect(()=>{
    const fn = e => {
      if(e.key==='Escape'){ setLightbox(null); setReplyTo(null); }
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  },[]);

  const load = async (initial=false) => {
    try {
      const url = lastIdRef.current&&!initial ? `/api/chat?since=${encodeURIComponent(lastIdRef.current)}` : '/api/chat';
      const data = await API.get(url);
      if (!data||data.length===0) return;
      // Filtra: apenas mensagens reais (não system) + email_monitor
      const visible = data.filter(m => m.type !== 'system' || m.source === 'email_monitor');
      if(visible.length===0) return;
      if (initial) {
        // Marca não lidas: mensagens após lastRead de outro usuário
        const lastRead = localStorage.getItem(LAST_READ_KEY);
        if(lastRead) {
          const firstUnread = visible.find(m => m.createdAt > lastRead && String(m.userId) !== String(currentUser.id));
          if(firstUnread) setUnreadAt(firstUnread.createdAt);
        }
        setMessages(visible);
        // Ao abrir chat, marca como lido
        const last = visible[visible.length-1];
        if(last) localStorage.setItem(LAST_READ_KEY, last.createdAt);
      } else {
        setMessages(prev=>{
          const seen = new Set(prev.map(m=>m.createdAt));
          const novos = visible.filter(m=>!seen.has(m.createdAt));
          return novos.length ? [...prev,...novos] : prev;
        });
        const last = visible[visible.length-1];
        if(last) localStorage.setItem(LAST_READ_KEY, last.createdAt);
      }
      lastIdRef.current = data[data.length-1]?.createdAt;
    } catch {}
  };

  useEffect(()=>{ load(true); const t=setInterval(()=>load(false),3000); return()=>clearInterval(t); },[]);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  const send = async () => {
    if(!text.trim()||sending) return;
    setSending(true);
    try {
      const body = {text};
      if(replyTo) { body.replyToId = replyTo.id; body.replyText = replyTo.imageUrl ? '📷 Imagem' : (replyTo.text||'').slice(0,120); body.replyUser = replyTo.userName; }
      const msg = await API.post('/api/chat', body);
      setMessages(prev=>[...prev,msg]);
      lastIdRef.current = msg.createdAt;
      setText(''); setReplyTo(null);
    } catch {}
    finally { setSending(false); }
  };

  const sendImage = async (file) => {
    if(!file||uploadingImg) return;
    if(file.size > 3*1024*1024){ alert('Imagem muito grande. Máximo 2 MB.'); return; }
    setUploadingImg(true);
    try {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const dataUrl = ev.target.result;
          const [meta, data] = dataUrl.split(',');
          const mimeType = meta.match(/:(.*?);/)[1];
          const { url } = await API.post('/api/chat/upload', { data, mimeType });
          const body = { text: '📷 Imagem', imageUrl: url };
          if(replyTo) { body.replyToId = replyTo.id; body.replyText = replyTo.imageUrl ? '📷 Imagem' : (replyTo.text||'').slice(0,120); body.replyUser = replyTo.userName; }
          const msg = await API.post('/api/chat', body);
          setMessages(prev=>[...prev,msg]);
          lastIdRef.current = msg.createdAt;
          setReplyTo(null);
        } catch(e) { alert('Erro ao enviar imagem'); }
        finally { setUploadingImg(false); }
      };
      reader.readAsDataURL(file);
    } catch { setUploadingImg(false); }
  };

  const startReply = (m) => {
    setReplyTo({id: m.id||m.createdAt, userName: m.userName||'Você', text: m.text, imageUrl: m.imageUrl});
    inputRef.current?.focus();
  };

  const fmtTime = iso => new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const fmtDay  = iso => { const d=new Date(iso); const t=new Date(); return d.toDateString()===t.toDateString()?'Hoje':d.toLocaleDateString('pt-BR'); };

  let lastDay = null;
  let shownUnread = false;

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 180px)',maxHeight:'700px'}}>
      <div style={{flex:1,overflowY:'auto',padding:'8px 0',display:'flex',flexDirection:'column',gap:'8px'}}>
        {messages.length===0&&<div style={{textAlign:'center',color:'#94a3b8',fontSize:'13px',padding:'40px'}}>Nenhuma mensagem ainda. Diga olá! 👋</div>}
        {messages.map((m,i)=>{
          const isMe = String(m.userId)===String(currentUser.id);
          const day  = fmtDay(m.createdAt);
          const showDay = day!==lastDay; lastDay=day;
          // Separador não lidas
          let showUnread = false;
          if(unreadAt && m.createdAt===unreadAt && !isMe && !shownUnread){ showUnread=true; shownUnread=true; }

          // Email-monitor: bolha especial
          if(m.type==='system' && m.source==='email_monitor') return (
            <React.Fragment key={m.id||i}>
              {showDay&&<div style={{textAlign:'center',fontSize:'11px',color:'#94a3b8',padding:'8px 0'}}>{day}</div>}
              <div style={{display:'flex',justifyContent:'center',padding:'2px 0'}}>
                <div style={{background:'rgba(13,110,253,.08)',border:'1px solid rgba(13,110,253,.2)',borderRadius:'20px',padding:'5px 14px',fontSize:'12px',color:'#0D6EFD',maxWidth:'85%',textAlign:'center'}}>
                  📧 {m.text} <span style={{opacity:.5,fontSize:'10px',marginLeft:'6px'}}>{fmtTime(m.createdAt)}</span>
                </div>
              </div>
            </React.Fragment>
          );
          // Mensagens de sistema puras — não renderizar
          if(m.type==='system') return null;

          return (
            <React.Fragment key={m.id||i}>
              {showDay&&<div style={{textAlign:'center',fontSize:'11px',color:'#94a3b8',padding:'8px 0'}}>{day}</div>}
              {showUnread&&(
                <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'4px 8px'}}>
                  <div style={{flex:1,height:'1px',background:'rgba(13,110,253,.3)'}}/>
                  <span style={{fontSize:'11px',fontWeight:700,color:'#0D6EFD',background:'rgba(13,110,253,.08)',border:'1px solid rgba(13,110,253,.2)',borderRadius:'20px',padding:'3px 12px',whiteSpace:'nowrap'}}>🔵 Novas mensagens</span>
                  <div style={{flex:1,height:'1px',background:'rgba(13,110,253,.3)'}}/>
                </div>
              )}
              <div style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start',gap:'2px'}}>
                {!isMe&&<div style={{fontSize:'11px',color:'#94a3b8',paddingLeft:'4px'}}>{m.userName}</div>}
                <div className="chat-msg-row" style={{flexDirection:isMe?'row-reverse':'row'}}>
                  <div className={isMe?'chat-bubble-me':'chat-bubble-other'}>
                    {/* Quote de resposta */}
                    {m.replyText&&(
                      <div style={{background:isMe?'rgba(255,255,255,.2)':'rgba(0,196,140,.08)',borderLeft:isMe?'3px solid rgba(255,255,255,.6)':'3px solid #00C48C',borderRadius:'6px',padding:'5px 9px',marginBottom:'7px',fontSize:'12px',opacity:.9}}>
                        <div style={{fontWeight:700,fontSize:'11px',marginBottom:'2px',color:isMe?'rgba(255,255,255,.9)':'#00C48C'}}>{m.replyUser||'...'}</div>
                        <div style={{color:isMe?'rgba(255,255,255,.85)':'#374151',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'240px'}}>{m.replyText}</div>
                      </div>
                    )}
                    {m.imageUrl
                      ? <img src={m.imageUrl} alt="imagem" onClick={()=>setLightbox(m.imageUrl)} style={{maxWidth:'220px',maxHeight:'200px',borderRadius:'8px',display:'block',cursor:'zoom-in'}}/>
                      : <div style={{fontSize:'14px',lineHeight:'1.5',whiteSpace:'pre-wrap'}}>{m.text}</div>
                    }
                    <div style={{fontSize:'10px',opacity:.7,marginTop:'4px',textAlign:isMe?'right':'left'}}>{fmtTime(m.createdAt)}</div>
                  </div>
                  <button className="chat-reply-btn" onClick={()=>startReply(m)} title="Responder">↩</button>
                </div>
              </div>
            </React.Fragment>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      {/* Preview de reply */}
      {replyTo&&(
        <div style={{borderTop:'1px solid #e2e8f0',padding:'8px 12px',background:'rgba(0,196,140,.04)',display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{borderLeft:'3px solid #00C48C',paddingLeft:'10px',flex:1,minWidth:0}}>
            <div style={{fontSize:'11px',fontWeight:700,color:'#00C48C',marginBottom:'2px'}}>Respondendo a {replyTo.userName}</div>
            <div style={{fontSize:'12px',color:'#64748b',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{replyTo.imageUrl?'📷 Imagem':replyTo.text}</div>
          </div>
          <button onClick={()=>setReplyTo(null)} style={{background:'none',border:'none',color:'#94a3b8',fontSize:'18px',cursor:'pointer',flexShrink:0,padding:'2px 6px'}}>✕</button>
        </div>
      )}
      <div style={{borderTop:'1px solid #e2e8f0',paddingTop:'12px',display:'flex',gap:'8px',alignItems:'flex-end'}}>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{if(e.target.files[0])sendImage(e.target.files[0]);e.target.value='';}}/>
        <button title="Enviar imagem" onClick={()=>fileRef.current?.click()} disabled={uploadingImg||sending} style={{background:'#f1f5f9',border:'1.5px solid #e2e8f0',borderRadius:'8px',padding:'10px 12px',cursor:'pointer',fontSize:'18px',flexShrink:0,lineHeight:1,color:uploadingImg?'#94a3b8':'#475569'}}>
          {uploadingImg ? '⏳' : '📎'}
        </button>
        <textarea ref={inputRef} className="input-field" style={{flex:1,minHeight:'44px',maxHeight:'120px',resize:'none',padding:'10px 14px'}} placeholder="Digite uma mensagem... (Enter envia, Shift+Enter quebra linha)" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
        <button className="btn-green" style={{padding:'10px 18px',flexShrink:0}} onClick={send} disabled={sending||!text.trim()}>Enviar</button>
      </div>
      {/* Lightbox */}
      {lightbox&&(
        <div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,cursor:'zoom-out'}}>
          <img src={lightbox} alt="imagem ampliada" style={{maxWidth:'92vw',maxHeight:'90vh',borderRadius:'10px',boxShadow:'0 8px 40px rgba(0,0,0,.6)',objectFit:'contain'}} onClick={e=>e.stopPropagation()}/>
          <button onClick={()=>setLightbox(null)} style={{position:'fixed',top:'18px',right:'24px',background:'rgba(255,255,255,.15)',border:'none',color:'#fff',fontSize:'28px',cursor:'pointer',borderRadius:'50%',width:'42px',height:'42px',lineHeight:'42px',textAlign:'center'}}>&times;</button>
          <a href={lightbox} download style={{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'rgba(255,255,255,.15)',color:'#fff',padding:'8px 22px',borderRadius:'20px',fontSize:'13px',textDecoration:'none',border:'1px solid rgba(255,255,255,.3)'}} onClick={e=>e.stopPropagation()}>⬇ Salvar imagem</a>
        </div>
      )}
    </div>
  );
}

function Dashboard({user, onLogout}) {
  const [tab,setTab]           = useState('fila');
  const [clients,setClients]   = useState([]);
  const [operators,setOps]     = useState([]);
  const [dayTasks,setDayTasks] = useState({});
  const [extraTasks,setExtra]  = useState([]);
  const [manuals,setManuals]   = useState([]);
  const [mensagens,setMensagens] = useState([]);
  const [loading,setLoading]   = useState(true);
  const [unreadChat,setUnreadChat]   = useState(0);
  const [unreadEmails,setUnreadEmails]             = useState(0);
  const [pendentesLancamentos,setPendentesLancamentos] = useState(0);
  const [saveStatus,setSaveStatus] = useState(null); // null | 'saving' | 'ok' | 'error'
  const lastChatAtRef = useRef(null);
  const lastSaveAtRef = useRef(0);   // timestamp da última gravação — poll não sobrescreve antes de 12s
  const today = todayStr();
  const pollRef = useRef(null);
  const saveTimerRef = useRef(null);

  const showSave = (status) => {
    setSaveStatus(status);
    clearTimeout(saveTimerRef.current);
    if(status==='ok') saveTimerRef.current = setTimeout(()=>setSaveStatus(null), 2500);
    if(status==='error') saveTimerRef.current = setTimeout(()=>setSaveStatus(null), 5000);
  };

  useEffect(()=>{
    Promise.all([API.get('/api/clients'),API.get('/api/operators'),API.get('/api/day-tasks/'+today),API.get('/api/extra-tasks'),API.get('/api/manuals'),API.get('/api/mensagens'),API.get('/api/chat')])
      .then(([cls,ops,dt,et,mn,msgs,chatData])=>{
        setClients(cls||[]);
        setOps(ops||[]);
        const tasks={};
        (cls||[]).forEach(c=>{tasks[c.id]=dt[c.id]||freshTaskForClient(c);});
        setDayTasks(tasks);
        setExtra(et||[]);
        setManuals(mn||[]);
        setMensagens(msgs||[]);
        if(chatData&&chatData.length>0) lastChatAtRef.current = chatData[chatData.length-1].createdAt;
        else lastChatAtRef.current = new Date().toISOString();
        setLoading(false);
      }).catch(()=>setLoading(false));
  },[]);

  useEffect(()=>{
    if(loading) return;
    let pollCount = 0;
    pollRef.current=setInterval(async()=>{
      pollCount++;
      // Não sobrescreve estado se houve uma gravação nos últimos 12 segundos
      const recentSave = (Date.now() - lastSaveAtRef.current) < 30000;
      if(!recentSave) {
        try {
          const dt=await API.get('/api/day-tasks/'+today);
          if(dt) setDayTasks(prev=>{const n={...prev};Object.keys(dt).forEach(k=>{n[k]=dt[k];});return n;});
        } catch {}
        // Atualiza extraTasks a cada 6 ciclos (~30s) para pegar mudanças de outros usuários
        if(pollCount % 6 === 0) {
          try { const et=await API.get('/api/extra-tasks'); if(et) setExtra(et); } catch {}
        }
      }
      // Poll chat para badge e som de não lidas
      try {
        const since = lastChatAtRef.current;
        if(since) {
          const msgs = await API.get(`/api/chat?since=${encodeURIComponent(since)}`);
          if(msgs&&msgs.length>0) {
            // Filtra mensagens relevantes: reais de usuário OU email webhook (source=email_monitor)
            // Exclui mensagens de sistema (bloco2, transferência, etc.) para não poluir notificações
            const mine = msgs.filter(m=>
              m.userId !== user.id &&
              (!m.targetOpId || String(m.targetOpId)===String(user.id)) &&
              (m.type !== 'system' || m.source === 'email_monitor')
            );
            if(mine.length>0) {
              setUnreadChat(prev=>prev+mine.length);
              // Toca som via Web Audio API
              try {
                const ctx = new (window.AudioContext||window.webkitAudioContext)();
                const beep = (freq, start, dur) => {
                  const osc=ctx.createOscillator(), gain=ctx.createGain();
                  osc.connect(gain); gain.connect(ctx.destination);
                  osc.frequency.value=freq; osc.type='sine';
                  gain.gain.setValueAtTime(0, ctx.currentTime+start);
                  gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime+start+0.01);
                  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+dur);
                  osc.start(ctx.currentTime+start); osc.stop(ctx.currentTime+start+dur+0.05);
                };
                beep(880, 0, 0.12); beep(660, 0.16, 0.18);
              } catch {}
            }
            lastChatAtRef.current = msgs[msgs.length-1].createdAt;
          }
        }
      } catch {}
    },5000);
    return()=>clearInterval(pollRef.current);
  },[loading,today]);

  // Polling de e-mails não lidos
  useEffect(()=>{
    if(!user) return;
    const uid = String(user.id);
    const check = async () => {
      try {
        const d = await API.get('/api/email-notifs');
        if(d) setUnreadEmails(d.filter(n=>!(n.readBy||[]).includes(uid)).length);
      } catch {}
    };
    check();
    const t = setInterval(check, 30000);
    return ()=>clearInterval(t);
  },[user]);

  // Polling de lançamentos pendentes
  useEffect(()=>{
    if(!user) return;
    const check = async () => {
      try {
        const d = await API.get('/api/intake-lancamentos?status=pendente&limit=200');
        if(d) setPendentesLancamentos(d.length);
      } catch {}
    };
    check();
    const t = setInterval(check, 30000);
    return ()=>clearInterval(t);
  },[user]);

  // Registra service worker e inscreve para push
  useEffect(()=>{
    if(!user||!('serviceWorker' in navigator)||!('PushManager' in window)) return;
    (async()=>{
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        const {key} = await API.get('/api/push/vapid-key');
        if(!key) return;
        let sub = await reg.pushManager.getSubscription();
        if(!sub) sub = await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(key)});
        await API.post('/api/push/subscribe', sub);
      } catch(e) { console.log('Push SW:', e.message); }
    })();
  },[user]);

  // Som de notificação — disparado pelo service worker via postMessage
  useEffect(()=>{
    if(!('serviceWorker' in navigator)) return;
    const playBeep = () => {
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        // Dois tons curtos — estilo notificação
        const beep = (freq, start, dur) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0, ctx.currentTime + start);
          gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + start + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + dur + 0.05);
        };
        beep(880, 0,    0.12);
        beep(660, 0.16, 0.18);
      } catch {}
    };
    const handler = e => { if(e.data?.type === 'PLAY_NOTIFICATION_SOUND') playBeep(); };
    navigator.serviceWorker.addEventListener('message', handler);
    return () => navigator.serviceWorker.removeEventListener('message', handler);
  },[]);

  const addClient      = async u => { try{const s=await API.post('/api/clients',u);setClients(cs=>[...cs,s]);}catch(e){alert(e.error||'Erro');} };
  const updateClient   = async u => { setClients(cs=>cs.map(c=>c.id===u.id?u:c)); try{await API.put('/api/clients/'+u.id,u);}catch{} };
  const updateDayTask = async (cid,t) => {
    setDayTasks(dt=>({...dt,[cid]:t}));
    lastSaveAtRef.current = Date.now();
    showSave('saving');
    try {
      await API.put(`/api/day-tasks/${today}/${cid}`,t);
      showSave('ok');
    } catch {
      showSave('error');
      // Reverte estado local e avisa — evita ilusão de que salvou
      try { const dt=await API.get('/api/day-tasks/'+today); if(dt) setDayTasks(prev=>{const n={...prev};Object.keys(dt).forEach(k=>{n[k]=dt[k];});return n;}); } catch {}
    }
  };
  const addExtra = async t => {
    try {
      showSave('saving');
      const s = await API.post('/api/extra-tasks', t);
      setExtra(ts=>[s,...ts]);
      showSave('ok');
      if(t.operator_id) {
        const op = operators.find(o=>String(o.id)===String(t.operator_id));
        if(op) notifyOp(op.id, op.name.split(' ')[0], '📋 Nova tarefa', `"${t.title}" adicionada para você`);
      }

  };
  const deleteExtra = async (t, mode='single') => {
    if(!window.confirm(mode==='all'
      ? `Excluir TODAS as ocorrências de "${t.title}"? Esta ação não pode ser desfeita.`
      : `Excluir "${t.title}"? Esta ação não pode ser desfeita.`)) return;
    showSave('saving');
    try {
      await API.del(`/api/extra-tasks/${t.id}?mode=${mode}`);
      if(mode==='all') setExtra(ts=>ts.filter(x=>!(x.recurring&&x.title===t.title&&String(x.client_id||'')===String(t.client_id||'')&&String(x.operator_id||'')===String(t.operator_id||''))));
      else setExtra(ts=>ts.filter(x=>x.id!==t.id));
      showSave('ok');
    } catch(e) { showSave('error'); alert(e.error||'Erro ao excluir'); }
  };
  const updateExtra = async t => {
    setExtra(ts=>ts.map(x=>x.id===t.id?t:x));
    lastSaveAtRef.current = Date.now();
    showSave('saving');
    try {
      await API.put('/api/extra-tasks/'+t.id, t);
      showSave('ok');
    } catch {
      showSave('error');
      // Reverte: busca o estado real do servidor
      try { const et=await API.get('/api/extra-tasks'); if(et) setExtra(et); } catch {}
    }
  };
  const addManual      = async m => { try{const s=await API.post('/api/manuals',m);setManuals(ms=>[...ms,s]);}catch(e){alert(e.error||'Erro');} };
  const editManual     = async m => { try{await API.put('/api/manuals/'+m.id,m);setManuals(ms=>ms.map(x=>x.id===m.id?m:x));}catch(e){alert(e.error||'Erro');} };
  const deleteManual   = async id => { try{await API.del('/api/manuals/'+id);setManuals(ms=>ms.filter(x=>x.id!==id));}catch(e){alert(e.error||'Erro');} };
  const addMsg         = async m => { try{const s=await API.post('/api/mensagens',m);setMensagens(ms=>[...ms,s]);}catch(e){alert(e.error||'Erro');} };
  const editMsg        = async m => { try{await API.put('/api/mensagens/'+m.id,m);setMensagens(ms=>ms.map(x=>x.id===m.id?{...x,...m}:x));}catch(e){alert(e.error||'Erro');} };
  const deleteMsg      = async id => { try{await API.del('/api/mensagens/'+id);setMensagens(ms=>ms.filter(x=>x.id!==id));}catch(e){alert(e.error||'Erro');} };
  const reorderMsgs    = async arr => { setMensagens(arr); try{await API.put('/api/mensagens',arr);}catch{} };
  const reorderManuals = async arr => { setManuals(arr); try{await API.put('/api/manuals',arr);}catch{} };

  const totalDone=Object.values(dayTasks).filter(t=>t.fullyDone).length;
  const total=clients.length;
  const pct=total?Math.round((totalDone/total)*100):0;

  const tabs=[
    {id:'fila',         label:'📋 Fila do Dia'},
    {id:'tarefas',      label:'✅ Tarefas'},
    {id:'chat',         label:'💬 Chat'},
    {id:'conhecimento', label:'📚 Trilha'},
    {id:'emails',       label:'📧 E-mails'},
    {id:'lancamentos',  label:'💰 Lançamentos'},
    {id:'clientes',     label:'👥 Clientes'},
    {id:'ops',          label:'⚙️ Operadores'},

      <div className="nav-header" style={{position:'sticky',top:0,zIndex:40,flexShrink:0}}>
        <div style={{maxWidth:'1600px',margin:'0 auto',padding:'0 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 0'}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div style={{width:'34px',height:'34px',borderRadius:'9px',background:'rgba(0,196,140,.15)',border:'1.5px solid rgba(0,196,140,.4)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{color:'#00C48C',fontSize:'14px',fontWeight:800}}>S</span>
              </div>
              <div>
                <div style={{fontSize:'14px',fontWeight:700,color:'#fff',lineHeight:1.2}}>Staff<span style={{color:'#00C48C'}}>Conect</span></div>

            </div>
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'11px',color:'#94a3b8'}}>{user.name}</div>
                  <div style={{fontSize:'10px',color:'#00C48C'}}>{totalDone}/{total} clientes</div>

        {/* Conteúdo */}
        <div style={{flex:1,padding:'24px 20px 48px',minWidth:0,overflowX:'hidden'}}>
          {loading?<Spinner/>:(
            <>

              {tab==='tarefas'     && <TarefasExtras clients={clients} operators={operators} extraTasks={extraTasks} currentUser={user} onAdd={addExtra} onUpdate={updateExtra} onDelete={deleteExtra} manuals={manuals}/>}

        </div>

      </div>
      <HelpPanel screen={tab}/>
    </div>
  );
}

// ── TELA DE TROCA DE SENHA OBRIGATÓRIA ───────────────
function ChangePasswordScreen({user, onDone}) {
  const [form, setForm]   = useState({currentPassword:'', newPassword:'', confirm:''});
  const [err, setErr]     = useState('');
  const [loading, setLoading] = useState(false);
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = async () => {
    setErr('');
    if (form.newPassword !== form.confirm) { setErr('As senhas não coincidem'); return; }
    if (form.newPassword.length < 6) { setErr('Nova senha deve ter mínimo 6 caracteres'); return; }
    setLoading(true);
    try {
      await API.post('/api/auth/change-password', {
        currentPassword: form.currentPassword,
        newPassword:     form.newPassword,
      });
      // Atualiza user no localStorage sem must_change_password
      const updated = { ...user, must_change_password: false };
      localStorage.setItem('sc_user', JSON.stringify(updated));
      onDone(updated);
    } catch(e) { setErr(e.error||'Erro ao trocar senha'); }
    finally { setLoading(false); }
  };

  return (
    <div className="auth-bg">
      <div className="auth-card fade-in" style={{maxWidth:'420px'}}>
        <div className="auth-logo" style={{background:'rgba(249,115,22,.1)',border:'1.5px solid rgba(249,115,22,.3)'}}>
          <span style={{fontSize:'22px'}}>🔑</span>
        </div>
        <h1 style={{textAlign:'center',fontWeight:700,fontSize:'20px',color:'#060505',marginBottom:'6px'}}>Troque sua senha</h1>
        <p style={{textAlign:'center',fontSize:'13px',color:'#64748b',marginBottom:'24px',lineHeight:1.5}}>
          Esta é uma senha temporária.<br/>Crie uma senha pessoal para continuar.
        </p>
        {err && <div style={{background:'#fee2e2',color:'#dc2626',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px'}}>{err}</div>}
        <div style={{display:'grid',gap:'12px',marginBottom:'20px'}}>
          <div>
            <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'4px'}}>Senha temporária (atual)</label>
            <input className="input-field" type="password" placeholder="Senha recebida do administrador"
              value={form.currentPassword} onChange={e=>upd('currentPassword',e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'4px'}}>Nova senha</label>
            <input className="input-field" type="password" placeholder="Mínimo 6 caracteres"
              value={form.newPassword} onChange={e=>upd('newPassword',e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'4px'}}>Confirmar nova senha</label>
            <input className="input-field" type="password" placeholder="Repita a nova senha"
              value={form.confirm} onChange={e=>upd('confirm',e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&submit()}/>
          </div>
        </div>
        <button className="btn-green" onClick={submit} disabled={loading}
          style={{width:'100%',padding:'12px'}}>
          {loading?'Salvando…':'Definir nova senha e entrar'}
        </button>
      </div>
    </div>
  );
}

const PLAN_LABELS = { basic:'Básico', pro:'Pro', enterprise:'Enterprise' };

const DEFAULT_TABS = [
  {id:'fila',        label:'📋 Fila do Dia'},
  {id:'tarefas',     label:'✅ Tarefas'},
  {id:'emails',      label:'📧 E-mails'},
  {id:'lancamentos', label:'💰 Lançamentos'},
  {id:'contas',      label:'💳 Contas a Pagar'},
  {id:'clientes',    label:'🏢 Clientes'},
  {id:'conhecimento',label:'📚 Trilha'},
  {id:'ops',         label:'👥 Operadores'},

];
const BASIC_TABS = ['fila','tarefas','clientes','conhecimento','chat'];

function TenantModal({tenant, onSave, onClose}) {
  const isEdit = !!tenant?.id;
  const [form, setForm] = useState(isEdit
    ? {...tenant, activeTabIds: tenant.activeTabIds || [...BASIC_TABS], active: tenant.active !== false}
    : {id:'', name:'', plan:'basic', primaryColor:'#22c55e', activeTabIds: [...BASIC_TABS], active:true}
  );
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const toggleTab = id => {
    const has = form.activeTabIds.includes(id);
    if (!has) { upd('activeTabIds', [...form.activeTabIds, id]); return; }
    if (BASIC_TABS.includes(id)) return; // abas básicas não podem ser removidas
    upd('activeTabIds', form.activeTabIds.filter(x => x !== id));
  };

  const save = async () => {
    setErr(''); setSaving(true);
    try {
      if (isEdit) await API.put('/api/master/tenants/'+tenant.id, form);
      else        await API.post('/api/master/tenants', form);
      onSave();
    } catch(e) { setErr(e.error||'Erro ao salvar'); }
    finally { setSaving(false); }
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div className="card fade-in" style={{width:'100%',maxWidth:'520px',padding:'28px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
          <h2 style={{fontWeight:700,fontSize:'16px',color:'#060505'}}>{isEdit?'Editar Empresa':'Nova Empresa'}</h2>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:'18px',cursor:'pointer',color:'#94a3b8'}}>✕</button>
        </div>
        {err && <div style={{background:'#fee2e2',color:'#dc2626',padding:'10px',borderRadius:'8px',fontSize:'13px',marginBottom:'14px'}}>{err}</div>}
        <div style={{display:'grid',gap:'14px'}}>
          {!isEdit && <div>
            <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'4px'}}>ID (slug único)</label>
            <input className="input-field" value={form.id} onChange={e=>upd('id',e.target.value.toLowerCase().replace(/[^a-z0-9_-]/g,'-'))} placeholder="ex: staffconect"/>
            <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'4px'}}>Letras minúsculas, números e hífen. Não pode ser alterado depois.</div>
          </div>}
          <div>
            <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'4px'}}>Nome exibido</label>
            <input className="input-field" value={form.name} onChange={e=>upd('name',e.target.value)} placeholder="ex: Staff Conect"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
            <div>
              <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'4px'}}>Plano</label>
              <select className="input-field" value={form.plan} onChange={e=>upd('plan',e.target.value)}>
                <option value="basic">Básico (máx 2 usuários)</option>
                <option value="pro">Pro (máx 5 usuários)</option>
                <option value="enterprise">Enterprise (ilimitado)</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'4px'}}>Cor primária</label>
              <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                <input type="color" value={form.primaryColor} onChange={e=>upd('primaryColor',e.target.value)} style={{width:'40px',height:'36px',border:'1.5px solid #e2e8f0',borderRadius:'8px',cursor:'pointer',padding:'2px'}}/>
                <input className="input-field" value={form.primaryColor} onChange={e=>upd('primaryColor',e.target.value)} style={{flex:1}}/>
              </div>
            </div>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:600,color:'#64748b',display:'block',marginBottom:'8px'}}>Abas habilitadas</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
              {DEFAULT_TABS.map(t => {
                const on = form.activeTabIds.includes(t.id);
                const locked = BASIC_TABS.includes(t.id);
                return (
                  <button key={t.id} onClick={()=>toggleTab(t.id)}
                    style={{padding:'5px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:600,cursor:locked?'not-allowed':'pointer',border:'1.5px solid',
                      borderColor: on ? (locked?'#94a3b8':'#00C48C') : '#e2e8f0',
                      background:  on ? (locked?'rgba(148,163,184,.1)':'rgba(0,196,140,.1)') : '#fff',
                      color:       on ? (locked?'#64748b':'#00C48C') : '#94a3b8',
                    }}>
                    {t.label}{locked&&' 🔒'}
                  </button>
                );
              })}
            </div>
            <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'6px'}}>Abas com 🔒 são obrigatórias no plano básico.</div>
          </div>
          {isEdit && <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <label style={{fontSize:'12px',fontWeight:600,color:'#64748b'}}>Status</label>
            <button onClick={()=>upd('active',!form.active)}
              style={{padding:'5px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:600,border:'1.5px solid',cursor:'pointer',
                borderColor:form.active?'#00C48C':'#e2e8f0',
                background:form.active?'rgba(0,196,140,.1)':'#f1f5f9',
                color:form.active?'#00C48C':'#94a3b8'}}>
              {form.active?'✓ Ativo':'✕ Inativo'}
            </button>
          </div>}
        </div>
        <div style={{display:'flex',gap:'10px',marginTop:'24px',justifyContent:'flex-end'}}>
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-green" onClick={save} disabled={saving}>{saving?'Salvando…':isEdit?'Salvar':'Criar Empresa'}</button>
        </div>
      </div>
    </div>
  );
}

                          </td>
                          <td style={{padding:'14px 16px'}}>
                            <button onClick={()=>setTenantModal(t)} style={{padding:'5px 12px',borderRadius:'8px',border:'1.5px solid #e2e8f0',background:'#fff',cursor:'pointer',fontSize:'12px',fontWeight:600,color:'#475569'}}>Editar</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── TAB: USUÁRIOS ── */}
          {tab==='users' && (
            <div className="fade-in">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
                <h2 style={{fontWeight:700,fontSize:'18px',color:'#060505'}}>Usuários ({users.filter(u=>u.role!=='master').length})</h2>
                <button onClick={()=>setNovoUserModal(true)} style={{padding:'8px 16px',borderRadius:'8px',border:'none',background:'#22c55e',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>+ Novo Usuário</button>
              </div>
              <div className="card" style={{overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead><tr style={{background:'#f8fafc'}}>
                    {['Nome','E-mail','Empresa','Cargo',''].map(h=>(
                      <th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:'12px',fontWeight:600,color:'#64748b',borderBottom:'1px solid #f1f5f9'}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {users.filter(u=>u.role!=='master').map(u=>{
                      const t = tenants.find(x=>x.id===u.tenant_id);
                      return (
                        <tr key={u.id} style={{borderBottom:'1px solid #f1f5f9'}}>
                          <td style={{padding:'12px 16px',fontWeight:600,fontSize:'14px',color:'#060505'}}>{u.name}</td>
                          <td style={{padding:'12px 16px',fontSize:'13px',color:'#64748b'}}>{u.email||'—'}</td>
                          <td style={{padding:'12px 16px'}}>
                            {t && <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                              <div style={{width:'7px',height:'7px',borderRadius:'50%',background:t.primaryColor||'#22c55e'}}/>
                              <span style={{fontSize:'13px',color:'#374151'}}>{t.name}</span>
                            </div>}
                          </td>
                          <td style={{padding:'12px 16px'}}>
                            <span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:600,
                              background:u.role==='admin'?'rgba(34,197,94,.1)':'rgba(148,163,184,.1)',
                              color:u.role==='admin'?'#22c55e':'#64748b'}}>
                              {u.role==='admin'?'Admin':'Operador'}
                            </span>
                          </td>
                          <td style={{padding:'12px 16px'}}>
                            {!u.noLogin && u.email && (
                              <button onClick={()=>setResetModal(u)} style={{padding:'5px 12px',borderRadius:'8px',border:'1.5px solid #e2e8f0',background:'#fff',cursor:'pointer',fontSize:'12px',fontWeight:600,color:'#475569'}}>
                                🔑 Resetar senha
                              </button>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── TAB: INTEGRAÇÕES ── */}
          {tab==='integracoes' && (
            <IntegracoesMaster tenants={tenants} onReload={load}/>
          )}

          {/* ── TAB: APROVAÇÕES (legado, sem entrada no menu) ── */}
          {tab==='aprovacoes' && (
            <div className="fade-in">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
                <h2 style={{fontWeight:700,fontSize:'18px',color:'#060505'}}>
                  Aprovações Pendentes {aprovacoes.length>0&&<span style={{background:'#f59e0b',color:'#fff',borderRadius:'20px',padding:'2px 10px',fontSize:'13px',marginLeft:'8px'}}>{aprovacoes.length}</span>}
                </h2>
                <button onClick={loadAprovacoes} style={{padding:'7px 16px',borderRadius:'8px',border:'1.5px solid #e2e8f0',background:'#fff',cursor:'pointer',fontSize:'13px',fontWeight:600,color:'#475569'}}>🔄 Atualizar</button>
              </div>
              {aprovacoes.length===0
                ? <div className="card" style={{textAlign:'center',padding:'40px',color:'#94a3b8'}}>Nenhuma tarefa aguardando aprovação. ✓</div>
                : <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                    {aprovacoes.map(item=>{
                      const [rejecting,setRejecting] = React.useState(false);
                      const [reason,setReason]       = React.useState('');
                      return (
                        <div key={item.id+item.tenant_id} className="card" style={{borderLeft:'4px solid #f59e0b'}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'12px'}}>
                            <div style={{flex:1}}>
                              <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                                <span style={{fontSize:'11px',fontWeight:700,padding:'2px 8px',borderRadius:'20px',background:'rgba(245,158,11,.15)',color:'#b45309'}}>{item.tenant_id}</span>
                                <span style={{fontSize:'13px',color:'#64748b'}}>{item.client||'—'}</span>
                              </div>
                              <div style={{fontWeight:600,fontSize:'15px',color:'#060505',marginBottom:'4px'}}>{item.title||item.desc||'Tarefa'}</div>
                              {item.desc && item.title && <div style={{fontSize:'13px',color:'#64748b'}}>{item.desc}</div>}
                              <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'4px'}}>
                                por {item.assignedTo||'—'} • {item.completedAt ? new Date(item.completedAt).toLocaleString('pt-BR') : ''}
                              </div>
                            </div>
                            {!rejecting && (
                              <div style={{display:'flex',gap:'8px',flexShrink:0}}>
                                <button onClick={()=>handleMasterAprovar(item)}
                                  style={{padding:'7px 16px',borderRadius:'8px',border:'none',background:'#00C48C',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>
                                  ✓ Aprovar
                                </button>
                                <button onClick={()=>setRejecting(true)}
                                  style={{padding:'7px 16px',borderRadius:'8px',border:'none',background:'#ef4444',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>
                                  ✗ Rejeitar
                                </button>
                              </div>
                            )}
                          </div>
                          {rejecting && (
                            <div style={{marginTop:'12px',display:'flex',gap:'8px',alignItems:'center'}}>
                              <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="Motivo da rejeição..."
                                style={{flex:1,padding:'8px 12px',borderRadius:'8px',border:'1.5px solid #e2e8f0',fontSize:'13px'}}/>
                              <button onClick={()=>handleMasterRejeitar(item,reason)}
                                style={{padding:'7px 16px',borderRadius:'8px',border:'none',background:'#ef4444',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>
                                Confirmar
                              </button>
                              <button onClick={()=>{setRejecting(false);setReason('');}}
                                style={{padding:'7px 16px',borderRadius:'8px',border:'1.5px solid #e2e8f0',background:'#fff',cursor:'pointer',fontSize:'13px'}}>
                                Cancelar
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
              }
            </div>
          )}

        </>)}
      </div>

      {tenantModal && (
        <TenantModal
          tenant={tenantModal==='new'?null:tenantModal}
          onSave={()=>{ setTenantModal(null); load(); }}
          onClose={()=>setTenantModal(null)}
        />
      )}
      {resetModal && (
        <ResetSenhaModal
          targetUser={resetModal}
          onSave={()=>{ setResetModal(null); alert('Senha resetada com sucesso!'); }}
          onClose={()=>setResetModal(null)}
        />
      )}
      {novoUserModal && (
        <NovoUsuarioModal
          tenants={tenants}
          onSave={()=>{ setNovoUserModal(false); load(); }}
          onClose={()=>setNovoUserModal(false)}
        />
      )}
      <HelpPanel screen={tab}/>
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────
function Root() {
  const [state,setState] = useState('checking');
  const [user,setUser]   = useState(null);

  useEffect(()=>{
    const token=localStorage.getItem('sc_token'), saved=localStorage.getItem('sc_user');
    if(token&&saved){ setUser(JSON.parse(saved)); setState('app'); return; }
    fetch('/api/auth/setup').then(r=>r.json()).then(d=>setState(d.needsSetup?'setup':'auth')).catch(()=>setState('auth'));
  },[]);

  const handleAuth = u => {
    setUser(u);
    setState('app');
  };

  const handleLogout = () => {
    localStorage.removeItem('sc_token');
    localStorage.removeItem('sc_user');
    setUser(null);
    setState('auth');
  };

  const handlePasswordChanged = updatedUser => {
    setUser(updatedUser);
  };

  if(state==='checking') return <div className="auth-bg"><div style={{color:'#00C48C',fontSize:'14px'}}>Carregando...</div></div>;
  if(state==='setup')    return <AuthScreen onAuth={handleAuth} isSetup={true}/>;
  if(state==='auth')     return <AuthScreen onAuth={handleAuth} isSetup={false}/>;

  // Troca de senha obrigatória — intercepta antes de qualquer tela
  if(user?.must_change_password) return <ChangePasswordScreen user={user} onDone={handlePasswordChanged}/>;

  if(user?.role==='master') return <MasterDashboard user={user} onLogout={handleLogout}/>;
  return <Dashboard user={user} onLogout={handleLogout}/>;
}

ReactDOM.render(<Root/>, document.getElementById('root'));
</script>
</body>
</html>
