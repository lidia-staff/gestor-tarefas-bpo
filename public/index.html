// ── API ──────────────────────────────────────────────
const API = {
  tok: () => localStorage.getItem('sc_token'),
  hdr: () => ({ 'Content-Type':'application/json', ...(API.tok()?{Authorization:`Bearer ${API.tok()}`}:{}) }),
  async get(url) {
    const r = await fetch(url, { headers:API.hdr() });
    if (r.status===401) { localStorage.clear(); window.location.reload(); return null; }
    if (!r.ok) throw await r.json();
    return r.json();
  },
  async post(url, body)  { const r=await fetch(url,{method:'POST',  headers:API.hdr(),body:JSON.stringify(body)}); const d=await r.json(); if(!r.ok) throw d; return d; },
  async put(url, body)   { const r=await fetch(url,{method:'PUT',   headers:API.hdr(),body:JSON.stringify(body)}); const d=await r.json(); if(!r.ok) throw d; return d; },
  async patch(url, body) { const r=await fetch(url,{method:'PATCH', headers:API.hdr(),body:JSON.stringify(body||{})}); const d=await r.json(); if(!r.ok) throw d; return d; },
  async del(url)         { const r=await fetch(url,{method:'DELETE',headers:API.hdr()}); const d=await r.json(); if(!r.ok) throw d; return d; },
};

// ── PUSH / NOTIFICAÇÕES ──────────────────────────────
function urlBase64ToUint8Array(b64) {
  const pad='='.repeat((4-b64.length%4)%4), s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(s); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr;
}
async function notifyOp(operatorId, opName, title, body) {
  if(!operatorId) return;
  try {
    // Apenas mensagem no chat — push somente para mensagens diretas e e-mails
    await API.post('/api/chat', {text:`🔔 *${opName}* — ${body}`, type:'system', targetOpId:String(operatorId)});
  } catch {}
}

// ── FERIADOS / DIAS ÚTEIS ────────────────────────────
function getEasterFE(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return `${y}-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;}
function addDaysFE(iso,n){const d=new Date(iso+'T12:00:00Z');d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function getBrHolidaysFE(y){const e=getEasterFE(y);const fixed=['01-01','04-21','05-01','09-07','10-12','11-02','11-15','11-20','12-25'].map(h=>`${y}-${h}`);const variable=[addDaysFE(e,-48),addDaysFE(e,-47),addDaysFE(e,-2),addDaysFE(e,60)];return new Set([...fixed,...variable]);}
function isBusinessDay(ds){const d=new Date(ds+'T12:00:00Z'),w=d.getUTCDay();if(w===0||w===6)return false;return !getBrHolidaysFE(d.getUTCFullYear()).has(ds);}

  const ft = freshTask();
  // Aplica modelo de rotina configurado no cliente
  const tipo = client.rotina_tipo;
  if(tipo && tipo !== 'padrao' && ROTINA_TIPOS[tipo]?.steps) {
    const modelo = ROTINA_TIPOS[tipo];
    ft.bloco1 = {...ft.bloco1, steps: modelo.steps.map(s=>({...s,done:false}))};

      steps: (client.bloco1b_steps||[]).map((s,i)=>({id:'b1b_'+i+'_'+Date.now(),text:s,done:false})),

  // Bloco da tarde (ex: Auditoria)
  const tipoTarde = client.rotina_tipo_tarde;
  if(tipoTarde && ROTINA_TIPOS[tipoTarde]?.steps) {
    ft.bloco_tarde = {
      tipo: tipoTarde,
      steps: ROTINA_TIPOS[tipoTarde].steps.map(s=>({...s,done:false})),

  }

};

// ── TELA DE AUTH ─────────────────────────────────────
function AuthScreen({onAuth, isSetup}) {
  const [mode,setMode]   = useState(isSetup?'register':'login');
  const [form,setForm]   = useState({name:'',email:'',password:''});
  const [err,setErr]     = useState('');
  const [loading,setLoading] = useState(false);
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const submit = async () => {
    setErr(''); setLoading(true);
    try {
      const data = await API.post(mode==='login'?'/api/auth/login':'/api/auth/register', form);
      localStorage.setItem('sc_token', data.token);
      localStorage.setItem('sc_user', JSON.stringify(data.user));
      onAuth(data.user);
    } catch(e) { setErr(e.error||'Erro ao conectar'); }
    finally { setLoading(false); }
  };
  return (
    <div className="auth-bg">
      <div className="auth-card fade-in">
        <div className="auth-logo"><span style={{color:'#00C48C',fontSize:'22px',fontWeight:800}}>S</span></div>
        <h1 style={{textAlign:'center',fontWeight:700,fontSize:'20px',color:'#060505',marginBottom:'4px'}}>Staff<span style={{color:'#00C48C'}}>Conect</span></h1>
        <p style={{textAlign:'center',fontSize:'13px',color:'#94a3b8',marginBottom:'28px'}}>{isSetup?'Crie o primeiro usuário administrador':mode==='login'?'Gestor de Tarefas':'Criar conta'}</p>
        {mode==='register' && <div style={{marginBottom:'14px'}}><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>Nome</div><input className="input-field" placeholder="Seu nome completo" value={form.name} onChange={e=>upd('name',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>}
        <div style={{marginBottom:'14px'}}><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>E-mail</div><input className="input-field" type="email" placeholder="seu@email.com" value={form.email} onChange={e=>upd('email',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        <div style={{marginBottom:'20px'}}><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>Senha</div><input className="input-field" type="password" placeholder={mode==='register'?'Mínimo 6 caracteres':'••••••••'} value={form.password} onChange={e=>upd('password',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        {err && <div style={{background:'#fee2e2',color:'#dc2626',borderRadius:'8px',padding:'10px 14px',fontSize:'13px',marginBottom:'16px'}}>{err}</div>}
        <button className="btn-green" style={{width:'100%',padding:'12px'}} onClick={submit} disabled={loading}>{loading?'Aguarde...':mode==='login'?'Entrar':'Criar conta'}</button>
        {!isSetup && <p style={{textAlign:'center',fontSize:'13px',color:'#94a3b8',marginTop:'20px'}}>
          {mode==='login'?<span>Não tem conta? <button onClick={()=>{setMode('register');setErr('');}} style={{color:'#00C48C',fontWeight:600,background:'none',border:'none',cursor:'pointer'}}>Criar conta</button></span>
            :<span>Já tem conta? <button onClick={()=>{setMode('login');setErr('');}} style={{color:'#00C48C',fontWeight:600,background:'none',border:'none',cursor:'pointer'}}>Entrar</button></span>}
        </p>}
      </div>
    </div>
  );
}

// ── CONTAS A PAGAR — MODAL DE CÉLULA ────────────────
function ContasCellModal({date, clientName, cell, operators, onSave, onClose}) {
  const [tem, setTem]       = useState(cell.tem ?? null);
  const [pends, setPends]   = useState(() => {
    const base = cell.pendencias || {};
    const result = {};
    operators.forEach(op => {
      result[String(op.id)] = { text: base[String(op.id)]?.text || '', ok: base[String(op.id)]?.ok || false };
    });
    return result;
  });

  const setField = (opId, key, val) =>
    setPends(p => ({...p, [String(opId)]: {...p[String(opId)], [key]: val}}));

  const anyPending = Object.values(pends).some(p => p.text.trim() && !p.ok);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(6,5,5,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:60,padding:'16px'}}>
      <div className="card fade-in" style={{width:'100%',maxWidth:'440px',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 20px 16px',borderBottom:'1px solid #f1f5f9'}}>
          <div>
            <h2 style={{fontWeight:700,fontSize:'16px',color:'#060505'}}>{clientName}</h2>
            <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'2px'}}>{fmtDate(date)}</div>
          </div>
          <button onClick={onClose} style={{fontSize:'22px',color:'#94a3b8',background:'none',border:'none',cursor:'pointer'}}>&times;</button>
        </div>
        <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:'16px'}}>
          {/* SIM / NÃO */}
          <div>
            <div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'8px'}}>Tem contas a pagar neste dia?</div>
            <div style={{display:'flex',gap:'10px'}}>
              {[[true,'✓ Sim'],[false,'✗ Não']].map(([v,l])=>(
                <button key={String(v)} onClick={()=>setTem(v)}
                  style={{flex:1,padding:'11px',borderRadius:'8px',fontWeight:600,fontSize:'14px',border:`2px solid ${tem===v?(v?'#00C48C':'#dc2626'):'#e2e8f0'}`,background:tem===v?(v?'rgba(0,196,140,.1)':'rgba(220,38,38,.07)'):'#fff',color:tem===v?(v?'#00C48C':'#dc2626'):'#64748b',cursor:'pointer'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          {/* Pendências por operador */}
          {tem===true&&(
            <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:'12px'}}>
              <div style={{fontSize:'11px',fontWeight:600,color:'#64748b'}}>Pendências por operador:</div>
              {operators.map(op=>{
                const p = pends[String(op.id)] || {text:'',ok:false};
                const hasText = p.text.trim().length > 0;
                return (
                  <div key={op.id} style={{borderRadius:'10px',border:`1.5px solid ${p.ok&&hasText?'#00C48C':hasText?'#fca5a5':'#e2e8f0'}`,padding:'12px',background:p.ok&&hasText?'rgba(0,196,140,.04)':'#fff',transition:'all .2s'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                        <div style={{width:'26px',height:'26px',borderRadius:'50%',background:'#060505',color:'#00C48C',fontWeight:700,fontSize:'11px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{op.name.charAt(0).toUpperCase()}</div>
                        <span style={{fontSize:'13px',fontWeight:600,color:'#374151'}}>{op.name}</span>
                      </div>
                      {hasText&&(
                        <label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',userSelect:'none'}}>
                          <input type="checkbox" checked={p.ok} onChange={e=>setField(op.id,'ok',e.target.checked)} style={{accentColor:'#00C48C'}}/>
                          <span style={{fontSize:'12px',fontWeight:600,color:p.ok?'#00C48C':'#94a3b8'}}>{p.ok?'✓ Resolvido':'Resolver'}</span>
                        </label>
                      )}
                    </div>
                    <textarea className="input-field" rows="2"
                      style={{fontSize:'13px',minHeight:'52px',background:p.ok?'rgba(0,196,140,.04)':'#fff',color:p.ok?'#94a3b8':'#374151',textDecoration:p.ok?'line-through':'none'}}
                      placeholder={`Pendência de ${op.name.split(' ')[0]}... (ex: falta boleto, NF pendente)`}
                      value={p.text}
                      onChange={e=>setField(op.id,'text',e.target.value)}
                      disabled={p.ok}/>
                  </div>
                );
              })}
              {!anyPending && operators.some(o=>pends[String(o.id)]?.text.trim()) &&
                <div style={{background:'rgba(0,196,140,.08)',border:'1.5px solid rgba(0,196,140,.2)',borderRadius:'8px',padding:'10px 12px',fontSize:'13px',color:'#00a87a',textAlign:'center'}}>✓ Todas as pendências resolvidas</div>
              }
            </div>
          )}
          {tem===false&&<div style={{background:'rgba(0,196,140,.08)',border:'1.5px solid rgba(0,196,140,.2)',borderRadius:'8px',padding:'12px',fontSize:'13px',color:'#00a87a'}}>✓ Sem contas a pagar neste dia.</div>}
        </div>
        <div style={{display:'flex',gap:'10px',padding:'16px 20px',borderTop:'1px solid #f1f5f9'}}>
          <button className="btn-green" style={{flex:1}} disabled={tem===null} onClick={()=>onSave({tem, pendencias: tem ? pends : {}})}>Salvar</button>
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// ── CONTAS A PAGAR ───────────────────────────────────
function ContasAPagar({clients, operators}) {
  const [view, setView]       = useState('week');
  const [offset, setOffset]   = useState(0);
  const [data, setData]       = useState({});
  const [loading, setLoading] = useState(false);
  const [cellModal, setCellModal] = useState(null);

  const fmtISO = d => d.toISOString().split('T')[0];
  const getDates = (s, e) => {
    const dates=[], cur=new Date(s+'T12:00:00'), end=new Date(e+'T12:00:00');
    while(cur<=end){const d=cur.getDay();if(d!==0&&d!==6)dates.push(fmtISO(new Date(cur)));cur.setDate(cur.getDate()+1);}
    return dates;
  };
  const getRange = (v, off) => {
    const now = new Date();
    if(v==='week'){
      const dow = now.getDay(); const diff = dow===0?-6:1-dow;
      const mon = new Date(now); mon.setDate(now.getDate()+diff+off*7); mon.setHours(0,0,0,0);
      const sun = new Date(mon); sun.setDate(mon.getDate()+6);
      return {start:fmtISO(mon), end:fmtISO(sun)};
    } else {
      const yr=now.getFullYear(), mo=now.getMonth()+off;
      const s=new Date(yr,mo,1), e=new Date(yr,mo+1,0);
      return {start:fmtISO(s), end:fmtISO(e)};
    }
  };

  useEffect(()=>{
    const {start,end}=getRange(view,offset);
    setLoading(true);
    API.get(`/api/contas?start=${start}&end=${end}`).then(d=>{setData(d||{});setLoading(false);}).catch(()=>setLoading(false));
  },[view,offset]);

  const saveCell = async (date, clientId, update) => {
    setData(prev=>({...prev,[date]:{...(prev[date]||{}),[clientId]:update}}));
    try{await API.put(`/api/contas/${date}/${clientId}`,update);}catch{}
  };
  const getCell = (date, cid) => data[date]?.[cid] || {tem:null,pendencias:{}};
  const cellStyle = cell => {
    if(cell.tem===null||cell.tem===undefined) return {bg:'#f1f5f9',color:'#cbd5e1',sym:'—'};
    if(!cell.tem) return {bg:'rgba(0,196,140,.14)',color:'#00a87a',sym:'✓'};
    const hasOpen = Object.values(cell.pendencias||{}).some(p => p?.text?.trim() && !p?.ok);
    return hasOpen ? {bg:'rgba(239,68,68,.14)',color:'#dc2626',sym:'⚠'} : {bg:'rgba(249,115,22,.14)',color:'#ea580c',sym:'●'};
  };

  const {start,end}=getRange(view,offset);
  const dates=getDates(start,end);
  const today=todayStr();
  const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const headerLabel = () => {
    const d=new Date(start+'T12:00:00');
    if(view==='week'){const e=new Date(end+'T12:00:00');return `${d.getDate()} a ${e.getDate()} de ${MONTHS[e.getMonth()]} ${e.getFullYear()}`;}
    return `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  };
  const cellW = view==='week'?42:28;

  return (
    <div>
      {/* header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',flexWrap:'wrap',gap:'10px'}}>
        <div style={{display:'flex',gap:'6px'}}>
          {[['week','Semana'],['month','Mês']].map(([v,l])=>(
            <button key={v} onClick={()=>{setView(v);setOffset(0);}} style={{padding:'6px 14px',borderRadius:'8px',fontSize:'12px',fontWeight:600,border:'none',cursor:'pointer',background:view===v?'#060505':'#fff',color:view===v?'#00C48C':'#64748b'}}>{l}</button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <span style={{fontSize:'13px',fontWeight:600,color:'#374151'}}>{headerLabel()}</span>
          <div style={{display:'flex',gap:'6px'}}>
            {offset>0&&<button onClick={()=>setOffset(o=>o-1)} style={{padding:'4px 12px',borderRadius:'6px',background:'#f1f5f9',border:'none',cursor:'pointer',color:'#374151',fontSize:'12px'}}>‹ Anterior</button>}
            <button onClick={()=>setOffset(o=>o+1)} style={{padding:'4px 12px',borderRadius:'6px',background:'#f1f5f9',border:'none',cursor:'pointer',color:'#374151',fontSize:'12px'}}>Próximo ›</button>
          </div>
        </div>
      </div>

      {/* legenda */}
      <div style={{display:'flex',gap:'16px',marginBottom:'14px',flexWrap:'wrap'}}>
        {[['rgba(0,196,140,.14)','#00a87a','✓','Sem contas'],['rgba(249,115,22,.14)','#ea580c','●','Com contas'],['rgba(239,68,68,.14)','#dc2626','⚠','Tem pendência'],['#f1f5f9','#cbd5e1','—','Não informado']].map(([bg,color,sym,lbl])=>(
          <div key={lbl} style={{display:'flex',alignItems:'center',gap:'5px'}}>
            <div style={{width:'18px',height:'16px',borderRadius:'4px',background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',color,fontWeight:700}}>{sym}</div>
            <span style={{fontSize:'11px',color:'#64748b'}}>{lbl}</span>
          </div>
        ))}
      </div>

      {loading?<Spinner/>:(
        <div style={{overflowX:'auto',borderRadius:'12px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
          <table style={{borderCollapse:'collapse',width:'100%',background:'#fff'}}>
            <thead>
              <tr style={{background:'#060505'}}>
                <th style={{padding:'10px 16px',textAlign:'left',fontSize:'12px',fontWeight:600,color:'#94a3b8',minWidth:'130px',position:'sticky',left:0,background:'#060505',zIndex:2}}>Cliente</th>
                {dates.map(date=>{
                  const d=new Date(date+'T12:00:00');
                  const isToday=date===today, isPast=date<today;
                  return <th key={date} style={{padding:'6px 2px',textAlign:'center',minWidth:`${cellW}px`,opacity:isPast?.5:1}}>
                    <div style={{fontSize:'9px',color:isToday?'#00C48C':'#64748b',fontWeight:isToday?700:400}}>{DAYS[d.getDay()]}</div>
                    <div style={{fontSize:view==='week'?'13px':'11px',fontWeight:isToday?700:500,color:isToday?'#00C48C':'#94a3b8'}}>{d.getDate()}</div>
                  </th>;
                })}
              </tr>
            </thead>
            <tbody>
              {clients.map((client,idx)=>(
                <tr key={client.id} style={{borderTop:'1px solid #f1f5f9',background:idx%2===0?'#fff':'#fafafa'}}>
                  <td style={{padding:'6px 16px',fontSize:'12px',fontWeight:600,color:'#374151',position:'sticky',left:0,background:idx%2===0?'#fff':'#fafafa',zIndex:1,whiteSpace:'nowrap'}}>{client.name}</td>
                  {dates.map(date=>{
                    const cell=getCell(date,client.id);
                    const {bg,color,sym}=cellStyle(cell);
                    const isPast=date<today;
                    return <td key={date} style={{padding:'3px 2px',textAlign:'center'}}>
                      <button onClick={()=>!isPast&&setCellModal({date,clientId:client.id,clientName:client.name})} title={isPast?'Data passada':client.name+' — '+fmtDate(date)}
                        style={{width:`${cellW-4}px`,height:'26px',borderRadius:'5px',background:isPast?'transparent':bg,border:'none',cursor:isPast?'default':'pointer',fontSize:view==='week'?'13px':'10px',color:isPast?'#e2e8f0':color,fontWeight:600,transition:'all .1s'}}>
                        {isPast?'':sym}
                      </button>
                    </td>;
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {cellModal&&(
        <ContasCellModal {...cellModal} cell={getCell(cellModal.date,cellModal.clientId)} operators={operators}
          onSave={upd=>{saveCell(cellModal.date,cellModal.clientId,upd);setCellModal(null);}}
          onClose={()=>setCellModal(null)}/>
      )}
    </div>
  );
}

// ── MODAL ADICIONAR OPERADOR ─────────────────────────
function AddOperatorModal({clients, onSave, onClose}) {
  const [noLogin,setNoLogin] = useState(false);
  const [form,setForm]   = useState({name:'',email:'',password:''});
  const [assigned,setAssigned] = useState([]);
  const [err,setErr]     = useState('');
  const [loading,setLoading] = useState(false);
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleClient = id => setAssigned(a => a.includes(id) ? a.filter(x=>x!==id) : [...a, id]);

  const submit = async () => {
    setErr(''); setLoading(true);
    try {
      if(noLogin) {
        await API.post('/api/operators/no-login', {name: form.name, assignedClients: assigned});
      } else {
        await API.post('/api/auth/register', {...form, assignedClients: assigned});
      }
      const ops = await API.get('/api/operators');
      onSave(ops);
    } catch(e) { setErr(e.error||'Erro'); }
    finally { setLoading(false); }
  };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(6,5,5,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:'16px'}}>
      <div className="card fade-in" style={{width:'100%',maxWidth:'460px',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 20px 16px',borderBottom:'1px solid #f1f5f9'}}>
          <h2 style={{fontWeight:700,fontSize:'16px',color:'#060505'}}>Adicionar Operador</h2>
          <button onClick={onClose} style={{fontSize:'22px',color:'#94a3b8',background:'none',border:'none',cursor:'pointer'}}>&times;</button>
        </div>
        <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:'14px'}}>
          {/* Toggle sem acesso */}
          <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',borderRadius:'10px',background:noLogin?'rgba(245,158,11,.08)':'#f8fafc',border:`1px solid ${noLogin?'rgba(245,158,11,.3)':'#e2e8f0'}`,cursor:'pointer'}} onClick={()=>setNoLogin(n=>!n)}>
            <div style={{width:'36px',height:'20px',borderRadius:'10px',background:noLogin?'#f59e0b':'#cbd5e1',position:'relative',transition:'background .2s',flexShrink:0}}>
              <div style={{position:'absolute',top:'2px',left:noLogin?'18px':'2px',width:'16px',height:'16px',borderRadius:'50%',background:'#fff',transition:'left .2s'}}/>
            </div>
            <div>
              <div style={{fontSize:'13px',fontWeight:700,color:noLogin?'#d97706':'#374151'}}>Sem acesso ao sistema</div>
              <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'1px'}}>Apenas para delegação de tarefas — não terá login</div>
            </div>
          </div>
          {/* Nome sempre visível */}
          <div><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>Nome</div><input className="input-field" type="text" placeholder="Nome completo" value={form.name} onChange={e=>upd('name',e.target.value)}/></div>
          {/* E-mail e senha só quando tem acesso */}
          {!noLogin&&[['E-mail','email','email','email@empresa.com'],['Senha','password','password','Mínimo 6 caracteres']].map(([label,key,type,ph])=>(
            <div key={key}><div style={{fontSize:'11px',fontWeight:600,color:'#64748b',marginBottom:'4px'}}>{label}</div><input className="input-field" type={type} placeholder={ph} value={form[key]} onChange={e=>upd(key,e.target.value)}/></div>
          ))}
          <div>
            <div style={{fontSize:'11px',fontWeight:600,color:'#00C48C',marginBottom:'10px'}}>Clientes atribuídos</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
              {clients.map(c=>(
                <label key={c.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 10px',borderRadius:'8px',cursor:'pointer',border:`1.5px solid ${assigned.includes(c.id)?'#00C48C':'#e2e8f0'}`,background:assigned.includes(c.id)?'rgba(0,196,140,.06)':'#fff'}}>
                  <input type="checkbox" checked={assigned.includes(c.id)} onChange={()=>toggleClient(c.id)}/>
                  <span style={{fontSize:'13px',fontWeight:500,color:'#374151'}}>{c.name}</span>
                </label>
              ))}
            </div>
            {assigned.length===0 && <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'6px'}}>Nenhum cliente selecionado — operador verá todos.</div>}
          </div>
          {err && <div style={{background:'#fee2e2',color:'#dc2626',borderRadius:'8px',padding:'10px 14px',fontSize:'13px'}}>{err}</div>}
        </div>
        <div style={{display:'flex',gap:'10px',padding:'16px 20px',borderTop:'1px solid #f1f5f9'}}>
          <button className="btn-green" style={{flex:1}} onClick={submit} disabled={loading}>{loading?'Salvando...':'Criar Operador'}</button>
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}
